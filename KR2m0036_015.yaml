body:
  text: 武備三武具二皇帝大閲佩刀謹按詩小雅鞞琫有珌毛萇傳琫上飾珌下飾大雅鞞琫容刀孔穎達疏容飾之刀鞞者刀鞘之名後漢書輿服志佩刀乘輿黃金通身貂錯半鮫魚鱗金漆錯雌黃室五色罽隱室華百官志尚方令掌作御刀劒乾隆十三年欽定大閲佩刀錬鐵為之通長二尺七寸七分刃長二尺三寸濶一寸五分右􅜭銀橫為天字一號縱為錬精皆𨽻書左橫為乾隆年製亦𨽻書下為鼓冶鑄刀形銎為金盤厚二分周飾紅寶石緑松石青金石相間各四外銜珍珠柄長四寸五分木質纒明黃絲末鉆鐵塗金周飾紅寶石緑松石青金石三道銜珍珠繫明黃緌中飾緑松石室長二尺五寸木質飾金桃皮琫珌皆􅜭金花文飾紅寶石緑松石青金石各一中橫束􅜭金二道飾亦如之背為金提梁左右各飾紅寶石四青金石二緑松石二繫明黃緌屬於金鐶加革版懸之版亦飾金皇帝吉禮隨侍佩刀謹按乾隆十五年欽定吉禮隨侍佩刀錬鐵為之劒首單刃通長三尺刃長二尺五寸濶一寸四分中起脊三道背銜金龍龍口外刃二寸二分近柄􅜭銀花文左為神鋒右為乾隆年製皆𨽻書銎為銀盤􅜭金花厚二分柄長四寸八分木質蒙白鯊魚皮橫飾九行中緑松石兩旁青金石紅寶石相間上圍飾緑松石紅寶石貫明黃緌室長二尺七寸木質中蒙緑鯊魚皮旁以鐵皆綴金花文琫珌皆綴銀花文亦飾緑松石青金石紅寶石皇帝隨侍佩刀謹按本朝定制皇帝隨侍佩刀錬鐵為之通長三尺銜金龍口刃長二尺一寸七分濶九分銎為􅜭金龍盤厚二分柄長八寸一分木質纒明黃絲室長二尺五寸木質蒙緑革凡飾皆􅜭金花親王郡王佩刀謹按本朝定制親王郡王佩刀錬鐵為之通長二尺七寸刃長二尺二寸五分濶一寸四分銎為鐵盤􅜭金厚二分柄長四寸三分木質纏金黃絲末鉆以鐵亦􅜭金繫金黃緌室長二尺五寸木質髤漆繪五色蓮花雜飾珊瑚珍珠青金石緑松石惟不得用東珠貝勒至入八分公佩刀謹按本朝定制貝勒至入八分公佩刀柄纒青絲繫石青緌餘俱如親王郡王佩刀之制職官佩刀謹按本朝定制職官佩刀錬鐵為之通長二尺六寸四分刃長二尺二寸濶一寸三分銎為鐵盤􅜭金厚二分柄長四寸二分木質纒線藍色末鉆以鐵亦􅜭金繫藍緌室長二尺五寸木質裹革飾皆鐵質􅜭金兵丁佩刀謹按本朝定制兵丁佩刀飾皆黃銅餘俱如職官佩刀之制虎槍營虎槍謹按本朝定制虎槍營虎槍錬鐵為之通長八尺三寸刃長九寸圭首中起稜柄長七尺四寸白蠟木為之柄首橫繫鹿角二長一寸末角鐓刃蒙革囊樺皮裹繫革帶負之健鋭營雲梯謹按乾隆十四年欽定健鋭營雲梯規木為之通髙二丈二尺旁植木二中施橫木二十四道上濶一尺二寸下濶二尺每間一道稍長穿出植木左右首橫木兩端施鐵輪别以木柄鐵義二推之健鋭營雲梯刀謹按乾隆十四年欽定健鋭營雲梯刀錬鐵為之刃長二尺三寸柄長三寸二分飾皆黃銅餘俱如職官佩刀之制健鋭營長槍謹按乾隆十四年欽定健鋭營長槍錬鐵為之通長一丈三寸刃長九寸圭首中起稜木柄長九尺圍四寸六分旁銜鐵刃如刀貼於槍下長一尺四寸濶五分下綴木圓珠黑氂末鐵鐏長四寸健鋭營鞭謹按乾隆十四年欽定健鋭營鞭錬鐵為之橫稜如竹節長二尺三寸五分銎為鐵盤厚一分五釐柄長六寸圍三寸木質髤以漆末鉆以鐵室木質裹緑革􅜭金飾前鋒左翼順刀謹按本朝定制前鋒左翼順刀錬鐵為之鋭首中起脊如劒形通長一尺二寸刃長八寸濶一寸柄長四寸木質塗黃油末鉆以鐵室長九寸木質裹革兩端鉆以鐵中束鐵二道前鋒右翼順刀謹按本朝定制前鋒右翼順刀錬鐵為之鋭首中不起脊通長一尺一寸刃長八寸濶一寸梨木柄長三寸末鉆以鐵繫藍緌室長九寸木質裹革近口束鐵前鋒左翼鐮謹按本朝定制前鋒左翼鐮錬鐵為之形如鋤刃削背俯橫置柄首自刃至背五寸八分榆木柄長一尺三寸圍二寸二分末穿孔繫藍緌前鋒右翼鐮謹按本朝定制前鋒右翼鐮錬鐵為之形如左翼鐮而濶橫置柄首自刃至背五寸樺木柄長一尺二寸圍二寸末裹暖木皮亦穿孔繫藍緌前鋒左翼斧謹按本朝定制前鋒左翼斧錬鐵為之刃如半月背削而修刃徑四寸􅜭銀龍火珠背濶一寸一分自刃至背四寸五分橫置柄首榆木柄長一尺二寸圍二寸四分末鉆以鐵前鋒右翼斧謹按本朝定制前鋒右翼斧錬鐵為之刃平背微狹刃濶三寸四分背濶二寸自刃至背三寸二分橫置柄首樺木柄長一尺圍三寸末裹暖木皮穿孔繫藍緌護軍驍騎長槍謹按本朝定制護軍驍騎長槍錬鐵為之通長一丈三尺七寸刃長一尺一寸銎為鐵盤厚二分下注朱氂木柄長一丈二尺二寸末鐵鐏長四寸護軍驍騎二人合給長槍一藤牌營藤牌謹按戚繼光紀效新書圓長二色其來尚矣主衛而不主刺國初木加以革重而不利步以藤為牌近出福建銃子雖不能隔而矢石鎗刀皆可蔽所以代甲胄之用茅元儀武備志老粗藤如指用之為骨藤篾纒聨中心突向外內空庶箭入不及手腕也周簷髙出雖矢至不能滑泄及人內以藤為上下二環以容手肱執持本朝定制藤牌營藤牌編藤為之形圓中凸簷徑二尺六寸髙八寸采繪虎頭中綴朱纓背施鐶二以挽之漢軍藤牌營每旗百直省緑營各隨其地有差藤牌營㓲刀謹按宋書宗越傳刀楯步出挺身單戰景祐集韻㓲削也茅元儀武備志近世南兵率用圓牌而間之以腰刀本朝定制藤牌營㓲刀錬鐵為之形如佩刀通長二尺八寸刃長二尺二寸濶一寸銎為鐵盤厚二分柄長五寸八分木質髤朱末鉆以鐵繫藍緌漢軍藤牌營每旗百直省緑營各隨其地有差藤牌營挑刀謹按本朝定制藤牌營挑刀錬鐵為之通長七尺六寸二分刃長二尺二寸濶一寸五分上鋭而仰銎為鐵盤厚二分柄長五尺圍四寸六分木質髤朱末鐵鐏長四寸漢軍藤牌營每旗五十直省緑營各隨其地有差漢軍連耞棒謹按杜佑通典衛公兵法守城篇曰連耞如打禾連耞狀用打女牆外上城敵人宋史狄青傳馬上縱鐵連耞擊之茅元儀武備志本出西戎馬上用之以敵步兵其狀如農家打麥之耞以鐵飾之利於自上擊下本朝定制漢軍連耞棒規木為之左右雙持棒長一尺五寸八分耞長七寸五分圍俱二寸五分皆塗黃油兩端鉆以鐵首各加鐶以鐵索相連為一具漢軍每佐領四直省緑營各隨其地有差漢軍鹿角謹按魏志徐晃傳鹿角十重晉書馬隆傳地廣則為鹿角車營南史韋睿傳樹鹿角為城本朝定制漢軍鹿角規木為之橫木一長八尺圍四寸斜木八長五尺五寸圍一寸五分皆貫橫木當斜木之半首末相屬塗以黃油漢軍每佐領一直省緑營各隨其地有差金謹按六韜凡領軍者必有金鼓之節唐六典金之制有四一曰錞二曰鐲三曰鐃四曰鐸本朝定制金範銅為之面平徑一尺五寸三分深二寸旁穿二孔以繩繫於木柄提之擊以椎形如瓜以韋為之末穿藍緌漢軍鳥槍營每旗五直省緑營各隨其地有差鼓謹按詩小雅鉦人伐鼓司馬法奏鼓輕舒鼓重周髀經萬人之將執大鼓吳子一鼓整兵二鼓習陳三鼓趨食四鼓嚴辦五鼓就行李筌太白陰經警嚴鼓十二面本朝定制鼓木匡冒革面徑一尺六寸二分中圍一尺八寸二分厚七寸二分面繪龍匡緑緣朱繪花文上下銅釘二層匡半銅鐶四承以髤朱架髙三尺五寸五分四柱相距二尺七分繪花文柱半各以銅鉤附鐶平懸之柱端刻花文髙四寸四分下橫木交十字以樞合之擊以雙木椎漢軍鳥槍營每旗一直省緑營各隨其地有差海蠡謹按本朝定制海蠡刳蠡吹之以為進止之節凡大閲設親軍海蠡十二於纛前設傳令海蠡於臺下前鋒營左右翼各八護軍營每旗三十六驍騎營每參領二佐領一火器營隨炮每旗五鳥槍護軍驍騎十四藤牌營每旗五直省緑營各隨其地有差緑營偃月刀謹按王充論衡當與刀劒偃月鉤為比茅元儀武備志偃月刀以之操習示雄實不可施於戰陳也本朝定制緑營偃月刀錬鐵為之通長七尺刃長二尺四寸五分上豐而仰背為岐刃銜以龍口髙一寸五分銎為鐵盤厚二分柄長四尺二寸八分圍五寸二分木質髤朱末鐵鐏長四寸緑營撲刀謹按劉熙釋名短刀曰拍髀帶時拍髀旁也又曰露拍言露見也本朝定制緑營撲刀錬鐵為之通長一尺九寸二分刃長一尺四寸上濶二寸四分下半之銎為鐵盤厚二分柄長五寸木質纒紅黃革末鉆以鐵繫藍緌緑營斬馬刀謹按王應麟玉海熙寧五年作坊造斬馬刀長三尺餘首為大環上出以示蔡挺挺奏制作精巧便於操擊戰陳之利器也本朝定制緑營斬馬刀錬鐵為之形如佩刀而長通長四尺八寸刃長三尺四寸濶一寸五分銎為鐵盤厚二分柄長一尺三寸八分木質纒紅黃革末鉆以鐵繫藍緌室長三尺五寸木質裹革髤朱飾以鐵緑營長刃大刀謹按茅元儀武備志長刀倭奴之製甚利於步刃長五尺本朝定制緑營長刃大刀錬鐵為之通長五尺一寸刃長三尺三寸濶一寸五分柄長一尺八寸室長三尺二寸髤以漆餘俱如斬馬刀之制緑營寬刃大刀謹按茅元儀武備志掉刀刃首上濶長柄施鐏本朝定制緑營寬刃大刀錬鐵為之形如偃月刀而無岐刃通長六尺九寸二分刃長二尺五寸上濶三寸下半之銎為鐵盤厚二分柄長四尺圍四寸六分木質髤朱末鐵鐏長四寸緑營寬刃㓲刀謹按本朝定制緑營寬刃㓲刀錬鐵為之通長四尺六寸二分刃長二尺四寸上濶二寸四分下濶一寸四分銎為鐵盤厚二分柄長二尺二寸圍三寸一分木質纒紅藍線末鉆以鐵緑營雙手帶刀謹按本朝定制緑營雙手帶刀錬鐵為之形如斬馬刀而微短通長四尺二寸二分刃長二尺七寸濶一寸五分銎為鐵盤厚二分柄長一尺五寸木質纒紅藍線末鉆以鐵室長二尺八寸木質裹緑革飾以鐵緑營背刀謹按本朝定制緑營背刀錬鐵為之形如斬馬刀而短通長三尺二寸二分刃長二尺三寸濶一寸三分銎為鐵盤厚二分柄長八寸木質纒緑線末鉆以鐵繫藍緌室長二尺四寸木質髤朱飾以鐵緑營片刀謹按本朝定制緑營片刀鍊鐵為之通長七尺一寸二分刃長二尺濶一寸三分上鋭而仰銎為鐵盤厚二分柄長四尺七寸圍四寸木質髤朱末鐵鐏長四寸緑營虎牙刀謹按本朝定制緑營虎牙刀錬鐵為之形如寬刃大刀而上鋭通長五尺四寸二分刃長二尺七寸濶一寸一分銎為鐵盤厚二分柄長與刃等圍三寸七分木質髤朱末鐵鐓緑營窩刀謹按茅元儀武備志倭刀所用刀制略同但短而重程宗猷少林棍法闡宗倭刀竹節鞭同一類本朝定制緑營窩刀錬鐵為之形如佩刀通長三尺四寸二分刃長二尺六寸濶一寸銎為鐵盤厚二分柄長八寸木質縳藤或纒革髤緑末鉆以鐵繫藍緌室長二尺七寸木質裹緑革飾以鐵緑營船尾刀謹按本朝定制緑營船尾刀錬鐵為之形如寬刃大刀而上鋭通長三尺四寸二分刃長二尺二寸濶一寸銎為鐵盤厚二分柄長一尺二寸圍三寸一分木質髤朱末鐵鐓緑營割刀謹按茅元儀武備志鈎鐮刃濶一寸舟中或割其繚或勾其船或割其棚間繩索刃彎而利乃得實用本朝定制緑營割刀錬鐵為之形如刈鈎通長五尺二寸刃橫長一尺四寸濶一寸前曲而俯銎長二寸柄長五尺圍三寸一分木質髤朱緑營繚風刀謹按本朝定制緑營繚風刀錬鐡為之形如割刀刃閷柄修通長一丈二寸刃橫長一尺濶一寸銎長二寸柄長一丈圍三寸一分木質髤朱緑營長槍謹按衛公兵法聽角第二聲諸隊一時捺槍第三聲舉槍第四聲籠槍唐書羅士信執長槍立於馬上通鑑宋紀吳璘疊陳法每戰以長槍居前本朝定制緑營長槍錬鐵為之通