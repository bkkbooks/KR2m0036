body:
  text: 武備一甲胄皇帝大閱胄一謹按周禮春官司服王之吉服凡兵事韋弁服賈公彦疏以韋為冕書費誓善敹乃甲胄孔頴達正義說文云胄兠鍪首鎧也經典皆言甲胄秦世以來始有鎧兠鍪之文古之作甲用皮秦漢以來用鐵鎧鍪二字皆從金葢用鐵為之而因以作名也詩魯頌貝胄朱綅毛萇𫝊貝飾也以朱綅綴之本朝定制皇帝大閱胄制革為之髤以漆頂東珠一承以金雲下為金升龍三各飾紅寳石三又下為金圓珠鏤龍三飾碧䃁㺨三珍珠四又下為金垂雲寳葢飾青紅寳石六貫槍植管鏤蟠龍周垂薫貂纓二十有四長六寸五分紅片金裏管末承雲葉五亦鏤龍下為圓座鏤正龍四飾珠八紅寳石四座下金盤鏤行龍四飾珠四紅寳石八自頂至盤髙一尺一寸胄前後梁亦鏤龍各飾珠三貓睛石二紅藍寳石各二正龍銜黄寳石一梁左右鏤金梵文三重上重八次十有八間以金瓔珞次二十有四前為舞擎鏤龍四飾珠五紅寳石四䕶額髤金龍二中間火珠自胄梁至䕶額髙八寸五分後垂䕶項明黄縀表月白裏青倭縀縁繡五采金龍左右䕶耳䕶頸亦如之以明黄縧四相屬當耳處為鏤空金圓花以達聰上繡金行龍各一下繡金正龍各三俱中敷棉外布金釘繫青縀帶六胄襯石青縀表紅縀裏亦敷棉上綴紅絨頂皇帝大閱胄二謹按乾隆二十一年欽定大閱胄頂珍珠一圓珠鏤龍三飾東珠各一胄前後梁中飾金剛石螣蛇梁左右梵文上重十有二次八次二十有四凡飾皆用東珠餘俱如大閱胄一之制皇帝大閲甲一謹按世本輿作甲考工記函人為函權其上旅與其下旅而重若一賈公彦疏上旅為衣下旅為裳許慎說文臂鎧謂之釬頸鎧謂之錏鍜劉熙釋名甲亦曰介曰函曰鎧皆堅重之名孔頴達尚書正義甲之有鍱則考工所謂札也本朝定制皇帝大閱甲明黄縀表月白裏青倭縀縁中敷棉外布金釘上衣下裳左右䕶肩左右䕶腋左右袖裳間前襠左襠裳亦分左右凡十有一屬皆以明黄縧金鉸聮綴服之衣前繡五采金升龍二後正龍一䕶肩䕶腋前襠左襠各正龍一裳幅金線相比為金鍱五重間以青倭縀繡行龍各二四周亦如之袖以金絲縀下縁黄縀繡五采金龍各二運肘處為方空縱一寸七分横二寸一分袖端月白縀繡金行龍各一向外各綴明黄縧約於中指䕶肩接衣處月白縀金線縁各繡金升龍二行龍六飾珠二紅寳石一後横浴鐵雲葉鏤金行龍一周鏤花文前懸䕶心鏡徑五寸五分周錽金花以金鉸四屬之皇帝大閱甲二謹按乾隆二十一年欽定大閱甲左右袖接衣處屬以藍縀飾用東珠餘俱如大閱甲一之制皇帝隨侍胄謹按本朝定制皇帝隨侍胄石青縀表加縁紅裏如常服冠之制中敷以鐵上綴朱緯紅絨結頂簷繡金行龍四中為金壽字篆文環以金花文後垂䕶項繡金正龍左右䕶耳繡行龍亦環以金花文當耳鏤空金圓花以達聰俱石青縀表加縁月白縀裏皇帝隨侍甲謹按本朝定制皇帝隨侍甲石青縀表加縁月白綢裏通繡金龍環以花文䕶肩後横石青縀雲葉亦繡金龍裳幅各繡金升龍一並屬横幅繫之裳後中豐上下歛不懸䕶心鏡餘俱如大閱甲一之制親王胄謹按本朝定制親王胄鍊鐵為之或以革髤漆其制下達庶官頂鏤金火燄銜紅寳石或藍寳石及珊瑚緑松石惟不得用東珠承以金雲下為金立龍二飾紅藍寳石各一又下為金銜珊瑚圓珠又下為金垂雲寳盖貫槍植管周垂薫貂纓十有八紅縀裏管銜金葉四承以圓盤皆鏤龍盤下鏤龍金座胄前後梁亦鏤龍其飾雜寳惟宜梁左右金梵文三重上重八次七間以金瓔珞次二十舞擎亦鏤龍飾雜寳䕶額浴鐵錽金龍䕶項石青鏁子錦表月白縀裏石青倭縀縁左右䕶耳䕶頸亦如之俱中敷鐵鍱外布金釘繫青縀帶六胄襯石青縀表月白綢裏頂綴絨郡王亦冠之親王甲謹按本朝定制親王甲石青鏁子錦表月白綢裏中敷鐵鍱外布金釘青倭縀縁裳幅鐵鍱四重䕶肩接衣處鐵鍱十有四周以錽金雲龍飾珊瑚緑松青金石各一前懸䕶心鏡甲縧金黄色郡王亦被之貝勒胄謹按本朝定制貝勒胄頂銜素金寳葢盤座俱鏤花金不加飾垂薰貂纓十有四餘俱如親王胄之制貝子固倫額駙皆冠之貝勒甲謹按本朝定制貝勒甲縧石青色餘俱如親王甲之制貝子固倫額駙入八分公皆被之入八分公胄謹按本朝定制入八分公胄頂植蜜鼠尾寳葢盤座俱髤以漆鋟金花及雲龍垂貂尾纓十有二梁及舞擎亦髤漆鋟金雲龍梁左右無梵文餘俱如親王胄之制職官胄一謹按本朝制職官胄頂植鵰翎二銜鏤花金葉寳葢盤座俱髤以漆鋟金花及雲龍周垂貂尾纓十有二梁及舞擎亦髤漆鋟金雲龍梁左右無梵文䕶項䕶耳䕶頸皆石青縀表藍布裏通繡蟒五中敷鐵鍱外布銀釘繫石青縀帶二胄襯石青縀表藍綢裏頂綴紅絨領侍衛内大臣八旗都統前鋒統領䕶軍統領直省總督提督巡撫皆冠之職官胄二謹按本朝定制職官胄頂植蜜鼠尾周垂朱氂餘俱如職官胄一之制内大臣和碩額駙郡主額駙内大臣裏行之公侯伯散秩大臣皆冠之職官胄三謹按本朝定制職官胄頂植薫獺尾周垂朱氂餘俱如職官胄一之制隨旗行之公侯伯子男文武一品文二品八旗副都統鎮國將軍輔國將軍奉國將軍奉恩將軍縣主額駙直省總兵皆冠之職官胄四謹按本朝定制職官胄頂植獺尾周垂朱氂寳葢盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制文三品至五品驍騎叅領郡君額駙縣君額駙鄉君額駙直省副將皆冠之職官胄五謹按本朝定制職官胄頂植豹尾周垂朱氂寳葢盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制侍衛鑾儀衛所屬官皆冠之職官胄六謹按本朝定制職官胄頂植獺尾周垂黒氂寳葢盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制前鋒叅領䕶軍叅領前鋒侍衛䕶軍侍衛皆冠之職官胄七謹按本朝定制職官胄頂植獺尾周垂朱氂不加鋟飾䕶項䕶耳䕶頸均不施繡文餘俱如職官胄一之制文六品至九品直省叅將以下皆冠之職官甲一謹按本朝定制職官甲石青縀表藍布裏中敷鐵鍱外布銀釘石青倭縀縁前後及䕶肩䕶腋前襠左襠各繡團蟒一裳幅團蟒二䕶肩接衣處鐵鍱二十髤漆鋄金龍甲縧石青色領侍衛内大臣八旗都統前鋒統領䕶軍統領直省總督提督巡撫内大臣和碩額駙郡主額駙内大臣裏行之公侯伯散秩大臣隨旗行之公侯伯子男文武一品文二品八旗副都統鎮國將軍輔國將軍奉國將軍奉恩將軍縣主額駙直省總兵皆被之職官甲二謹按本朝定制職官甲前後及䕶肩各繡團蟒一裳幅團蟒二餘俱如職官甲一之制文三品以下驍騎參領郡君額駙縣君額駙鄉君額駙直省副將以下皆被之職官甲三謹按本朝定制職官甲前後及䕶肩各繡團蟒一裳幅鐵鍱四重䕶肩接衣處錽銀雲龍餘俱如職官甲一之制侍衛鑾儀衛所屬官前鋒叅領䕶軍叅領前鋒侍衛䕶軍侍衛王府長史䕶衛典儀皆被之王府長史胄謹按本朝定制王府長史胄頂植猞猁猻周垂黒氂梁及舞擎俱錽銀雲龍餘俱如職官胄一之制王府䕶衛胄謹按本朝定制王府䕶衛胄頂植猞猁猻周垂朱氂梁及舞擎俱錽銀雲龍餘俱如職官胄一之制典儀亦冠之前鋒校胄謹按本朝定制前鋒校胄鍊鐵為之頂植鐵鍱周垂朱氂寳葢以下俱素鐵不加鋟飾䕶項䕶耳俱白縀表素裏紅片金及石青布縁二重繡蓮花中敷鐵鍱外布黄銅釘胄襯石青縀表藍布裏頂綴紅絨䕶軍校亦冠之驍騎校胄謹按本朝定制驍騎校胄頂周垂黒氂䕶項䕶耳俱表以縀各從旗色鑲黄旗鑲白旗鑲藍旗紅縁鑲紅旗石青縁正黄旗正紅旗正白旗正藍旗皆如表色餘俱如前鋒校胄之制前鋒校甲謹按本朝定制前鋒校甲白縀表素裏無袖中敷鐵鍱外布黄銅釘紅片金及石青布縁二重前後繡蟒各一通繡蓮花裳幅鐵鍱三重䕶軍校亦被之驍騎校甲謹按本朝定制驍騎校甲表以縀各從旗色如胄制縁亦如之餘俱如前鋒校甲之制前鋒胄謹按本朝定制前鋒胄䕶項䕶耳俱青布表月白裏縁如表色不施采繡餘俱如前鋒校胄之制䕶軍緑營兵皆冠之驍騎胄謹按本朝定制驍騎胄頂周垂黒氂䕶項䕶耳俱表以布各從旗色鑲黄旗鑲白旗鑲藍旗紅縁鑲紅旗石青縁正黄旗正紅旗正白旗正藍旗皆如表色餘俱如前鋒校胄之制前鋒甲謹按本朝定制前鋒甲青布表月白裏縁如表色不施采繡餘俱如前鋒校甲之制䕶軍緑營兵皆被之驍騎甲謹按本朝定制驍騎甲表以布各從旗色如胄制縁亦如之餘俱如前鋒校甲之制䕶軍校棉胄謹按乾隆二十一年欽定䕶軍校棉胄制革為之髤以漆頂植銅鍱周垂朱氂惟正紅旗黒氂飾皆黄銅䕶項䕶耳俱白縀表藍綢裏縁如表色中敷棉外布黄銅釘胄襯石青縀表藍布裏頂綴紅絨驍騎校棉胄謹按乾隆二十一年欽定驍騎校棉胄頂周垂黒氂䕶項䕶耳皆石青縀表餘俱如䕶軍校棉胄之制䕶軍校棉甲謹按乾隆二十一年欽定䕶軍校棉甲白縀表藍綢裏縁如表色中敷棉外布黄銅釘上衣下裳左右袖䕶肩䕶腋前襠左襠皆全驍騎校棉甲謹按乾隆二十一年欽定驍騎校棉甲石青縀表餘俱如䕶軍校棉甲之制前鋒棉胄謹按乾隆二十一年欽定前鋒棉胄頂用垂朱氂䕶項䕶耳皆綢表布裏外布白銅釘胄襯石青布表餘俱如䕶軍校棉胄之制䕶軍亦冠之驍騎棉胄謹按乾隆二十一年欽定驍騎棉胄周垂黒氂䕶項及䕶耳皆綢表各從旗色藍布裏鑲黄旗鑲白旗鑲藍旗俱紅縁鑲紅旗白縁正白旗正藍旗正黄旗正紅旗縁如表色外布白銅釘餘俱如䕶軍校棉胄之制胄襯用石青布表藍裏頂綴紅絨鹿角兵礟手皆冠之前鋒棉甲謹按乾隆二十一年欽定前鋒棉甲石青綢表藍布裏外布白銅釘餘俱如䕶軍校棉甲之制䕶軍亦被之驍騎棉甲謹按乾隆二十一年欽定驍騎棉甲綢表各如旗色藍布裏縁如胄制中敷棉外布白銅釘上衣下裳䕶肩䕶腋前襠左襠全鹿角兵棉甲謹按乾隆二十一年欽定鹿角兵棉甲無裳及左襠餘俱如驍騎棉甲之制礟手亦被之藤牌營兵虎㡌謹按本朝定制藤牌營兵虎㡌制革為之形如虎頭後垂䕶項下為䕶耳皆黄布為之通繪斑文緑營藤牌兵亦冠之藤牌營兵虎衣謹按本朝定制藤牌營兵虎衣黄布為之其長半身下袴如其色通繪斑文袖端白布以象虎掌鞾亦以黄布繪斑文緑營藤牌兵亦被之武狀元胄謹按本朝定制武狀元胄鍊銅為之不鏤花文頂植三刃如古㦸形下為圓珠貫鎗植管周垂朱氂前後梁加鳳首尾旁為鳳翼䕶項及䕶耳俱貝文銅鍱紅片金縁紅布裏武狀元甲謹按本朝定制武狀元甲鍊銅為之紅綢裏紅片金縁通簇貝文銅鍱兩袖銅鍱四重裾下周結緑縧下垂紅緌前後各四十行鏁子甲謹按乾隆二十四年平定西域俘獲軍器無算上命皆藏紫光閣以紀武成鏁子甲鍊鐵為之上衫下袴皆為鐵連鐶相屬衫不開襟白布縁領貫首被之西師罙入屢得兹甲即被以擊賊殊方異製克底膚功敬登於册以附甲胄之末皇帝行冠一謹按本朝定制皇帝行冠冬以黒狐如常服冠之制皇帝行冠二謹按本朝定制皇帝行冠秋以黒羊皮如常服冠之制皇帝行冠三謹按本朝定制皇帝行冠秋以青絨如常服冠之制皇帝行冠四謹按本朝定制皇帝行冠夏織藤絲為之或織竹絲為之紅紗裏縁如其色上綴雨纓頂及梁皆黄色前綴珍珠一皇帝行褂謹按本朝定制皇帝行褂色用石青長與坐齊袖長及肘棉袷紗裘各惟其時皇帝行袍謹按本朝定制皇帝行袍制如常服袍長減十之一右裾短一尺色及花文隨所御棉袷紗裘各惟其時皇帝行帶謹按本朝定制皇帝行帶色用