body:
  text: 武備一甲胄皇帝大閲胄一謹按周禮春官司服王之吉服凡兵事韋辨服賈公彥疏以韋為冕書費誓善敹乃甲胄孔頴達正義説文云胄兜鍪首鎧也經典皆言甲胄秦世以來始有鎧兜鍪之文古之作甲用皮秦漢以來用鐵鎧鍪二字皆從金蓋用鐵為之而因以作名也詩魯頌貝胄朱綅毛萇傳貝飾也以朱綅綴之本朝定制皇帝大閲胄制革為之髤以漆頂東珠一承以金雲下為金升龍三各飾紅寶石三又下為金圓珠鏤龍三飾碧䃁㺨三珍珠四又下為金垂雲寶蓋飾青紅寶石六貫槍植管鏤蟠龍周垂薰貂纓二十有四長六寸五分紅片金裏管末承雲葉五亦鏤龍下為圓座鏤正龍四飾珠八紅寶石四座下金盤鏤行龍四飾珠四紅寶石八自頂至盤髙一尺一寸胄前後梁亦鏤龍各飾珠三貓睛石二紅藍寶石各二正龍銜黃寶石一梁左右鏤金梵文三重上重八次十有八間以金瓔珞次二十有四前為舞擎鏤龍四飾珠五紅寶石四護額髤金龍二中間火珠自胄梁至護額髙八寸五分後垂護項明黃縀表月白裏青倭縀緣繡五采金龍左右護耳護頸亦如之以明黃縧四相屬當耳處為鏤空金圓花以達聰上繡金行龍各一下繡金正龍各三俱中敷棉外布金釘繫青縀帶六胄襯石青縀表紅縀裏亦敷棉上綴紅絨頂皇帝大閲胄二謹按乾隆二十一年欽定大閲胄頂珍珠一圓珠鏤龍三飾東珠各一胄前後梁中飾金剛石螣蛇梁左右梵文上重十有二次八次二十有四凡飾皆用東珠餘俱如大閲胄一之制皇帝大閲甲一謹按世本輿作甲考工記函人為函權其上旅與其下旅而重若一賈公彥疏上旅為衣下旅為裳許慎説文臂鎧謂之釬頸鎧謂之錏煆劉熙釋名甲亦曰介曰函曰鎧皆堅重之名孔頴達尚書正義甲之有鍱則考工所謂札也本朝定制皇帝大閲甲明黃縀表月白裏青倭縀緣中敷棉外布金釘上衣下裳左右護肩左右護腋左右袖裳間前襠左襠裳亦分左右凡十有一屬皆以明黃縧金鉸聮綴服之衣前繡五采金升龍二後正龍一護肩護腋前襠左襠各正龍一裳幅金線相比為金鍱五重間以青倭縀繡行龍各二四周亦如之袖以金絲縀下緣黃縀繡五采金龍各二運肘處為方空縱一寸七分橫二寸一分袖端月白縀繡金行龍各一向外各綴明黃縧約於中指護肩接衣處月白縀金線緣各繡金升龍二行龍六飾珠二紅寶石一後橫浴鐵雲葉鏤金行龍一周鏤花文前懸護心鏡徑五寸五分周錽金花以金鉸四屬之皇帝大閲甲二謹按乾隆二十一年欽定大閲甲左右袖接衣處屬以藍縀飾用東珠餘俱如大閲甲一之制皇帝隨侍胄謹按本朝定制皇帝隨侍胄石青縀表加緣紅裏如常服冠之制中敷以鐵上綴朱緯紅絨結頂簷繡金行龍四中為金壽字篆文環以金花文後垂護項繡金正龍左右護耳繡行龍亦環以金花文當耳鏤空金圓花以達聰俱石青縀表加緣月白縀裏皇帝隨侍甲謹按本朝定制皇帝隨侍甲石青縀表加緣月白綢裏通繡金龍環以花文護肩後橫石青縀雲葉亦繡金龍裳幅各繡金升龍一並屬橫幅繫之裳後中豐上下斂不懸護心鏡餘俱如大閲甲一之制親王胄謹按本朝定制親王胄鍊鐵為之或以革髤漆其制下達庶官頂鏤金火焰銜紅寶石或藍寶石及珊瑚緑松石惟不得用東珠承以金雲下為金立龍二飾紅藍寶石各一又下為金銜珊瑚圓珠又下為金垂雲寶蓋貫槍植管周垂薰貂纓十有八紅縀裏管銜金葉四承以圓盤皆鏤龍盤下鏤龍金座胄前後梁亦鏤龍其飾雜寶惟宜梁左右金梵文三重上重八次七間以金瓔珞次二十舞擎亦鏤龍飾雜寶護額浴鐵錽金龍護項石青鎖子錦表月白縀裏石青倭縀緣左右護耳護頸亦如之俱中敷鐵鍱外布金釘繫青縀帶六胄襯石青縀表月白綢裏頂綴絨郡王亦冠之親王甲謹按本朝定制親王甲石青鎖子錦表月白綢裏中敷鐵鍱外布金釘青倭縀緣裳幅鐵鍱四重護肩接衣處鐵鍱十有四周以錽金雲龍飾珊瑚緑松青金石各一前懸護心鏡甲縧金黃色郡王亦被之貝勒胄謹按本朝定制貝勒胄頂銜素金寶蓋盤座俱鏤花金不加飾垂薰貂纓十有四餘俱如親王胄之制貝子固倫額駙皆冠之貝勒甲謹按本朝定制貝勒甲縧石青色餘俱如親王甲之制貝子固倫額駙入八分公皆被之入八分公胄謹按本朝定制入八分公胄頂植蜜鼠尾寶蓋盤座俱髤以漆鋟金花及雲龍垂貂尾纓十有二梁及舞擎亦髤漆鋟金雲龍梁左右無梵文餘俱如親王胄之制職官胄一謹按本朝制職官胄頂植雕翎二銜鏤花金葉寶蓋盤座俱髤以漆鋟金花及雲龍周垂貂尾纓十有二梁及舞擎亦髤漆鋟金雲龍梁左右無梵文護項護耳護頸皆石青縀表藍布裏通繡蟒五中敷鐵鍱外布銀釘繫石青縀帶二胄襯石青縀表藍綢裏頂綴紅絨領侍衛內大臣八旗都統前鋒統領護軍統領直省總督提督巡撫皆冠之職官胄二謹按本朝定制職官胄頂植蜜鼠尾周垂朱氂餘俱如職官胄一之制內大臣和碩額駙郡主額駙內大臣裏行之公侯伯散秩大臣皆冠之職官胄三謹按本朝定制職官胄頂植薰獺尾周垂朱氂餘俱如職官胄一之制隨旗行之公侯伯子男文武一品文二品八旗副都統鎮國將軍輔國將軍奉國將軍奉恩將軍縣主額駙直省總兵皆冠之職官胄四謹按本朝定制職官胄頂植獺尾周垂朱氂寶蓋盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制文三品至五品驍騎參領郡君額駙縣君額駙鄉君額駙直省副將皆冠之職官胄五謹按本朝定制職官胄頂植豹尾周垂朱氂寶蓋盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制侍衛鑾儀衛所屬官皆冠之職官胄六謹按本朝定制職官胄頂植獺尾周垂黑氂寶蓋盤座前後梁及舞擎俱錽銀雲龍餘俱如職官胄一之制前鋒參領護軍參領前鋒侍衛護軍侍衛皆冠之職官胄七謹按本朝定制職官胄頂植獺尾周垂朱氂不加鋟飾護項護耳護頸均不施繡文餘俱如職官胄一之制文六品至九品直省參將以下皆冠之職官甲一謹按本朝定制職官甲石青縀表藍布裏中敷鐵鍱外布銀釘石青倭縀緣前後及護肩護腋前襠左襠各繡團蟒一裳幅團蟒二護肩接衣處鐵鍱二十髤漆鋄金龍甲縧石青色領侍衛內大臣八旗都統前鋒統領護軍統領直省總督提督巡撫內大臣和碩額駙郡主額駙內大臣裏行之公侯伯散秩大臣隨旗行之公侯伯子男文武一品文二品八旗副都統鎮國將軍輔國將軍奉國將軍奉恩將軍縣主額駙直省總兵皆被之職官甲二謹按本朝定制職官甲前後及護肩各繡團蟒一裳幅團蟒二餘俱如職官甲一之制文三品以下驍騎參領郡君額駙縣君額駙鄉君額駙直省副將以下皆被之職官甲三謹按本朝定制職官甲前後及護肩各繡團蟒一裳幅鐵鍱四重護肩接衣處錽銀雲龍餘俱如職官甲一之制侍衛鑾儀衛所屬官前鋒參領護軍參領前鋒侍衛護軍侍衛王府長史護衛典儀皆被之王府長史胄謹按本朝定制王府長史胄頂植猞猁猻周垂黑氂梁及舞擎俱錽銀雲龍餘俱如職官胄一之制王府護衛胄謹按本朝定制王府護衛胄頂植猞猁猻周垂朱氂梁及舞擎俱錽銀雲龍餘俱如職官胄一之制典儀亦冠之前鋒校胄謹按本朝定制前鋒校胄鍊鐵為之頂植鐵鍱周垂朱氂寶蓋以下俱素鐵不加鋟飾護項護耳俱白縀表素裏紅片金及石青布緣二重繡蓮花中敷鐵鍱外布黃銅釘胄襯石青縀表藍布裏頂綴紅絨護軍校亦冠之驍騎校胄謹按本朝定制驍騎校胄頂周垂黑氂護項護耳俱表以縀各從旗色鑲黃旗鑲白旗鑲藍旗紅緣鑲紅旗石青緣正黃旗正紅旗正白旗正藍旗皆如表色餘俱如前鋒校胄之制前鋒校甲謹按本朝定制前鋒校甲白縀表素裏無袖中敷鐵鍱外布黃銅釘紅片金及石青布緣二重前後繡蟒各一通繡蓮花裳幅鐵鍱三重護軍校亦被之驍騎校甲謹按本朝定制驍騎校甲表以縀各從旗色如胄制緣亦如之餘俱如前鋒校甲之制前鋒胄謹按本朝定制前鋒胄護項護耳俱青布表月白裏緣如表色不施采繡餘俱如前鋒校胄之制護軍緑營兵皆冠之驍騎胄謹按本朝定制驍騎胄頂周垂黑氂護項護耳俱表以布各從旗色鑲黃旗鑲白旗鑲藍旗紅緣鑲紅旗石青緣正黃旗正紅旗正白旗正藍旗皆如表色餘俱如前鋒校胄之制前鋒甲謹按本朝定制前鋒甲青布表月白裏緣如表色不施采繡餘俱如前鋒校甲之制護軍緑營兵皆被之驍騎甲謹按本朝定制驍騎甲表以布各從旗色如胄制緣亦如之餘俱如前鋒校甲之制護軍校棉胄謹按乾隆二十一年欽定護軍校棉胄制革為之髤以漆頂植銅鍱周垂朱氂惟正紅旗黑氂飾皆黃銅護項護耳俱白縀表藍綢裏緣如表色中敷棉外布黃銅釘胄襯石青縀表藍布裏頂綴紅絨驍騎校棉胄謹按乾隆二十一年欽定驍騎校棉胄頂周垂黑氂護項護耳皆石青縀表餘俱如護軍校棉胄之制護軍校棉甲謹按乾隆二十一年欽定護軍校棉甲白縀表藍綢裏緣如表色中敷棉外布黃銅釘上衣下裳左右袖護肩護腋前襠左襠皆全驍騎校棉甲謹按乾隆二十一年欽定驍騎校棉甲石青縀表餘俱如護軍校棉甲之制前鋒棉胄謹按乾隆二十一年欽定前鋒棉胄頂用垂朱氂護項護耳皆綢表布裏外布白銅釘胄襯石青布表餘俱如護軍校棉胄之制護軍亦冠之驍騎棉胄謹按乾隆二十一年欽定驍騎棉胄周垂黑氂護項及護耳皆綢表各從旗色藍布裏鑲黃旗鑲白旗鑲藍旗俱紅緣鑲紅旗白緣正白旗正藍旗正黃旗正紅旗緣如表色外布白銅釘餘俱如護軍校棉胄之制胄襯用石青布表藍裏頂綴紅絨鹿角兵炮手皆冠之前鋒棉甲謹按乾隆二十一年欽定前鋒棉甲石青綢表藍布裏外布白銅釘餘俱如護軍校棉甲之制護軍亦被之驍騎棉甲謹按乾隆二十一年欽定驍騎棉甲綢表各如旗色藍布裏緣如胄制中敷棉外布白銅釘上衣下裳護肩護腋前襠左襠全鹿角兵棉甲謹按乾隆二十一年欽定鹿角兵棉甲無裳及左襠餘俱如驍騎棉甲之制炮手亦被之藤牌營兵虎帽謹按本朝定制藤牌營兵虎帽制革為之形如虎頭後垂護項下為護耳皆黃布為之通繪斑文緑營藤牌兵亦冠之藤牌營兵虎衣謹按本朝定制藤牌營兵虎衣黃布為之其長半身下袴如其色通繪斑文袖端白布以象虎掌鞾亦以黃布繪斑文緑營藤牌兵亦被之武狀元胄謹按本朝定制武狀元胄鍊銅為之不鏤花文頂植三刃如古戟形下為圓珠貫鎗植管周垂朱氂前後梁加鳳首尾旁為鳳翼護項及護耳俱貝文銅鍱紅片金緣紅布裏武狀元甲謹按本朝定制武狀元甲鍊銅為之紅綢裏紅片金緣通簇貝文銅鍱兩袖銅鍱四重裾下周結緑縧下垂紅緌前後各四十行鎖子甲謹按乾隆二十四年平定西域俘獲軍器無算上命皆藏紫光閣以紀武成鎖子甲鍊鐵為之上衫下袴皆為鐵連鐶相屬衫不開襟白布緣領貫首被之西師罙入屢得兹甲即被以擊賊殊方異製克底膚功敬登於册以附甲胄之末皇帝行冠一謹按本朝定制皇帝行冠冬以黑狐如常服冠之制皇帝行冠二謹按本朝定制皇帝行冠秋以黑羊皮如常服冠之制皇帝行冠三謹按本朝定制皇帝行冠秋以青絨如常服冠之制皇帝行冠四謹按本朝定制皇帝行冠夏織藤絲為之或織竹絲為之紅紗裏緣如其色上綴雨纓頂及梁皆黃色前綴珍珠一皇帝行褂謹按本朝定制皇帝行褂色用石青長與坐齊袖長及肘棉夾紗裘各惟其時皇帝行袍謹按本朝定制皇帝行袍制如常服袍長減十之一右裾短一尺色及花文隨所御棉夾紗裘各惟其時皇帝行帶謹按本朝定制皇帝行帶色用