front:
  text: 欽定四庫全書皇朝禮器圖式卷十八
  hash: sha256:5625f8dd05d5ed8707b33fd8ebadc8ca43841885b1774bc765bcefc87579faec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0036_WYG_018-1a, image: WYG0656/WYG0656-0907c.png}
body:
  text: 武備六皇帝大閲黃幄謹按本朝定制皇帝大閲黃幄黃布為之白裏縱一丈九尺二寸橫二丈六尺中施橫梁為脊濶九尺五寸梁兩端承以柱高一丈二尺六寸門濶七尺簷四出高八尺四寸周承以柱十二脊左右及簷四隅皆加鴟吻木質塗金簷周重幨如幄色各深九寸柱所承處皆綴青布雲文柱皆塗黃油鉆鐡鋄銀端施環穿朱繩斜繫鐡橛幄內藉高麗席加白氊中設御座金絲緞屏座高一尺五寸縱五尺橫七尺六寸垂黃綢幨藉紅氊青緞緣坐具貂及粧緞惟其時凱旋躬勞賜宴亦設之皇帝駐蹕大營謹按本朝定制皇帝駐蹕大營內方外圓度地縱二十丈六尺橫十七丈四尺建黃幔城外加網城索綯為之黃色貫之以網高六尺濶八尺凡百六十有六距幔城東西南各十八丈北十五丈設連帳百七十有五為內城啓旌門三東鑲黃纛西正黃纛南正白纛各二周建鑲黃金龍旗四十有一各以三旗護軍參領二人護軍校護軍二十人門焉宿衛帳九司以三旗護軍參領一人護軍校護軍十人外設連帳二百五十有四為外城啓旌門四東鑲白纛西鑲紅纛南正藍鑲藍纛浹日遞建之北正紅纛各二周建方旗南北鑲黃西北正黃東南正白西南正紅各十有五各以五旗護軍參領二人護軍校護軍二十人門焉宿衛帳四司以五旗護軍參領一人護軍校護軍十人外城東面設內閣六部都察院提督等衙門官帳距外城六十丈周設警蹕帳四十各建護軍旗一東北鑲白西北鑲紅東南正藍西南鑲藍司以護軍參領每旗一人護軍校護軍每旗十五人度地由嚮導總統張具以護軍參領三人護軍校護軍八十人重門拱衛星廬環布黃幔城正中御幄在焉皇帝駐蹕御幄謹按本朝定制皇帝駐蹕御幄周建黃幔城門南向內樹黃布屏中建圓幄高二丈徑三丈四尺上為穹蓋頂圓木如樞銜椽下覆皆髤朱羃以白氊藍布緣上加素布雨蓋緣藍布雲文以髤朱木杆四面分搘之承椽以斜木相交為墻高五尺六寸亦髤朱外圍白氊藍布緣下圍朱簾高一尺八寸內圍黃洋氊紅花文左右分懸櫜鞬佩刀幄內藉高麗席加白氊門前後各高四尺六寸濶二尺三寸幄正中設御座五采刻絲屏青緞緣座高一尺六寸五分縱三尺九寸五分橫五尺七寸五分垂重幨上錦下黃綢藉黃氊坐具貂及粧緞惟其時庭左右各設圓幄一高九尺五寸徑一丈五尺牆高四尺五寸內圍白氊餘制皆同座後達長幄直而深狹高七尺六寸縱一丈二尺橫八尺直梁橫棟簷左右垂高五尺四方啓門高濶如中圓幄蓋及牆皆圍白氊藍布緣內藉高麗席加黑氊後達帳殿橫列三楹高一丈一尺縱一丈三尺橫三丈東西室皆啓窗更後為圓幄三幔城外左右連帳茶膳儲偫各庀其事皇帝停蹕頓營謹按本朝定制皇帝停蹕頓營度地縱橫各二丈設黃幔城門南向外加網城如大營之制凡二十有九幔城中設圓幄蓋高一丈牆高四尺門亦南向高三尺七寸濶二尺三寸羃蓋圍牆俱如駐蹕御幄之制幄內藉高麗席加白氊正中設藍褥高五寸縱五尺五寸加白氊黃花文行圍看城亦如之親王氊帳謹按本朝定制親王氊帳穹頂銜椽羃以白氊承椽以斜竹相交為牆皆髤朱外圍白氊下圍朱簾頂高九尺牆高四尺徑一丈四尺帳外周設藍布城郡王以下皆得用之職官扈行者亦得自備惟不許設藍布城職官帳房謹按本朝定制職官帳房藍布為之如人字形單夾惟宜縱六尺四寸橫一丈二尺上施梁為脊承以兩柱各高六尺五寸羃布斜垂至地下加垂幨七寸兩端皆圍以布左當柱中分以便出入兵丁帳房謹按本朝定制兵丁帳房白布為之如職官帳房之制涼棚謹按本朝定制涼棚藍布為之單夾惟宜縱一丈八尺橫二丈七尺中施橫梁為脊濶九尺兩端承以柱高一丈七尺四寸蓋緣青布雲文簷四出高七尺五寸重幨以藍色周承以柱十皆髤朱圍布牆前啓兩窗搘以木四窗角垂髤朱壺盧綴藍緌後樹白布屏高七尺五寸濶一丈二尺繪五采麒麟內外武職校閲用之皇朝禮器圖式卷十八
