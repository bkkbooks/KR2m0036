  text: 欽定四庫全書皇朝禮器圖式卷十八
  hash: sha256:5625f8dd05d5ed8707b33fd8ebadc8ca43841885b1774bc765bcefc87579faec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0036_WYG_018-1a, image: WYG0656/WYG0656-0907c.png}
body:
  text: 武備六皇帝大閲黄幄謹按本朝定制皇帝大閲黄幄黄布為之白裏縱一丈九尺二寸横二丈六尺中施横梁為脊濶九尺五寸梁兩端承以柱高一丈二尺六寸門濶七尺簷四出高八尺四寸周承以柱十二脊左右及簷四隅皆加䲭吻木質塗金簷周重幨如幄色各深九寸柱所承處皆綴青布雲文柱皆塗黄油鉆鐡鋄銀端施環穿朱繩斜繫鐡橜幄内藉高麗蓆加白氊中設御座金絲緞屏座高一尺五寸縱五尺横七尺六寸垂黄綢幨藉紅氊青緞縁坐具貂及粧緞惟其時凱旋躬勞賜宴亦設之皇帝駐蹕大營謹按本朝定制皇帝駐蹕大營内方外圓度地縱二十丈六尺横十七丈四尺建黄幔城外加網城索綯為之黄色貫之以網高六尺濶八尺凡百六十有六距幔城東西南各十八丈北十五丈設連帳百七十有五為内城啟旌門三東鑲黄纛西正黄纛南正白纛各二周建鑲黄金龍旗四十有一各以三旗䕶軍參領二人䕶軍校䕶軍二十人門焉宿衛帳九司以三旗䕶軍參領一人䕶軍校䕶軍十人外設連帳二百五十有四為外城啟旌門四東鑲白纛西鑲紅纛南正藍鑲藍纛浹日遞建之北正紅纛各二周建方旗南北鑲黄西北正黄東南正白西南正紅各十有五各以五旗䕶軍參領二人䕶軍校䕶軍二十人門焉宿衛帳四司以五旗䕶軍參領一人䕶軍校䕶軍十人外城東面設内閣六部都察院提督等衙門官帳距外城六十丈周設警蹕帳四十各建䕶軍旗一東北鑲白西北鑲紅東南正藍西南鑲藍司以䕶軍參領毎旗一人䕶軍校䕶軍毎旗十五人度地由嚮導總統張具以䕶軍參領三人䕶軍校䕶軍八十人重門拱衛星廬環布黄幔城正中御幄在焉皇帝駐蹕御幄謹按本朝定制皇帝駐蹕御幄周建黄幔城門南向内樹黄布屏中建圓幄高二丈徑三丈四尺上為穹盖頂圓木如樞銜椽下覆皆髤朱羃以白氊藍布縁上加素布雨盖縁藍布雲文以髤朱木杆四面分搘之承椽以斜木相交為墻高五尺六寸亦髤朱外圍白氊藍布縁下圍朱簾高一尺八寸内圍黄洋氊紅花文左右分懸櫜鞬佩刀幄内藉高麗蓆加白氊門前後各高四尺六寸濶二尺三寸幄正中設御座五采刻絲屏青緞縁座高一尺六寸五分縱三尺九寸五分横五尺七寸五分垂重幨上錦下黄綢藉黄氊坐具貂及粧緞惟其時庭左右各設圓幄一高九尺五寸徑一丈五尺牆高四尺五寸内圍白氊餘制皆同座後達長幄直而深狹高七尺六寸縱一丈二尺横八尺直梁横棟簷左右垂高五尺四方啟門高濶如中圓幄蓋及牆皆圍白氊藍布縁内藉高麗蓆加黒氊後達帳殿横列三楹高一丈一尺縱一丈三尺横三丈東西室皆啟窓更後為圓幄三幔城外左右連帳茶膳儲偫各庀其事皇帝停蹕頓營謹按本朝定制皇帝停蹕頓營度地縱横各二丈設黄幔城門南向外加網城如大營之制凡二十有九幔城中設圓幄盖高一丈牆高四尺門亦南向高三尺七寸濶二尺三寸羃盖圍牆俱如駐蹕御幄之制幄内藉高麗蓆加白氊正中設藍褥高五寸縱五尺五寸加白氊黄花文行圍看城亦如之親王氊帳謹按本朝定制親王氊帳穹頂銜椽羃以白氊承椽以斜竹相交為牆皆髤朱外圍白氊下圍朱簾頂高九尺牆高四尺徑一丈四尺帳外周設藍布城郡王以下皆得用之職官扈行者亦得自備惟不許設藍布城職官帳房謹按本朝定制職官帳房藍布為之如人字形單袷惟宜縱六尺四寸横一丈二尺上施梁為脊承以兩柱各高六尺五寸羃布斜垂至地下加垂幨七寸兩端皆圍以布左當柱中分以便出入兵丁帳房謹按本朝定制兵丁帳房白布為之如職官帳房之制凉棚謹按本朝定制凉棚藍布為之單袷惟宜縱一丈八尺横二丈七尺中施横梁為脊濶九尺兩端承以柱高一丈七尺四寸盖縁青布雲文簷四出高七尺五寸重幨以藍色周承以柱十皆髤朱圍布牆前啟兩窓搘以木四窓角垂髤朱壺盧綴藍緌後樹白布屏高七尺五寸濶一丈二尺繪五采麒麟内外武職校閲用之皇朝禮器圖式卷十八
