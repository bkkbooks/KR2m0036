徑四寸三分七釐四毫後上圓下平徑如之下濶五寸一分三毫梁外各穿孔二十五以受絃絃首出前梁外末入後梁外孔從越逥至後梁上各於本絃綰之梁内絃長四尺三寸七分四釐中一絃黄外十二絃為陽均内十二絃為隂均皆朱各設柱以和之梁内繪雲龍前後錦文側為流雲後端承絃以黄縀繡龍絃孔飾以蚌梁以檀髤金座二承之祭祀燕饗中和韶樂瑟皆同朝㑹中和韶樂排簫謹按周禮春官笙師掌教龡竽笙塤籥簫箎篴管爾雅釋樂大簫謂之言小者謂之筊郭璞注十六管長尺二寸本朝定制朝㑹中和韶樂排簫比竹為之十六管隂陽各八自左而右列二倍律六正律以協陽均自右而左列二倍吕六正吕以協隂均其長與徑皆如本律管面各鐫律名以木為櫝中凹而虚以受管外出一寸九分上齊下參差櫝髙九寸四分七釐七毫厚一寸九釐三毫口濶六寸九分九釐八毫肩濶一尺一寸六分一釐足相距一尺一寸三分三釐五毫隨管之長短左右漸張以掩之通髤以朱繪金龍中以金書康熙御製下施小鐶垂五采流蘇祭祀燕饗中和韶樂排簫皆同朝㑹中和韶樂簫謹按周禮春官笙師鄭康成注今時所吹五空竹篴沈括夣溪筆談後漢馬融所賦長笛空洞無底剡其上孔五孔一孔出其背正是今之尺八陳暘樂書簫管之制六孔或謂之尺八管或謂之豎篴朱子語類今之簫乃古之笛馬端臨文獻通考短簫鐃歌單吹鼓吹之樂也本朝定制朝㑹中和韶樂簫斷竹為之陽月用姑洗簫以四倍黄鍾管為體長一尺七寸七分五毫徑四分三釐五毫隂月用仲吕簫以三倍半黄鍾管為體長一尺六寸九分三釐四毫徑四分一釐六毫皆前五孔後一孔旁二孔相並以出音上開山口徑二分通髤以朱繪雲龍旁孔垂五采流蘇朝㑹丹陛大樂祭祀耕耤采桑燕饗凱旋樂凡用簫者皆同朝㑹中和韶樂笛謹按許慎説文笛七孔筩也智匠古今樂錄横吹張騫入西域始𫝊之宋史樂志六竅為篴六律之聲備焉馬端臨文獻通考笛首為龍頭有綬帯下垂元史禮樂志龍笛横吹之管首制龍頭本朝定制朝㑹中和韶樂笛斷竹為之陽月用姑洗笛徑四分三釐五毫吹孔至末一尺二寸五分一釐七毫隂月用仲吕笛徑四分一釐六毫吹孔至末一尺一寸九分七釐二毫通長俱一尺八寸二分八釐六毫體長徑各與簫同左第一為吹孔次加竹膜焉右六孔以協律旁二孔相對以出音末二孔向上間纒以絲兩端加龍首龍尾皆木質首長二寸四分尾减二分通髤以朱繪花文旁孔垂五采流蘇朝㑹丹陛大樂鹵簿巡幸祭祀耕耤采桑燕饗凱旋樂凡用笛者皆同朝㑹中和韶樂篪謹按爾雅釋樂大篪謂之沂郭璞注篪以竹為之長尺四寸張揖廣雅篪八孔陳𤾉樂書篪之為器有底之笛也本朝定制朝㑹中和韶樂篪斷竹為之陽月用姑洗篪以三十二倍黄鍾管為體徑八分七釐吹孔至末九寸九分五釐隂月用仲吕篪以二十八倍黄鍾管為體徑八分三釐二毫吹孔至末九寸五分二釐五毫皆通長一尺四寸上為吹孔向外五孔向内一孔下二孔相並為一以出音管末有底竅其中吹孔上留竹節以閉音間纒以絲髤朱繪雲龍出音孔垂五采流蘇祭祀燕饗中和韶樂篪皆同朝㑹中和韶樂笙謹按書益稷笙鏞以間禮記明堂位女媧氏之笙簧爾雅釋樂大笙謂之巢小者謂之和周禮春官笙師鄭康成注鄭司農云笙十三簧馬端臨文獻通考唐樂圗所𫝊十七管之笙通黄鍾均聲清樂用之宋朝大樂所𫝊之笙並十七簧陳𤾉樂書其簧十二以應十二律其一以象閏也本朝定制朝㑹中和韶樂笙竹管匏身大笙十七管皆有簧以黄鍾三十二分積七之管為體徑一分六釐五毫小笙亦十七管惟十三簧以黄鍾八分積一之管為體徑一分三釐七毫匏靣穿孔環植之左右分列束以竹絲中管最長以次短象鳯翼本豐末斂象鳳身管本以檀竅其中而有底削半以薄銅葉障孔開簧口㸃以蠟珠其上各按律分穿出音孔管端穿氣孔匏之半接吹管端為吹孔匏身及吹管髤漆鏤雲龍文填以金吹管外垂五采流蘇朝㑹丹陛大樂鹵簿巡幸祭祀耕耤采桑燕饗凱旋樂凡用笙者皆同朝㑹中和韶樂壎謹按爾雅釋樂大塤謂之􅑧郭璞注燒土為之大如鵞子鋭上平底形如秤錘陳𤾉樂書今太樂舊塤七孔本朝定制朝㑹中和韶樂壎埏土為之陽月用黄鍾壎以八倍黄鍾積為體内髙二寸二分三釐腰内徑一寸七分一釐七毫底内徑一寸一分六釐八毫隂月用大吕壎以七倍黄鍾積為體内髙二寸一分三釐三毫腰内徑一寸六分四釐二毫底内徑一寸一分一釐七毫皆七孔上為吹孔前四後二以叶律通髤以朱繪金雲龍合樂時樂工以手捧壎底懸五采流蘇於指間祭祀燕饗中和韶樂壎皆同朝㑹中和韶樂鼓謹按禮記明堂位夏后氏之鼓足殷楹鼓鄭康成注足謂四足也楹謂之柱貫中上出也儀禮大射儀建鼓在阼階西鄭康成注建猶樹也以木貫而載之樹之跗也賈公彦疏周人縣鼓今言建鼓用殷法也本朝定制朝㑹中和韶樂鼔木匡冐革靣徑二尺三寸四釐圍九尺六寸五分一釐厚三尺四寸五分七釐面繪雲龍縁邉繪花文俱五采兩端塗金釘二層匡兩旁飾六角鏤金盤龍各二銜金鐶匡半穿方孔貫以柱上出擎葢下植至趺葢上穹下方髙一尺四寸三分徑四尺四寸羃以黄縀繡雲龍曲梁四垂加龍首出幨一尺二寸重幨四周深一尺三寸一分中繡正龍旁行龍葢頂髙九寸三分塗金上植金鸞承鼓以曲木四岐抱匡鏤金雲文其下髙二尺四寸三分末為圎座髙一尺九寸二分趺四出有垣各飾伏獅鐶及鸞咮龍口並垂五采流蘇擊以桴髤朱直柄圎首凡鼓皆如之祭祀燕饗中和韶樂鼓皆同朝㑹中和韶樂搏拊謹按書益稷搏拊琴瑟孔安國𫝊搏拊以韋為之實之以糠所以節樂孔頴達正義搏拊形如鼓擊之以節樂漢初相𫝊為然也周禮春官大師令奏擊拊鄭康成注拊形如鼓賈公彦疏先鄭之意擊拊謂若尚書云擊石拊石皆是作用之名拊非樂器後鄭不從者此擊拊謂若下文鼓􅉧及擊應鼙之類彼􅉧鼙是樂器則知此拊亦樂器也白虎通引尚書大𫝊云拊革裝之以糠本朝定制朝㑹中和韶樂搏拊如鼔而小面徑七寸二分九釐中圍三尺五分三釐六毫厚一尺四寸五分八釐繪飾與鼓同匡旁飾六角鏤金盤龍二銜金鐶繫黄絨紃卧置趺上垣為雲紋以承之趺凡三層通髤以金髙一尺一寸五分二釐縱一尺三寸六分五釐二毫横九寸一分二毫凡合樂以紃懸於項擊以左右手鼓一搏拊二以為節祭祀燕饗中和韶樂搏拊皆同朝㑹中和韶樂柷謹按書益稷合止柷敔孔頴達正義柷如漆桶爾雅釋樂所以鼓柷謂之止郭璞注止者其椎名顔師古漢書注柷與俶同俶始也樂將作先鼓之故謂之柷舊唐書音樂志方靣各二尺餘旁開圎孔宋史樂志先儒之説曰有柄連底挏之鄭康成以為設椎其中撞之撞擊之法宜用康成之説陳𤾉樂書舊柷四面畫山卉本朝定制朝㑹中和韶樂柷斵木為之形方如斗上廣下狹上方二尺一寸八分七釐下方一尺六寸九分四毫厚七分二釐九毫深一尺四寸五分八釐邊徑二寸二釐厚一寸二分一釐外繪山水樓閣口及柱皆塗金裏髤以漆三面中隆起為鼔形以受擊一靣中穿孔以出音趺髙三寸三釐方二尺四分八釐亦塗金止長四寸八分六釐髤以綠柄一尺二寸一分三釐髤以朱其端為金雲繫黄絨紃祭祀燕饗中和韶樂柷皆同朝㑹中和韶樂敔謹按周禮春官小師掌教鼔鼗柷敔爾雅釋樂所以鼔敔謂之籈郭璞注敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名舊唐書音樂志碎竹以擊其首而逆刮之以止樂也本朝定制朝㑹中和韶樂敔雕木為之如伏虎形紅黑斑文齟齬在背上具五色以三相間凡二十七首髙九寸四分七釐尾髙八寸一分濶六寸四分八釐通長二尺一寸八分七釐齟齬之分七寸二分九釐以崇牙承之趺髙一尺二分四釐縱二尺一寸八分四釐横一尺二寸一分三釐旁施兩耳長三寸六分四釐以置籈通塗以金籈以竹長二尺四寸三分圍四寸五分六釐四毫柝其半為二十四莖于齟齬上横櫟之祭祀燕饗中和韶樂敔皆同朝㑹丹陛大樂戲竹謹按元史禮樂志戲竹制如籈上繫流蘇香囊執而偃之以止樂本朝定制朝㑹丹陛大樂戲竹析竹為之髤以朱凡五十莖長三尺六寸四分五釐承以塗金葫蘆垂五采流蘇柄亦髤朱長六尺四寸八分二人執之立丹陛上合則樂作分則樂止燕饗丹陛大樂戲竹同朝㑹丹陛大樂雲鑼謹按元史禮樂志雲璈制以銅為小鑼王圻三才圗㑹雲鑼即雲璈十面同一木架本朝定制朝㑹丹陛大樂雲鑼範銅為之形如小銅盤十枚同懸應四正律六半律分厚薄如編鐘之法靣徑三寸五分二釐厎徑二寸六分三釐深五分四釐四周穿竅繫以黄絨紃中四左右各三合三行為九宫形上加一焉架髤以朱頂飾火珠兩端龍首左右兩端亦如之垂五采流蘇通髙二尺濶一尺五寸承以塗金雲龍柄長五寸五分擊以小椎綠色朱柄鹵簿巡幸祭祀燕饗凱旋樂凡用雲鑼者皆同朝㑹丹陛大樂管謹按爾雅釋樂大管謂之簥其中謂之篞小者謂之􅩭唐書禮樂志八曰竹有管杜佑通典以蘆為首竹為管元史禮樂志頭管制以竹為管卷蘆葉為首竅七唐順之稗編大樂以此先諸樂謂之頭管本朝定制朝㑹丹陛大樂管以堅木或骨角為之大小各二大管以姑洗律管為體徑二分七釐四毫通長五寸七分六釐小管以黄鍾半積同形管為體徑二分一釐七毫通長五寸六分二毫前七孔後一孔間束以絃兩端象牙為飾以蘆哨入管端吹之垂五采流蘇鹵簿巡幸燕饗凱旋樂凡用管者皆同朝㑹丹陛大樂大鼓謹按隋書禮儀志鼓吹一部大鼓十八具馬端臨文獻通考以交龍為筍虡下有趺中懸鼓元史禮樂志庭中設則有大木架又有擊撾髙座本朝定制朝㑹丹陛大樂大鼓木匡冐革面徑三尺六寸四分五釐中圍一丈五尺二寸六分八釐一毫厚三尺二寸四分面髤以黄繪五采雲龍匡髤朱繪交龍上下塗金釘二層匡半塗金鐶四腹施銅膽承以髤朱架髙六尺四柱相距五尺五寸繪蟠龍柱半各有塗金鈎附鐶平懸之柱端蹲金獅髙一尺一寸下横木交十字以樞合之鼓衣紅縀為之綠垂幨並銷金雲龍燕饗丹陛大樂大鼔同朝㑹丹陛大樂杖鼓謹按陳暘樂書唐有正鼓和鼓之别後周有三等之制右擊以杖左拍以手後世謂之杖鼓拍鼔馬端臨文獻通考震鼔之制廣首而纎腹即杖鼓也漢人所用之鼔元史禮樂志杖鼓制以木為匡細腰以皮冐之上施五采繡帶本朝定制朝㑹丹陛大樂杖鼓木匡細腰厚一尺九寸四分四釐上下規鐵匡以冐革徑一尺二寸九分六釐縁以綠皮綴金鈎各八以黄絨紃交絡腰加束焉徑各八寸一分髤黄繪雲龍匡亦髤黄為正龍相向腰飾綠皮蕉葉紋以髤朱片竹擊之衣與大鼓同架為六柱相距以横木交貫凡二層髤以朱先蠶壇樂燕饗丹陛大樂凱旋凱歌樂杖鼓皆同朝㑹丹陛大樂拍板謹按舊唐書音樂志拍板長濶如手厚寸餘以韋連之擊以代抃馬端臨文獻通考大者九板小者六板陳暘樂書以檀若桑木為之本朝定制朝㑹丹陛大樂拍板斵木為之左右各三近上横穿二孔聨以黄絨紃長一尺一寸五分二釐上濶二寸一分六釐中濶一寸九分二釐下濶二寸五分六釐外二板厚四分五釐内四板厚三分八釐鹵簿先蠶壇樂耕耤禾詞樂采桑桑歌樂燕饗丹陛大樂清樂拍板皆同皇朝禮器圖式卷八
