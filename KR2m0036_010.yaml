body:
  text: 鹵簿一皇帝鹵簿一皇帝大駕鹵簿玉輦謹按劉熙釋名輦人所輦也潘岳耤田賦天子乃御玉輦隋書禮儀志輦制象軺車而不施輪通幰朱絡飾以金玉用人荷之宋史儀衛志唐制輦有七六曰大玉輦七曰小玉輦馬端臨文獻通考夏后始制輦乾隆十三年欽定大駕鹵簿玉輦木質髤朱圓蓋方座通髙一丈一尺一寸蓋髙二尺飾以青銜玉圓版四冠金圓頂七寸鏤金垂雲承之曲梁四垂端為金雲葉簷方徑六尺二寸青緞重幨各深五寸五分周為襞積繡金雲龍繫黄絨紃四屬於座隅四柱髙五尺三寸距各五尺繪雲龍門髙四尺八寸濶二尺三寸五分冬垂青氊幃夏易以朱簾黒緞縁四面各三座髙二尺四寸下方七尺七寸上方七尺六寸綴版二層上繪彩雲下繪金雲環以朱䦨飾間金彩其髙一尺六寸八分各闕其中二尺一寸䦨内周布花毯中設金雲龍寶座髙一尺三寸濶二尺七寸左列銅鼎右植服劍轅四内二轅長三丈八寸五分外長二丈九尺兩端銜金龍首尾升用納陛五級左右䦨皆髤朱亦飾金彩舁以三十六人冬至大祀孟春祈糓孟夏常雩詣壇皆御之凡大朝㑹設鹵簿則陳於太和門外皇帝大駕鹵簿導蓋謹按晉書輿服志次曲華蓋中道宋史儀衛志大駕鹵簿導蓋一元史輿服志導蓋制如曲蓋緋羅瀝水繡龍乾隆十三年欽定大駕鹵簿導蓋黄緞為之綢裏通髙八尺六寸三分蓋徑五尺一寸五分繡八寶彩雲冠以金頂七寸三分垂幨三層各深一尺繡金龍九間以流雲火珠旁垂彯帶二長三尺一寸濶二寸五分如蓋色垂五采流蘇曲柄為木質塗金交龍徑二尺上下攅竹髤朱上長二尺五寸下長五尺四寸圍四寸七分鐓以銅􅜭銀長二寸二分凡大朝會設鹵簿則陳於丹陛正中法駕鑾駕騎駕鹵簿導蓋皆同皇帝大駕鹵簿拂塵謹按宋史儀衛志宫中導從執紅絲拂二人金史儀衛志拂子四人元史輿服志金拂紅氂牛尾為之黄金塗龍頭柄乾隆十三年欽定大駕鹵簿拂塵朱氂為之長二尺結於木柄其長二尺一寸二分圍一寸五分七釐通髤以金上飾鏤金龍首二寸五分銜小金鐶以綴拂下飾鏤金龍尾三寸三分末屬金鐶垂朱緌立夏始陳之處暑後不用凡大朝㑹設鹵簿則列仗於丹陛上達於墀下自拂塵至引仗以次排列法駕鹵簿拂塵同皇帝大駕鹵簿提鑪謹按唐書儀衛志香蹬一宋史儀衛志香蹬唐制也朱漆案緋繡花龍衣上設金塗香鑪乾隆十三年欽定大駕鹵簿提鑪笵金為之形圓有蓋通髙七寸八分深四寸六分口徑三寸二分腹圍一尺七寸六分項鈒花文銜珊瑚耳為雙龍三足各髙一寸二分蓋髙二寸徑與口徑同環鏤芙蕖下垂雲葉頂鏤蟠龍提以金索四三屬於鑪一屬蓋並繋雲葉上提杆攅竹髤朱長四尺五寸圍三寸一分四釐兩端飾金龍首尾上綴金鈎以懸鑪行則提之陳設時承以八角盤口徑一尺三寸五分底徑一尺一寸一分通髤朱繪金花文置方几上几髙一尺四寸五分上徑一尺四寸四分下徑一尺四寸八分四足鏤螭首虎爪承以圓珠下周横距通髤以朱分繪金雲龍火珠法駕鹵簿提鑪同皇帝大駕鹵簿香合謹按宋史儀衛志宫中導從捧龍腦合二人金史儀衛志香盒二人元史輿服志香合制以銀塗黄金鈒雲龍於上乾隆十三年欽定大駕鹵簿香合笵金為之形圎有蓋通髙三寸五分口徑六寸三分蓋髙一寸四分面為蟠龍周為雲龍口為囘文下深一寸六分亦鏤雲龍囘文足髙五分飾以雜寶陳設時盤及几如提鑪之制法駕鹵簿香合同皇帝大駕鹵簿盥盆謹按金史儀衛志鐁鑼一人元史輿服志水盆黄金塗銀粧鈒為之乾隆十三年欽定大駕鹵簿盥盆笵金為之形圓十二棱髙四寸五分口徑一尺五寸邉鈒花文飾以雜寶底徑一尺六寸鏤雲龍中銜紅玻璃陳設時盤及几如提鑪之制法駕鹵簿盥盆同皇帝大駕鹵簿唾壺謹按宋書百官志漢武帝世孔安國為侍中以其儒者特聽掌御唾壺金史儀衛志唾壺一人元史輿服志唾壺制以銀寛縁虚腹有蓋黄金塗之乾隆十三年欽定大駕鹵簿唾壺笵金為之形圓有蓋通髙五寸口徑一寸五分蓋髙二寸五分頂為蟠龍下深二寸五分底徑二寸一分座髙四寸徑三寸三分四足鏤螭首虎爪承以圓珠下周横距飾以雜寶陳設時盤及几如提鑪之制法駕鹵簿唾壺同皇帝大駕鹵簿水瓶謹按宋史儀衛志宫中導從紫衣分執灌器唾壺金史儀衛志水罐一人元史輿服志水瓶制如湯瓶銀為之塗以黄金乾隆十三年欽定大駕鹵簿水瓶笵金為之有蓋大小各一大者通髙一尺五寸七分深一尺三寸五分口徑四寸四分鈒花文腹圍二尺八寸八分鈒雲龍火珠下為波紋耳為螭首銜鐶厎徑七寸蓋髙一寸五分徑九寸四分飾以雜寶小者通髙一尺四寸五分深一尺二寸五分口徑四寸一分腹圍二尺六寸六分厎徑五寸四分蓋髙一寸五分徑八寸六分形制花文皆同陳設時盤及几俱如提鑪之制法駕鹵簿水瓶同皇帝大駕鹵簿馬杌謹按元史輿服志杌子四脚小牀銀飾之塗以黄金乾隆十三年欽定大駕鹵簿馬杌枬質髤朱髙一尺五寸方一尺八寸面繪金雙龍間以流雲中為火珠四足鏤螭首虎爪承以圓珠下周横距雜繪八寶法駕鹵簿馬杌同皇帝大駕鹵簿交椅謹按金史儀衛志交椅一人元史輿服志交椅銀飾之塗以黄金乾隆十三年欽定大駕鹵簿交椅枬質塗金曲扶箕張倚上仰交足横距貫以鐵樞雙疊舉之通髙二尺九寸二分縱一尺一寸五分横二尺二寸座面織黄絲倚刻花草雲龍文踏几髙三寸三分縱九寸五分横一尺八寸六分亦塗金法駕鹵簿交椅同皇帝大駕鹵簿儀刀謹按唐書儀衛志左右廂有主帥三十八人執儀刀宋史儀衛志御刀晉宋以來有之黑鞘金花銀飾靶軛紫絲絛帉錔儀刀制同此悉以銀飾金史儀衛志班劍儀刀隊二百人元史輿服志儀刀制以銀飾紫絲帉錔横刀制如儀刀而曲鞘以沙魚皮飾乾隆十三年欽定大駕鹵簿儀刀錬鐵為之通長三尺七寸三分刃長二尺四寸八分木柄長一尺二寸五分端垂緑緌鞘長二尺七寸五分通鞔緑沙魚皮銎及鉆皆塗金鏤花文繫以黄鹿皮懸於革帶帶飾亦塗金法駕鑾駕騎駕鹵簿儀刀皆同皇帝大駕鹵簿櫜鞬謹按春秋左傳右屬櫜鞬杜預注櫜以受箭鞬以受弓晉書輿服志次弓矢熊渠佽飛督領之宋史儀衛志弓矢有靫同􅎻弩元史輿服志服制以虎豹皮或暴緑文金銅装靫制以黑革乾隆十三年欽定大駕鹵簿櫜鞬以革為之黒色綠縁櫜長一尺一寸四分圍一尺四寸三分厎木質髤朱徑五寸五分盛矢十有二鞬長二尺三寸三分上徑一尺一寸五分中徑七寸七分下徑二寸五分韜弓及半皆飾鏤金鉸具銜以雜寶繫以黄鹿皮懸於革帶鞬左櫜右帶飾皆塗金銜緑松石法駕鑾駕騎駕鹵簿櫜鞬皆同皇帝大駕鹵簿豹尾槍謹按蔡邕獨斷最後一車懸豹尾崔豹古今注豹尾車周制也象君子豹變宋史輿服志上載朱漆竿首綴豹尾乾隆十三年欽定大駕鹵簿豹尾槍鍛鐵為之通長一丈一尺七分刄長一尺五分冒以木黄油繪行龍銎塗金鏤垂雲文下綴朱氂垂鐶懸豹尾長三尺三寸柄攅竹髤朱繪金雲龍長九尺五寸圍四寸九分五釐鐏以鐵鋄銀長七寸法駕鑾駕騎駕鹵簿豹尾槍皆同皇帝大駕鹵簿殳謹按考工記廬人凡為殳五分其長以其一為之被而圍之鄭康成注被把中也圍之圜之也凡矜八觚毛萇詩傳殳長丈二而無刄唐書儀衛志二百五十人執殳宋史儀衛志殳無刃而短元史輿服志殳制如矟而短黒飾兩末中畫雲氣乾隆十三年欽定大駕鹵簿殳鍛鐵為之通長一丈一尺首長一尺四寸八棱上徑一寸一分下徑六分鋄金龍文銎長九寸鏤龍首上下鉆以鐵塗金鏤花柄長八尺餘俱如豹尾槍之制法駕鹵簿殳同皇帝大駕鹵簿㦸謹按考工記冶氏㦸廣寸有半寸内三之胡四之援五之漢書司馬相如傳建干將之雄㦸張揖注雄㦸胡中有􅟉者干將所造劉熙釋名㦸觡也旁有枝觡也晉書輿服志次大㦸一隊唐書儀衛志第一行長㦸第四行小㦸第五行短㦸宋史儀衛志㦸有枝兵也木為刃赤質畫雲氣元史輿服志鈒㦸制如㦸無飛掌而有横木乾隆十三年欽定大駕鹵簿㦸鍛鐵為之通長一丈一尺援長一尺三寸胡外曲徑七寸三分中有􅟉􅟉上横二寸五分下横五寸内外各半外鏤龍首銎長九寸鏤龍首上銜通塗以金柄長八尺如豹尾槍之制法駕鹵簿㦸同皇帝大駕鹵簿九龍曲蓋謹按崔豹古今注太公因折蓋之形而製曲蓋自漢朝乘輿用四乾隆十三年欽定大駕鹵簿九龍曲蓋黃緞為之通髙一丈二尺二寸蓋徑五尺繡彩雲上冠金頂一尺一寸垂幨三層各深一尺一寸繡金龍九間以流雲火珠下綴金鈴各十五旁垂彯帶二長三尺五寸濶二寸五分如蓋色亦繡彩雲綴鈴各三曲柄為木質塗金龍首徑二尺三寸上下攅竹髤朱上長三尺七寸下長五尺二寸圍四寸七分鐓以銅鋄銀長八分法駕鹵簿九龍曲蓋同皇帝大駕鹵簿翠華蓋謹按揚雄甘泉賦咸翠蓋而鸞旂李善注翠羽飾蓋宋元嘉起居注訶羅國奉孔雀蓋一具元史輿服志孔雀蓋朱漆竿首建小蓋蓋頂以孔雀毛徑尺許下垂孔雀尾乾隆十三年欽定大駕鹵簿翠華蓋緑緞為之通繡孔雀翎旁無彯帶餘俱如九龍曲蓋之制法駕鹵簿翠華蓋同皇帝大駕鹵簿紫芝蓋謹按漢書揚雄傳翳華芝服䖍注華芝華蓋也張衡西京賦芝蓋九葩薛綜注以芝為蓋有九葩之采魏書禮志前驅芝蓋乾隆十三年欽定大駕鹵簿紫芝蓋紫緞為之通繡五色芝二十四旁無彯帶餘俱如九龍曲蓋之制法駕鹵簿紫芝蓋同皇帝大駕鹵簿九龍蓋謹按遼史儀衛志直柄華蓋乾隆十三年欽定大駕鹵簿九龍蓋黄緞為之直柄餘俱如九龍曲蓋之制法駕鑾駕鹵簿九龍蓋皆同皇帝大駕鹵簿五色花蓋謹按崔豹古今注華蓋黄帝所作也與蚩尤戰於涿鹿之野有五色雲氣金枝玉葉於帝上有花蘤之象故因而作華蓋唐書儀衛志花蓋二元史輿服志華蓋制如繖而圓頂隆起赤質繡雜花乾隆十三年欽定大駕鹵簿五色花蓋五色緞為之各四每間以龍蓋二通繡雜花直柄餘俱如九龍曲蓋之制法駕騎駕鹵簿五色花蓋皆同皇帝大駕鹵簿五色龍蓋謹按桓譚新論三蓋之屬皆元黄五色乾隆十三年欽定大駕鹵簿五色龍蓋五色緞為之各二與花蓋相間直柄餘俱如九龍曲蓋之制法駕鹵簿五色龍蓋同皇帝大駕鹵簿方繖謹按宋史儀衛志繖古張帛避雨之制今有大繖方繖皆赤質紫表朱裏四角銅螭首元史輿服志紫方繖制如大繖而表以紫羅紅方繖制如大繖而表以緋羅乾隆十三年欽定大駕鹵簿方繖紅紫二色緞為之各四方五尺不施繡文四角出銅龍首垂五采流蘇直柄頂及柄尺寸俱如九龍曲蓋之制法駕鹵簿方繖同皇帝大駕鹵簿夀扇謹按崔豹古今注舜作五明扇秦漢公卿士大夫皆得用之魏晉非乗輿不得用明㑹典大駕鹵簿夀扇二乾隆十三年欽定大駕鹵簿夀扇黄緞為之通髙一丈一尺八寸扇圎徑三尺二寸繡青夀字一夾以五彩雙龍間流雲火珠中貫柄處飾藍緞上繡花文中繡流雲蝙蝠下繡山水文縁亦以藍週繡金囘文背黄緞銷金龍二約以金花翠葉柄攅竹髤朱長八尺五寸圍四寸六分鐓以銅髙一寸五分法駕鹵簿夀扇同皇帝大駕鹵簿雙龍扇一謹按宋史儀衛志殿庭立仗有雙盤龍扇明㑹典大駕鹵簿紅雙龍扇二十黄雙龍扇二十乾隆十三年欽定大駕鹵簿雙龍扇黄紅二色緞為之各八通髙一丈八寸扇圎徑三尺五寸繡五彩升降龍間以流雲紅緑暈二重周為襞積中貫柄處飾以藍上下為金蹲龍背為金團龍約以金花翠葉柄攅竹髤朱長七尺五寸圍四寸六分鐓以銅髙一寸五