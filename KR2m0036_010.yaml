武旌謹按乾隆十三年欽定大駕鹵簿振武旌繡金振武清漢文餘俱如教孝表節旌之制法駕鹵簿振武旌同皇帝大駕鹵簿敷文旌謹按乾隆十三年欽定大駕鹵簿敷文旌繡金敷文清漢文餘俱如教孝表節旌之制法駕鹵簿敷文旌同皇帝大駕鹵簿納言旌謹按乾隆十三年欽定大駕鹵簿納言旌繡金納言清漢文餘俱如教孝表節旌之制法駕鹵簿納言旌同皇帝大駕鹵簿進善旌謹按漢書文帝紀朝有進善之旌應劭注堯設之五達之道令民進善乾隆十三年欽定大駕鹵簿進善旌繡金進善清漢文餘俱如教孝表節旌之制法駕鹵簿進善旌同皇帝大駕鹵簿金節謹按周禮秋官小行人山國用虎節土國用人節澤國用龍節皆以金為之晉書輿服志左右節郎各四人宋史儀衛志金節隋制也黑漆竿上施圎盤周綴紅絲拂八層黄繡龍袋籠之元史輿服志崇天鹵簿武衛鈒㦸隊金節八乾隆十三年欽定大駕鹵簿金節朱紃貫朱旄八下繫朱緌屬於杆韜以黄紗通繡雲龍蓋緑緞羃之紅縁垂幨紅緑二重餘俱如長夀幢之制法駕鹵簿金節同皇帝大駕鹵簿儀鍠氅謹按唐書儀衛志黄麾仗第二行儀鍠五色幡宋史儀衛志氅本緝鳥毛為之今制有青緋皁白黄五色儀鍠鉞屬也秦漢有之唐用為儀仗刻木如斧上綴小錦幡五色帶乾隆十三年欽定大駕鹵簿儀鍠氅五色緞相間為之如絳引旛之制蓋如教孝表節旌而無彯帶儀鍠髙二尺五寸竹節刃銜以龍首貫金鈑形如雙鉞相背龍首繋氅杆如長夀幢之制法駕鹵簿儀鍠氅同皇帝大駕鹵簿黄麾謹按葛洪西京雜記漢大駕前黄麾崔豹古今注麾所以指麾乘輿以黄開元禮太宗制大麾色黄唐書儀衛志次後黄麾仗執者一人夾二人皆騎宋史儀衛志絳帛為之如幡錯采成黄麾字下繡交龍朱漆竿金龍首上垂朱緑小蓋元史輿服志黄麾幡制如信幡乾隆十三年欽定大駕鹵簿黄麾紅緞為之如信幡之制繡金黄麾清漢文蓋紅緞羃之黄縁垂幨紫緑黄三層餘俱如長夀幢之制法駕鹵簿黄麾同皇朝禮器圖式卷十
