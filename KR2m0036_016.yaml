body:
  text: 武備四火器御製金龍礟謹按明史兵志古所謂礟皆以機發石元初得西域礟攻金蔡州城始用火然造法不𫝊後亦罕用至明成祖平交阯得神機鎗礟法特置神機營肄習製用生熟赤銅相間其用鐵者建鐵柔為最西鐵次之大小不等大者發用車次及小者用架用樁用托大利於守小利於戰隨宜而用為行軍要器嘉靖八年造佛郎機礟謂之大將軍發諸邊鎮佛郎機者國名也正徳末其國舶至廣東得其制以銅為之長五六尺大者重千餘斤小者百五十斤萬厯中大西洋船至復得巨礟曰紅夷長二丈餘重者至三千斤能洞裂石城震數十里邱濬大學衍義補元人始造礟以攻破襄陽世因目曰襄陽礟今礟之制用銅或鐵如筒状中實以藥而以石子塞其口旁通一線用火發之聖祖仁皇帝御製金龍礟鑄銅為之前弇後豐厎如覆笠重自二百八十觔至三百七十觔長自五尺八寸至六尺通髤以漆前􅜭金龍火珠後􅜭金回文蕉葉文䕫龍厎􅜭金花文隆起四道旁為雙耳左右鐫大清康熈二十年御製清漢文受藥自六兩五錢至八兩鐵子自十三兩至十六兩載以雙輪車通髤朱箱繪蟠䕫中加鐵盤􅜭銀花文施機使可低昂上為鐵鋬承礟耳礟口背轅轅長一丈有五寸兩端飾銅龍首鳳尾中繪雲文輪各十有八輻御製制勝將軍礟謹按聖祖仁皇帝御製制勝將軍礟鑄銅為之前弇後豐底分𤓰棱重五百觔長五尺不鍥花文隆起四道近口為照星面鐫大清康熈三十四年景山内御製制勝將軍用藥一觔八兩生鐵子三觔星髙五分逺放酌量加藥移與斗上眼用之總管監造御前一等侍衛海清監造官員外郎巴福夀筆帖式碩思泰噶爾圖匠役李文徳袁四漢文載以雙輪車通髤以朱横梁承礟轅長一丈前横木二道輪各十有八輻御製威逺將軍礟謹按聖祖仁皇帝御製威逺將軍礟鑄銅為之前哆後歛形如仰鐘重七百五十觔長二尺五寸口鍥花文周鐫梵文中雙魚形間以荇藻隆起五道底横連鐵軸受藥自八兩至六觔鐵子自三十觔至三十五觔入藥礟内間以木加土寸許乃入鐵子復置藥子内以螺旋木繞藥線外裹朝鮮貢紙盛以竹筩入於子内後出線寸許以達礟藥前出六七寸以待然子外仍實火藥隔以濕土鐵鍱掩礟口固以蠟發時先然鐵子藥線再速然火門藥礟發子出迸裂四散為用最烈逺近以受藥若干及礟尺若干度為凖載以四輪車通髤朱軨長四尺九寸面立木以限鐵軸前後横梁後梁當礟中下承兩軸貫板輪不施輻神威大將軍礟謹按本朝制神威大將軍礟鑄銅為之前弇後豐厎少歛長八尺五寸不鍥花文隆起四道面鐫神威大將軍右鐫大清崇徳八年十二月日造重三千八百觔漢文受藥五觔鐵子十觔載以四輪車通髤朱横梁承礟耳轅長一丈五寸輪各十有八輻轅間加直木二外出端加横木鐵鐶九以挽之神威無敵大將軍礟謹按本朝制神威無敵大將軍礟鑄銅為之前弇後豐底如覆盂重自二千觔至三千觔長自七尺三寸至八尺不鍥花文隆起五道面鐫大清康熈十五年三月日造漢文受藥自三觔至四觔鐵子自六觔至八觔載以三輪車横梁承礟轅長一丈二尺二寸後二輪轅間一輪各十有八輻轅旁施鐵鐶以挽之神威將軍礟謹按本朝制神威將軍礟鑄銅為之前弇後豐厎如覆笠重四百觔長六尺七寸不鍥花文隆起五道近口為照星旁為雙耳中鐫大清康熈二十年鑄造神威將軍用藥八九兩鉛子十八兩星髙七分製法官南懐仁監造官法保錢齊布陶三泰寜古塔吳喇代匠役李文德顔四漢文載以雙輪車轅長九尺五寸不加繪飾端施鐵鐶餘俱如御製金龍礟車之制武成永固大將軍礟謹按本朝制武成永固大將軍礟鑄銅為之前弇後微豐底如竹節重自三千六百觔至七千觔長自九尺六寸至一丈一尺一寸雜鍥花文蕉葉文回文隆起十道皆鍥星文近口為照星厎左右鐫大清康熙二十八年鑄造武成永固大將軍用藥十觔生鐵礟子二十觔星髙四分九釐製法官南懐仁監造官佛保碩思泰作官王之臣匠役李文徳顔四清漢文小者受藥五觔鐵子十觔載以四輪車轅長一丈五尺鐵鐶七餘俱如神威大將軍礟車之制神功將軍礟謹按本朝制神功將軍礟鑄銅為之前弇後微豐厎如覆笠重千觔長七尺不鍥花文隆起五道近口為照星中鐫大清康熙二十八年鑄造神功將軍用藥一觔十二兩生鐵礟子三觔八兩星髙四分製法官南懐仁監造官佛保碩思泰作官王之臣匠役李文徳顔四漢文載以三輪車鐵索承礟轅長一丈二寸轅間板輪一不施輻餘俱如神威無敵大將軍礟車之制得勝礟謹按本朝制得勝礟鑄銅為之前弇後豐口如銅角重三百六十五觔長六尺三寸通髤以漆不鍥花文隆起三道旁為雙耳受藥六兩鐵子十二兩載以雙輪車通髤朱正箱為鐵鋬以承礟耳轅前後出長一丈二尺六寸端皆施鐵鐶輪在中各十有八輻九節十成礟謹按本朝制九節十成礟鑄銅為之前後若一前分九節後加厎各有螺旋分負以涉險逺用時合成之重自七百九十觔至七百九十八觔長自五尺一寸至六尺九寸底環螭三每節飾獸面三分鐫重若干受藥自一觔四兩至一觔八兩鐵子二觔八兩載以四輪車通髤朱軫平施輪處少濶長六尺一寸中加立木半規以承礟立木左右為鐵柱夾礟右柱長倍左曲向前加立表以為凖板輪不施輻衝天礟謹按本朝制衝天礟鑄鐵為之前哆後歛形如仰鐘重自三百觔至三百八十觔長一尺九寸五分隆起五道旁為雙耳近耳鍥花文受藥自六兩至一觔鐵子二十觔用法如御製威逺將軍礟載以四輪車亦如御製威逺將軍礟車之制鐵心銅礟謹按本朝制鐵心銅礟鑄銅為體内以鐵前弇後微豐口如螺旋重一百十觔長五尺六寸青緑色不鍥花文隆起六道受藥二兩四錢鐵子四兩八錢載以四輪車轅長一丈二尺一寸轅端横木加鐵鐶六餘俱如神威大將軍礟車之制子母礟一謹按本朝制子母礟鑄鐵為之前弇後豐厎如覆笠重九十五觔長五尺三寸通髤以漆不鍥花文隆起五道加星斗旁為雙耳子礟五如管連火門各重八觔受藥二兩二錢鐵子五兩礟面開孔與子礟相稱用時内之固以鐵鈕遞發之相續而速載以四輪車如凳形中貫鐵機以鐵鋬承礟耳下施四足横直皆楔以木後加斜木搘之足施鐵輪輪各八輻左右推挽惟所宜子母礟二謹按本朝制子母礟鑄鐵為之重八十五觔長五尺八寸末加木柄後曲而俯以鐵索聨於車上用法如子母礟一載以四輪車亦如子母礟一之制嚴威礟謹按本朝制嚴威礟鑄鐵為之前弇後豐厎如覆笠重三百十觔長五尺不鍥花文隆起五道旁為雙耳受藥十兩鐵子一觔四兩載以雙輪車如御製制勝將軍礟車之制紅衣礟謹按本朝制紅衣礟鑄鐵為之前弇後豐厎圓而淺重自一千五百觔至五千觔長自六尺六寸至一丈五寸中鍥雲螭隆起八道旁為雙耳受藥自二觔六兩至七觔八兩鐵子自五觔至十五觔載以三輪車如神威無敵大將軍礟車之制龍礟謹按本朝制龍礟鑄鐵為之形如金龍礟重百觔長四尺五寸通髤以漆口􅜭金蟬文中為雲龍近後為蟠螭隆起六道加星斗旁為雙耳受藥二兩四錢鐵子五兩二錢車如子母礟一之制竒礟謹按本朝制竒礟鑄鐵為之後通厎旁如牡鑰重三十觔長五尺五寸六分通髤以漆不鍥花文近口為照星中加斗素鐵火機旁為雙耳子礟四如管連火門受藥自九錢至一兩鐵子二兩六錢後加木柄曲而俯下為屈戍開柄以内子礟從牡鑰中固以鐵鈕遞發之相續而速柄末綴立𤓰形青縀為之載以鐵盤鐵鋬承礟耳下以三木搘之末鐵鐏行營信礟謹按本朝制行營信礟鑄鐵為之上下若一重自四十觔至八十觔長自一尺六寸至一尺八寸不鍥花文隆起四道受藥八兩置地發之渾銅礟謹按康熙二十年聖祖仁皇帝平定吳逆獲其所製渾銅礟蔵之武庫以備軍行之用礟鑄銅為之前弇後微豐底如覆笠重自一千二百觔至二千一百觔長自六尺至六尺一寸不鍥花文隆起九道旁為雙耳受藥自一觔十二兩至二觔八兩鐵子自三觔八兩至五觔載以雙輪車轅長九尺四寸端施横木餘俱如御製金龍礟車之製臺灣礟謹按康熙二十二年聖祖仁皇帝平定臺灣獲其所製礟蔵之武庫以備軍行之用礟鑄銅為之前弇後微豐口形如鉢重自三百觔至七千觔長自四尺三寸至一丈二寸雜鍥花文蕉葉文蟠螭人獸形間以畨書隆起十道中為龍文雙鈕可貫繩懸之受藥自一觔一兩至十觔鐵子自二觔二兩至二十觔載以四輪車通髤朱横梁承礟轅長一丈二尺七寸輪各十有八輻回礟謹按乾隆二十四年平定西域俘獲軍器無算上命皆蔵紫光閣以紀武成回礟鑄鐵為之前弇後豐長五尺口鍥蕉葉文通􅜭金銀花文隆起七道素鐵火機下屬於鞍木質䝉以革槖駞負之西師罙入屢得兹器即用以擊賊遐方異製克厎膚功敬登於册以附諸礟之末御製自來火大鎗謹按聖祖仁皇帝御製自來火大鎗鑄鐵為之重五觔九兩長三尺三寸六分口為蓮瓣微凹近口􅜭金回文藻文前起脊中面分四稜後圓皆􅜭金回文藻文􅜭金素火機銜石旁施􅜭金鏤花輪擊石發鎗受藥八分鐵子六分五釐芸香木牀末亦􅜭金义末飾羚羊角凡交鎗之制口加照星中加斗或於近火門加斗從斗中視星所指以為凖牀視鎗微短竅其端以内搠杖以樺木或角為之飾以銅或角長於鎗寸許牀下加木义曲而前鋭中施横梁前却惟所宜牀面置鎗束以韋三道御製自來火二號鎗謹按聖祖仁皇帝御製自來火二號鎗鑄鐵為之重三觔長二尺八寸口􅜭金獸面前起脊後四稜受藥一錢二分鐵子一錢八分五釐鸂鶒木牀牀末不加飾餘俱如御製自來火大鎗之制御製自來火小鎗謹按聖祖仁皇帝御製自來火小鎗鑄鐵為之重二觔十二兩長二尺四寸九分口􅜭金蕉葉文鍥索文星文前起脊中四稜周􅜭金如鐶二道後圓近火門為蟠螭受藥七分鐵子一錢烏拉松木牀牀末不加飾餘俱如御製自來火大鎗之制御製禽鎗謹按聖祖仁皇帝御製禽鎗鑄鐵為之重六觔長三尺五寸口􅜭金蓮瓣前起脊中四棱後圓近火門􅜭金雙螭環繞御製禽鎗篆文􅜭金素火機加星斗受藥二錢鐵子三錢四分髙麗木牀义末飾以角御製小禽鎗謹按聖祖仁皇帝御製小禽鎗鑄鐵為之重五觔七兩長三尺二寸八分受藥一錢五分鐵子二錢七分鸂鶒木牀牀末飾象牙花文餘俱如御製禽鎗之制皇帝御用虎神鎗謹按皇帝御用虎神鎗鑄鐵為之長四尺八寸口􅜭金蓮瓣前圓起脊後四稜􅜭金花火機加星斗雲楸木牀近斗處飾銀花文中􅜭金乾隆御用漢文左右鐫御製虎神鎗記清漢文牀末飾以角鏤花文底鐫虎神鎗藥用二錢五分子用七錢鐵八觔十兩鞘三觔十兩共重十二觔四兩漢文义以羚羊角為之皇帝御用舊神鎗謹按皇帝御用舊神鎗鑄鐵為之長三尺九寸通起脊􅜭金花火機加星斗雲楸木牀近斗飾銀花文中􅜭金乾隆御用末飾以角厎鐫舊神鎗藥用一錢六分子用三錢三分鐵六觔二兩鞘二觔六兩共重八觔八兩皆漢文义以羚羊角為之皇帝御用花準鎗謹按皇帝御用花準鎗鑄鐡為之長四尺三寸口􅜭金蕉葉文近口為索文前起脊中四稜周􅜭金如鐶四道後圓牀厎鐫花準鎗藥用二錢子用四錢四分鐡六觔八兩鞘二觔十二兩共重九觔四兩漢文餘俱如皇帝御用舊神鎗之制凡花鎗之制通冶鐡皺起為花文皇帝御用大凖鎗謹按皇帝御用大凖鎗鑄鐵為之長四尺三寸六分口􅜭金星文下亦為星文間索文近火門為蟠䕫牀厎鐫大凖鎗藥用二錢子用三錢八分鐵六觔六兩鞘二觔十四兩共重九