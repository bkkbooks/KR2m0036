body:
  text: 皇朝禮器圖式序五禮五器之文始著虞書若璣衡若作繪絺繡若笙鏞柷敔粲乎具列逮成周考工記乃詳載廣圍尺度與夫方色鈞鋝圜匡縝疏侈弇之差說者謂器之有圖實權輿是漢儒言禮圖者首推鄭康成自阮諶梁正夏侯伏明輩均莫之逮宋聶崇義彚輯禮圖而陸佃禮象陳祥道禮書復踵而穿穴之其書幾汗牛充棟然嘗念前之作者本精意以制器則器傳後之述者執器而不求精意則器敝要其歸不出臆說傅㑹二者而已我朝聖聖相承法物修明折衷大備維是敬天尊祖頒朝詰戎之典弗懈益䖍第所司展事具儀間沿前代舊式方名象數時有未協爰諏禮官自郊壇祭器及鹵簿儀仗輦輅以次釐正至冠服以彰物采樂器以備聲容宜準彞章允符定則而觀象臺儀器自皇祖親定閲數紀于今度次不免嵗差又武備器什有舊㑹典未經臚載者皆是範是程進御審定于以崇飭祀饗朝㑹軍旅諸大政顧弗薈萃成帙慮無以垂光䇿府于是按器譜圖系說左方區為六部用付剞劂俾永其傳夫籩豆簠簋所以事神明也前代以碗盤充數朕則依古改之至于衣冠乃一代昭度夏收殷冔本不相襲朕則依我朝之舊而不敢改焉恐後之人執朕此舉而議及衣冠則朕為得罪祖宗之人矣此大不可且北魏遼金以及有元凡改漢衣冠者無不一再世而亡後之子孫能以朕志為志者必不惑于流言于以綿國祚承天祐於萬斯年勿替引之可不慎乎可不戒乎是為序乾隆己卯夏六月既望御製并書和碩莊親王臣允祿等上言臣等奉勑纂修禮器圖告竣恭呈睿鑒臣等謹奉表恭進者伏以帝制光昭建古今之極則皇儀懋著炳宇宙之大文綜百代以定經綸質文兼至彚全編以彰物采法象常新惟執兩用中羣言必衷于聖斯惇典庸禮舊章大備于今慶洽黃圖輝生緑字臣等誠惶誠恐稽首頓首上言竊惟顯庸創制乃制治之洪模文物聲明繄熙朝之盛軌以格天祖則尊罍簠簋盥薦是將以涖臣民則車服旗常和鸞必叶嚴宿懸于庭燎則堂上堂下之聿分驗測景于靈臺則單環雙環之有辨至于冠裳垂定式用判等威介胄肅戎行爰搜軍實凡兹器數之燦列悉為經制之攸關是以觀象審音虞書肇其制太府司服周禮載其詳稽草創于叔孫野外徒傳綿蕝考薈萃于班固議奏亦集石渠韋公肅撰禮閣之新儀書闕有間聶崇義編建隆之圖說語焉未詳僅識趨時不免因陋就簡但知泥古復虞執一拘墟學步效顰皆嫌無當刻舟膠柱豈曰咸宜顯慶開元未必校讐之悉協政和嘉祐難期採掇之無訛苟非綜之有宗㑹之有原一稟上聖之親裁曷由㑹其有極歸其有極丕建隆儀于盡善欽惟我皇上金聲玉振咸五登三無黨無偏觀人文以化天下中規中矩考禮樂以等百王秉兢兢業業之心憲天出治樹蕩蕩巍巍之烈法祖宜民乃以勑幾貞度之餘彌殷慎憲省成之意溯自國初之創制多仍曩代之成規凡為豆籩圭俎之用于郊壇以暨儀仗輦輅之陳于朝㑹或形朴略或病拘牽或名象未極其雅馴或方色未諧于典要他如冠服雖有模范莫效編摩樂器雖備聲容罕經紀述況乃銅儀以占晷度恆星移而行次漸差武庫以飭兵儲令甲昭而㑹典失載特頒巽命丹綸翻竹素之藏丕煥離明玉局唘汗青之業參稽史志增略而芟煩搜采禮經去俗而崇雅絲聨繩貫頻請示于宸衷面命耳提咸折中于睿斷于是發凡起例若網在綱州次部居如裘挈領仿古人右史左圖之意故設色界畫咸作繪于卷端合一代朝章法物之詳而縷析條分每著說以闡義金科玉律總期宜古宜今赤簡丹書要在盡倫盡制有典有則按籍而毫髮無遺一器一名披圖而分刌可計當此青編之告竣適逢紫塞之歸誠瀚海天山版圖式廓金匱石室著述重新標以牙籖冠西崑之玉府宣來瓊笈麗東觀之珠囊誠哉冊府之巨觀允矣禮家之極軌臣等識同窺管藝比挈瓶逺愧左雄葺南官之故事近慙蘇冕纂唐世之舊儀幸得與于見知俾略攄其一得攜鉛抱槧親承天縱之能握素披黃自愧蕪辭之贅從此道德同而風俗一丹青絢爛無非聲律身度之精鴻綱舉而細目張典冊焜煌悉見麟趾關雎之意臣等無任榮幸之至謹奉表隨進以聞臣福隆安臣于敏中臣王際華謹奏臣等奉勑校勘皇朝禮器圖式告竣謹奉表恭進者伏以熙朝崇品節瑤編貽萬祀之型昭代煥儀章寶繪祕三霄之籍治定功成之㑹彌著中和禮明樂備之辰式彰美善惟崇效卑法講求已極夫精詳斯右史左圖撰述咸歸于典則光生册府象著曲臺臣等誠惶誠恐稽首頓首上言竊惟天下有三重議禮制度考文聖人等百王夏造殷因周監故為三為五宗伯掌禮以安邦有器有名太史執書以協事叔孫因時而草創曹褒集議以施行衛宏載筆于舊儀蔡雍成書于獨斷開元開寶屢效編摩義鑑義羅重徴名物宋公垂别成鹵簿之記李德裕獨摹服飾之圖郊廟禮文自元豐之詳定閣門儀制經李淑之增修釡鑊兼存斷以張昭之論尊彜改繪見于陸佃之書録禮閣之新儀舉政和之撮要蘇明允紀其因革陳祥道易以丹青稽儀衛于宋朝圖標延祐傳遺書于朱子器寫紹興或考古以證今或緣今而溯古夸張新制難云有本而有文掇拾舊章恆患或離而或合蓋規模鮮臻乎美盛由作述莫裕夫本原夫惟聖人垂衣裳而天下咸治是故大備舉禮樂則天地為昭欽惟我皇上道協大中功隆耆定撫萬年之嘉㑹郅治光華符必世之昌期大文制作敬天法祖用肅明禋成嵗授時聿先民事鐻鍝襲夫冠帶僸佅列于宫縣運德車樂御之神成釁甲包戈之績乃以萬幾之暇特申五禮之司酌百王損益之經成一代昭明之典本禮家之精意彰治世之鴻規永垂方䇿之文宜有圖書之紀成編既輯曽塵黼座之觀綸詔重申更啓琅函之祕因原文而勘定即成器以校讐一物一名貴毫釐之悉協有典有則必分寸之無差足徴睿鑒之周詳一凜宸衷之指示例仍其舊事增于前彚全部以上呈間二年而卒業臚豆登之成數􅌊鬯升香增儀象之新圖璿璣齊政冠服逮于執事儀度斯全鹵簿益以內廷等威咸秩樂器則區為八部美八音之克諧武備則釐以五門見五材之並用為分為合典肅于朝廟軍行必考必精美具乎聲明文物而且測量新製逺訖流沙奏凱和聲升歌樂府鞮鞻所掌廣回部之方音武庫攸藏著天山之俘獲咸仰大勳之永定特增舊籍所未詳布在簡編逢千載一時之盛登之卷帙昭八埏九域之同允稽古史志所莫臻更說禮諸家之未有此則超虞廷之作象邁周室之紀官者矣臣等學愧通經志存觀禮考厯朝之沿革際盛代之修明才匪康成首標圖于三禮說推崇義因舊本于六家惟矢志以寅清咸稟裁于乙夜牙籖玉軸鐫琬琰于千秋緑字赤文炳陸離之五色從此質文兼尚瀛海方州之內遵律度于無疆經曲咸宜石渠延閣之藏勒圖編于有永臣等無任榮幸之至謹奉表隨進以聞乾隆三十一年七月初五日皇朝禮器圖式總理禮器圖館事務和碩莊親王臣允祿總裁協辦大學士户部尚書臣蔣溥原任吏部尚書臣汪由敦兵部左侍郎臣觀保工部左侍郎臣三和原任禮部尚書現任翰林院編修臣何國宗提調郎中兼驍騎參領臣明山郎中兼驍騎參領佐領臣特克慎郎中兼佐領臣期成額員外郎兼佐領臣英敏員外郎臣伊昌阿副司庫臣清德副司庫臣官德收掌筆帖式臣德保謄録兼纂修候選布政司理問臣汪浩存候選布政司經歷臣韓紹賢生員臣朱珣監生臣陸宗桓挑選直𨽻河工試用州同臣于易簡候選縣丞臣左行遂監生臣程廷彥監生臣沈誠繪圖謄録候選從九品臣黃衟監生臣門應兆監生臣姜潤書供事山東嘉祥縣典史臣顧瀚江西廣豐縣典史臣楊瀚候選從九品臣王基臣髙景柴皇朝禮器圖式總裁字位過密無法顯示臣福隆安經筵講官户部尚書臣于敏中經筵講官戶部右侍郎兼署工部侍郎事務教習庶吉士臣王際華武英殿總裁兵部尚書兼管國子監事務臣陸宗楷兵部左侍郎世襲一等輕車都尉臣蔣檙提調戶部縀匹庫郎中兼武備院郎中臣書成管理六庫事務郎中臣六十九內務府員外郎兼佐領臣中敏內務府員外郎兼佐領臣英敏纂修翰林院編修教習庶吉士臣彭元瑞翰林院編修臣彭紹觀翰林院編修臣董誥原辦纂修事翰林院編修今任雲南道監察御史臣汪新校繕翰林院編修臣饒學曙翰林院編修臣胡髙望原辦校繕事翰林院侍講今任廣西蒼梧道臣周升桓收掌磁器庫司庫臣官德武英殿監造臣永善武備院筆帖式臣鄂羅里武英殿筆帖式臣文殊保庫掌臣塞勒庫掌臣伊靈阿柏唐阿臣依常阿柏唐阿臣依靈阿柏唐阿臣定安武英殿謄録貢生候選復設教諭臣周一鵬候選直𨽻州州判臣汪雍候選復設教諭臣葛善應候選直𨽻州州判臣陸國柱恩貢生臣熊朝選拔貢生臣宋振德繪圖人員候補八品筆帖式臣門應兆監生臣冷鑑布政司經歷銜臣劉墀監生臣蘇廷楷監生臣章佩瑜候選未入流臣余鳴鳳供事候選從九品臣葉丕箕候選從九品臣應天琇欽定四庫全書史部十三皇朝禮器圖式總目政書類二儀制之屬卷一祭器一卷二祭器二卷三儀器卷四冠服一卷五冠服二卷六冠服三卷七冠服四卷八樂器一卷九樂器二卷十鹵簿一卷十一鹵簿二卷十二鹵簿三卷十三武備一卷十四武備二卷十五武備三卷十六武備四卷十七武備五卷十八武備六臣等謹案欽定皇朝禮器圖式二十八卷乾隆二十四年奉敕撰乾隆三十二年又命廷臣重加校補勒為此編凡分六類一曰祭器二曰儀器三曰冠服四曰樂器五曰鹵簿六曰武備每器皆列圖於右系說於左詳其廣狹長短圍徑之度金玉璣貝錦假之質刻鏤繪畫組繡之制以及品數之多寡章采之等差無不縷析條分一一臚載考禮圖世稱始鄭亢而鄭志不載蓋𫝊其學者為之也阮諶以後踵而作者凡五家聶崇義滙合為一而諸本盡佚然諸家追述古制大抵皆約略𫝊注之文揣摩形似多不免於失真是編所述則皆昭代典章事事得諸目驗故毫釐畢肖分刌無訛聖世鴻規燦然明備其中儀器武備二類舊皆别自為書今乃列之於禮器與古例稍殊然周代視祲保章馮相所職皆天象而𨽻於春官禮有五目軍禮居三而所謂前朱雀而後元武左青龍而右白虎招搖在上急繕其怒者戰陳之令乃載於曲禮蓋禮者理也其義至大其所包者亦至廣故凡有制而不可越者皆謂之禮周官所述皆政典而兼得周禮之名蓋由於此今以儀器武備併歸禮樂正三代之古義未可以不類疑也若夫酌古宜今之精意奉天法祖之鴻規其見御製序文之中尤萬世臣民所當遵道遵路者矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書皇朝禮器圖式目録一卷一祭器一天壇正位蒼璧一匏爵三登一簠二簋二籩十二豆十二篚一俎一尊一配位五壇匏爵各三登各一簠各二簋各二籩各十二豆各十二篚各一俎各一尊各一位並同圖正不另從壇四位東西一壇陶爵各三盞各二十登各一簠各二簋各二籩各十豆各十篚各一俎各一尊各一同並位不另圖正東西二壇陶爵各三盞各三十壇並同圖東西一不另登各一位同另圖正不鉶各一簠各二簋各二籩各十豆各十篚各一位並同圖正不另俎各一尊各一位同另圖正不祈榖壇正位蒼璧一匏爵三登一簠二簋二籩十二豆十二篚一俎一尊一壇並同不另圖天正位配位五壇匏爵各三正同不另圖天壇位登各一簠各二簋各二籩各十二豆各十二篚各一俎各一尊各一正並同另圖天壇位不地壇正位黃琮一匏爵三正同不另圖天壇位登一簠二簋二籩十二豆