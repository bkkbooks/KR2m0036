body:
  text: 武備二武具一皇帝大閲櫜鞬謹按周禮夏官繕人掌王之用弓弩矢箙本朝定制皇帝大閱櫜鞬鞬以銀絲縀為之緑革縁天鵞絨裏面綴金鐶繫明黄緌櫜以革䝉銀絲縀後輭壺三以革為之皆飾金絲花銜東珠鞬弢弓及半櫜盛鈚箭五梅鍼箭五骲箭二懸以明黄帶紅片金裏襯石青縀繫鏤花金鈎飾金鉤孔三左右及後各金版三左旁加金版一皆銜東珠皇帝大禮隨侍櫜鞬謹按本朝定制皇帝大禮隨侍櫜鞬鞬以青倭縀為之櫜以革䝉青倭縀餘俱如大閱櫜鞬之制盛箭如大閲之數而異其制凡祭祀朝㑹駕出則以從皇帝吉禮隨侍櫜鞬謹按本朝定制皇帝吉禮隨侍櫜鞬鞬以金銀絲縀為之櫜以革䝉金銀絲縀皆銜紅寳石或藍寳石盛鈚箭七骲箭一哨箭二懸以明黄帶繫鏤花金鈎飾金鈎孔三左右各飾金雲文磬形旁各加金版銜鐶後亦為金雲文磬形一凡吉禮駕出具吉服則以從皇帝隨侍櫜鞬一謹按本朝定制皇帝隨侍櫜鞬鞬以黑布為之櫜以黑革為之不加銜飾盛鈚箭五梅鍼箭五骲箭一哨箭一兎乂箭一懸以明黄帶繫鏤花金鉤飾金鈎孔三左右及後金版各一左右旁金版銜鐶各一行幸常以從皇帝隨侍櫜鞬二謹按本朝定制皇帝隨侍櫜鞬皆以朱革為之結金絲花盛箭與吉禮隨侍同帶如隨侍櫜鞬一之制駕詣圓明園及還宫則以從行圍啟蹕迴鑾皆用之皇帝隨侍櫜鞬三謹按本朝定制皇帝隨侍櫜鞬皆以黒革為之結銀絲花盛箭與吉禮隨侍同帶如隨侍櫜鞬一之制凡令節朔望駕出則以從皇帝行圍櫜鞬謹按本朝定制皇帝行圍櫜鞬皆以黄革為之緑革縁櫜面綴金鐶繫明黄緌鞬布金釘十九皆雜飾金花銜緑松石盛鈚箭七哨箭三懸以明黄帶繫素金鈎綴於革版鈎孔三左右及後圓版各一左右旁加版銜鐶各一皆以黒革飾緑松石行圍躬佩之皇帝大閱弓謹按周禮夏官司弓矢中春獻弓弩王弓弧弓以授射考工記弓人天子之弓合九而成規凡為弓冬析幹而春液角夏治筋秋合三材寒奠體氷析灂本朝定制皇帝大閱弓桑木為幹面傅以角背傅筋䝉金桃皮弣加煖木皮置矢處加黒桃皮兩弰以檀木飾樺皮刻其末為弦彄外加角弦牀鹿角飾緑革弦以絲長四尺九寸五分置括處裹以革皇帝大禮隨侍弓謹按本朝定制皇帝大禮隨侍弓背飾金紅樺皮兩弰飾紅鯊魚皮弦以五采絲置括處不裹革餘俱如大閱弓之制皇帝隨侍弓謹按本朝定制皇帝隨侍弓弦置括處不裹革餘俱如大閱弓之制皇帝大閱鈚箭謹按考工記矢人夾其隂陽以設其比夾其比以設其羽爾雅釋器金鏃剪羽謂之鏃揚雄方言凡廣長而薄䥥謂之錍劉熙釋名其末曰括言與弦㑹也唐六典靃葉曰鈚本朝定制皇帝大閱鈚箭楊木為笴長三尺一寸鐵鏃長三寸薄而濶錽金藻文笴首飾黒桃皮皂雕羽括髤朱皇帝大閱梅鍼箭謹按茅元儀武備志有眉鍼箭本朝定制皇帝大閲梅鍼箭楊木為笴長三尺鐵鏃長三寸八分厚而前鋭後修笴首飾黒桃皮皂鵰羽羽間朱括旁裹緑繭皇帝大閲骲箭謹按爾雅釋器骨鏃不剪羽謂之志唐六典骨鏃曰骲開元文字平題今戱射箭也題頭也本朝定制皇帝大閲骲箭楊木為笴長三尺一寸骨骲長二寸九分起棱環穿八孔髤朱鏤緑雲文皂鵰羽括旁裹緑繭皇帝大禮隨侍鈚箭謹按本朝定制皇帝大禮隨侍鈚箭楊木為笴長三尺一寸鐵鏃長二寸九分中濶一寸六分前後閷錽金花文笴首飾黑桃皮皂鵰羽羽間朱括髤朱旁裹緑繭皇帝大禮隨侍骲箭謹按本朝定制皇帝大禮隨侍骲箭楊木為笴長三尺一寸角骲長二寸二分四棱環穿八孔斑文鵰羽羽間朱括髤朱旁裹緑繭皇帝吉禮隨侍鈚箭謹按本朝定制皇帝吉禮隨侍鈚箭鸞羽羽間繪藻文蟠䕫五采相間括旁裹緑繭餘俱如大閱鈚箭之制皇帝吉禮隨侍骲箭謹按本朝定制皇帝吉禮隨侍骲箭骲環穿四孔鸞羽羽間繪藻文蟠䕫五采相間括旁裹緑繭餘俱如大閲骲箭之制皇帝吉禮隨侍哨箭謹按唐六典鐵鏃曰鏑鳴箭曰骹本朝定制皇帝吉禮隨侍哨箭楊木為笴長三尺骹以骨為之長一寸二分環穿四孔銜鐵鏃長一寸四分制如鈚箭鏃鸞羽羽間繪藻文蟠䕫五采相間括旁裹緑繭皇帝隨侍鈚箭謹按本朝定制皇帝隨侍鈚箭笴全素餘如大閲鈚箭之制皇帝隨侍梅鍼箭謹按本朝定制皇帝隨侍梅鍼箭笴全素餘俱如大閱梅鍼箭之制皇帝隨侍骲箭謹按本朝定制皇帝隨侍骲箭角骲不髤朱鏤文笴全素餘俱如大閱骲箭之制皇帝隨侍哨箭謹按本朝定制皇帝隨侍哨箭笴全素餘俱如吉禮隨侍哨箭之制皇帝隨侍兎义箭謹按本朝定制皇帝隨侍兎义箭楊木為笴長二尺九寸角骲長一寸六分圓而前鋭起棱環穿五孔下接樺木長二寸五分施鐵齒四為二重上齒長一寸一分下齒長一寸二分末揱倒鈎向外笴全素皂鵰羽皇帝行圍鈚箭謹按本朝定制皇帝行圍鈚箭楊木為笴長二尺九寸鐵鏃長二寸五分濶一寸三分笴首飾黒桃皮皂鵰羽羽間朱括髤朱旁裹緑繭皇帝行圍哨箭謹按本朝定制皇帝行圍哨箭楊木為笴長二尺八寸骹以角為之形扁環穿四孔長一寸二分至二寸銜鐵鏃長二寸如鈚不鏤文皂鵰羽括髤朱旁裹紅樺皮以射鹿麅麞諸獸皇帝御用射侯箭一謹按本朝定制皇帝御用射侯箭楊木為笴長二尺九寸鐵鏃長二寸一分濶一寸四分形如鈚笴首飾黑桃皮鸛羽擰之微曲以取聲括髤朱皇帝御用射侯箭二謹按本朝定制皇帝御用射侯箭楊木為笴長二尺九寸鐵鏃長一寸二分濶七分形如鈚而小笴首飾黑桃皮孔雀羽羽間朱括髤朱旁裹緑繭射能及逺皇帝御用射鵠骲箭謹按本朝定制皇帝御用射鵠骲箭楊木為笴長二尺八寸羊角骲長一寸環穿五孔笴首飾黒桃皮花鵰羽括飾緑繭旁亦如之皇帝御用馬射骲箭一謹按本朝