body:
  text: 樂器二鹵簿巡幸耕藉采桑祭祀燕饗凱旋諸樂器鹵簿鼓吹大樂金謹按劉熙釋名金禁也為進退之禁也本朝定制鹵簿鼓吹大樂金範銅為之面平徑一尺四寸五分深二寸二分旁穿二孔以黃絨紃繫於木柄提之柄髤以朱擊以椎形如瓜黃韋為之柄亦髤朱巡幸鐃吹樂凱旋鐃歌樂金皆同鹵簿鼓吹大樂鉦謹按杜佑通典近世有如大銅叠縣而擊之以節鼓呼曰鉦馬端臨文獻通考鼓吹鉦其來尚矣今太常鼓吹部用之鉦形圓如銅鑼遼史樂志鼓吹前部第一金鉦十二元史禮樂志金鉦二制如銅槃本朝定制鹵簿鼓吹大樂鉦範銅為之形如槃面平徑八寸六分深一寸二分邊濶八分穿六孔兩孔相比周以木匡亦穿孔以黃絨紃聫屬之匡左右銅鐶二繫黃絨紃懸之於項擊以椎髤朱圓首鹵簿鼓吹大樂大銅角謹按隋書音樂志長鳴色角一百二十具供大駕唐書禮樂志平髙昌收其樂有銅角王圻三才圖會古角以木為之今以銅即古角之變體也其本細其末巨本常納於腹中用即出之本朝定制鹵簿鼓吹大樂大銅角範銅為之上斂下豐通長三尺六寸七分二釐平分各一尺九寸四分中為圓球銜其上納之於筒用則引而伸之上口徑四分下口徑六寸四分相銜處徑一寸四分上半藏二寸二分喙長一寸四分懸紅黃緌巡幸鐃吹樂凱旋鐃歌樂大銅角皆同鹵簿鼓吹大樂小銅角謹按隋書音樂志次鳴色角一百二十具供大駕本朝定制鹵簿鼓吹大樂小銅角範銅為之上直下哆通長四尺一寸上二尺三寸七分下一尺九寸四分各有圓球相銜引納如大銅角上口徑二分下口徑四寸三分相銜處徑五分上半藏二寸一分亦繫紅黃緌巡幸鐃吹樂凱旋鐃歌樂小銅角皆同鹵簿鼓吹大樂龍鼓謹按隋書音樂志大鼓小鼓大駕鼓吹並朱漆畫元史儀衛志崇天鹵簿雲和樂仗鼓三十本朝定制鹵簿鼓吹大樂龍鼓木匡冒革面徑一尺五寸三分中圍五尺四寸三釐五毫厚六寸四分面髤以黃緑緣朱匡並繪雲龍上下皆塗金釘旁金鐶四繫黃絨紃行則懸於項陳則置於架架為朱攢竹三兩端塗金貫以樞而搘之近下約以黃絨紃鼓衣如朝會中和韶樂大鼓之制鹵簿鼓吹大樂杖鼓謹按本朝定制鹵簿鼓吹大樂杖鼓面繪流雲中為太極上下綴金鈎各六匡髤以漆繪金花文腰繪金蕉葉文餘俱如朝會丹陛大樂杖鼓之制鹵簿鼓吹大樂畫角謹按晉書樂志黃帝始命吹角為龍鳴又云乘輿以為武樂本朝定制鹵簿鼓吹大樂畫角規木為之中虛腹廣兩端鋭長五尺四寸六分中圍一尺三寸五分九毫上徑外一寸二分一釐內七分六釐下徑外一寸四分四釐內八分六釐上下束以銅中束以藤五重塗金通髤以漆上為花文中為雲龍下為海馬兩端雲文並繪以金以木哨入角端吹之長七寸二分九釐亦髤以漆鹵簿導迎樂鼓謹按隋書音樂志鼓吹部十六人鼓一人本朝定制鹵簿導迎樂鼓木匡冒革面徑二尺四分中圍七尺六寸三分四釐髙一尺六寸二分面匡繪飾金鐶俱如龍鼓之制鼓衣紅縀為之緑垂幨皆繡雲龍鐶相對繫黃絨紃二人以朱杠舁行巡幸鐃吹樂銅鼓謹按王圻三才圖會銅鼓鑄銅為之虛其一面懸而擊之本朝定制巡幸鐃吹樂銅鼓範銅為之形如金面徑九寸七分二釐深一寸六分一釐中隆起八分一釐徑二寸六分七釐邊穿圓孔二以黃絨紃懸之擊以椎木質通結黃線凱旋鐃歌樂銅鼓同巡幸鐃吹樂銅㸃謹按王圻三才圖會㸃即古之更㸃以之配銅鼓謂之㸃子本朝定制巡幸鐃吹樂銅㸃範銅為之如銅鼓而小面徑四寸八分六釐深一寸八釐中隆起四分八釐徑一寸六分二釐穿孔繫紃亦如銅鼓擊以椎如鎛鐘擊具之制凱旋凱歌樂銅㸃同巡幸鐃吹樂正鈸謹按馬端臨文獻通考正銅鈸亦謂之銅盤南齊穆士素所造其圓數寸中間隆起如浮漚本朝定制巡幸鐃吹樂正鈸範銅為之左右合擊面徑俱六寸四分八釐中隆起一寸二分九釐六毫徑三寸二分四釐各穿圓孔以黃絨紃貫之凱旋鐃歌凱歌樂正鈸皆同巡幸鐃吹樂金口角謹按陳𤾉樂書陶侃表有奉獻金口角之說謂之吹金豈以金其口而名之耶本朝定制巡幸鐃吹樂金口角規木為管兩端銅口上弇下哆管長九寸八分九釐管上內徑三分一釐金口長二寸一分六釐為葫蘆形如小銅盤二管下內徑九分三釐金口長四寸八分六釐外徑四寸三分二釐前七孔後一孔刻管如竹節相間以蘆哨入管端吹之銅盤上小鐶各一繫黃絨紃末垂五采流蘇凱旋鐃歌樂金口角同巡幸鐃吹樂蒙古角謹按本朝定制巡幸鐃吹樂蒙古角規木為之中虛末哆上長四尺七寸三分下長三尺五寸二分金口長一尺六寸七分徑七寸二分九釐內徑微大而聲濁者雄微小而聲清者雌長短若一以角哨入管端吹之通髤以黃繪雲龍以銅束之凡銅飾皆塗金結黃絨紃垂紅黃粧縀小幡各一巡幸鐃吹樂平笛謹按元史禮樂志笛二斷竹為之七孔亦號長笛本朝定制巡幸鐃吹樂平笛通長一尺八寸二分八釐六毫首尾不加龍飾餘俱如朝會中和韶樂笛之制巡幸鐃吹樂行鼓謹按唐書南蠻𫝊雍羌獻其國樂有三面鼓二形如酒缸首廣下鋭冒以虺皮元史輿服志馬鼓凡行幸負鼓於馬以先馳本朝定制巡幸鐃吹樂行鼓一名陀羅鼓木匡冒革上豐下斂面徑一尺八分中圍四尺五分二釐底徑五寸一分厚一尺五寸一分面匡繪飾俱如龍鼓之制塗金釘二層塗金鐶四如半月形繫黃絨紃行則跨於馬上陳則置於架架為三柱髙三尺髤朱繪金雲龍貫以鐡樞懸以鐡鈎祭祀中和韶舞節謹按周禮春官旄人鄭康成注旄牛尾舞者所持以指麾馬端臨文獻通考爾雅曰和樂謂之節蓋樂之聲有鼓以節之其樂之容有節以節之故先代之舞有執節二人之說至今因之本朝定制祭祀中和韶舞節結旄為之朱杠長七尺二寸九分圍三寸二分七釐上曲為塗金龍首長九寸七分二釐銜旄九重各六寸四分八釐蓋以金葉束以緑皮繫長五寸七分六釐緌長七寸二分九釐司樂執以居前凡壇廟文武舞皆用之祭祀中和韶舞干謹按周禮春官司干掌舞器鄭康成注干舞者所持謂楯也春秋公羊𫝊萬者何干舞也馬端臨文獻通考朱質而繪以龍龍之外又繪以雜羽其繫之也以繡韋其屬繡韋也以紛舞者所執之干其制如此本朝定制祭祀中和韶舞干木質圭首中髙三尺六寸四分五釐旁髙三尺二寸四分上濶七寸二分九釐下濶六寸四分八釐上繪龍首加五采下繪交龍緣以五色羽文中心粉地朱書佾各四字曰雨𤾉時若四海永清倉箱大有八方敉寧奉三永奠得一為正百神受職萬國來庭背髤朱有曲木柄執以左手凡壇廟武舞皆用之祭祀中和韶舞戚謹按禮記明堂位朱干玉戚冕而舞大武鄭康成注戚斧也馬端臨文獻通考玉戚剝玉以飾其柄本朝定制祭祀中和韶舞戚木質髤以黑刃白自背至刃五寸一分二釐背濶一寸八分二釐刃濶四寸五分五釐厚一寸二分一釐柲自戚以上黑圭首如刃色長二寸八分八釐下朱長一尺五寸七分七釐圍三寸五分五釐執以右手凡壇廟武舞皆用之祭祀中和韶舞羽謹按周禮春官舞師掌教羽舞鄭康成注羽析白羽為之詩邶風右手秉翟孔頴達正義翟翟羽謂雉之羽也馬端臨文獻通考舞之所取者特鸐山雉耳以其羽尤可用為儀故也今太樂以雉羽攢叠為之而髤畫其柄本朝定制祭祀中和韶舞羽木柄植雉羽長二尺九寸一分六釐銜以塗金龍首四寸八分六釐柄髤朱長一尺九寸四分四釐圍九分七釐執以右手凡壇廟文舞皆用之祭祀中和韶舞籥謹按詩小雅籥舞笙鼓毛萇𫝊秉籥而舞春秋公羊𫝊籥者何籥舞是也馬端臨文獻通考吳季札見舞象簫南籥者象簫舞所執南籥以籥舞也本朝定制祭祀中和韶舞籥截竹為之長一尺七寸五分一釐徑四分六釐八毫六孔髤朱執以左手凡壇廟文舞皆用之耕藉禾詞樂鑼謹按陳暘樂書後魏宣武以後有打沙鑼本朝定制耕藉禾詞樂鑼範銅為之通塗以金面平徑一尺三寸深一寸六分旁穿二孔結黃絨紃提之擊以椎如鹵簿鼓吹大樂金椎之制采桑桑歌樂鑼同耕藉禾詞樂鼓謹按詩小雅琴瑟擊鼓以御田祖周禮春官籥章掌土鼓豳籥鄭康成注所擊者田鼓本朝定制耕藉禾詞樂鼓木匡冒革如龍鼓而微小面徑一尺三寸九分中圍五尺二分六釐厚六寸一分面匡及衣繪飾俱如龍鼓之制匡旁塗金鐶二繫黃絨紃懸之於項采桑桑歌樂鼓同燕饗清樂手鼓謹按馬端臨文獻通考聒鼓和鼓有柄王圻三才圖會手鼓制匾而小本朝定制燕饗清樂手鼓木匡冒革以柄貫而擎之面徑九寸一分中圍三尺二寸四釐厚二寸一分面素匡髤以朱並繪花文緑緣塗金釘上下銜金雲兩旁金鐶垂五彩流蘇頂髙五寸柄通長一尺五寸髤朱末飾金雲桴髤檀色燕饗清樂小杖鼓謹按元史禮樂志札鼓制如杖鼓而小左手持而右手擊之本朝定制燕饗清樂小杖鼓制如朝會丹陛大樂杖鼓而半之或為三之二綴金鈎上下各六面繪花文匡髤朱繪以金擊以杖亦同燕饗慶隆舞樂節謹按本朝定制燕饗慶隆舞殿廷用之盛京則曰世德舞凱旋則曰德勝舞隨所用樂章而異其名樂器皆同節編竹為之形如箕中徑一尺五寸七分旁徑一尺三寸六分口濶一尺九寸四分深一寸九分掌濶一尺五寸三分深三寸二分通髤以朱背繪虎形圓竹二上合下岐相距一寸九分通長一尺一寸五分亦髤朱舞時劃之以節樂燕饗慶隆舞樂筝謹按應劭風俗通筝形如瑟劉熙釋名筝施絃髙急筝筝然傅元筝賦序上崇似天下平似地中空凖六合本朝定制燕饗慶隆舞樂筝刳桐為之髤以黃緣緑十四絃通長四尺七寸三分八釐五毫前濶七寸二分九釐足髙八分一釐後濶六寸四分八釐足髙一寸二釐六毫前後梁髙濶俱四分三釐七毫砥穿孔二前四出徑二寸九分一釐六毫後上圓下平徑如之長三寸六分四釐施絃如瑟之制梁內絃長三尺六寸四分五釐各設柱以和之梁髤以緑旁周皆以赭繪藍䕫龍絃孔以象牙座四足斜交以樞搘之髤朱下有趺燕饗慶隆舞樂琵琶謹按劉熙釋名推手前曰琵引手却曰琶因以為名傅元琵琶賦序中虛外實天地象也盤員柄直陰陽叙也四絃法四時也本朝定制燕饗慶隆舞樂琵琶刳桐為之項曲槽橢面平背圓四絃惟第一絃朱通長三尺一寸一分五釐七毫槽濶八寸八釐厚一寸二分項濶八分八毫中厚一寸二分一釐三毫邊厚四分八釐五毫上端鑿空內絃以四軸綰之左右各二長三寸八分八釐絃自山口至槽面覆手二尺一寸六分山口上有四象下有十三品旁為兩新月形邊繪藍花文鋼條為膽匙頭以樟象以黃楊品以竹山口及軸以檀絃孔飾魚牙背繫黃絨紃燕饗慶隆舞樂三絃謹按馬端臨文獻通考蛇皮琵琶以蛇皮為槽厚一寸餘亦以楸木為面本朝定制燕饗慶隆舞樂三絃斫檀為之修柄方槽而刓其角冒以虺皮通長三尺二寸四分八釐柄長二尺九寸一分六釐上濶九分一釐厚如之下濶一寸七釐厚九分六釐槽長六寸六釐八毫濶五寸三分九釐三毫厚二寸六分九釐六毫匙頭鑿空內絃以三軸綰之左二右一長四寸四釐五毫槽面設柱絃自山口至柱長二尺五寸九分二釐柱以竹軸以檀或牙背繫黃絨紃燕饗畨部合樂三絃同燕饗慶隆舞樂奚琴謹按陳𤾉樂書奚琴出於弦鼗而形亦類焉其制兩弦間以竹片軋之本朝定制燕饗慶隆舞樂奚琴刳桐為之髤以朱龍首方柄長槽中凹半覆以木通長二尺八寸八分柄長一尺一寸五分二釐上濶一寸一釐下濶二寸八分八釐厚一寸五分槽長與柄等濶四寸九分九釐厚二寸二分七釐龍首後鑿空內絃以兩