body:
  text: 欽定四庫全書皇朝禮器圖式卷二祭器太廟奉先殿暨羣廟祭器太廟正殿玉爵謹按周禮天官太宰享先王贊玉几玉爵注宗廟獻用玉爵乾隆十三年欽定祭器太廟正殿用玉爵通髙五寸三分深二寸四分兩柱髙九分腹為藻紋三足相距各一寸六分髙二寸一分太廟正殿豋謹按儀禮少牢饋食禮上佐食羞胾兩瓦豆有醢亦用瓦豆陳鍔曰少牢饋食有瓦豆則宗廟亦用瓦豆矣乾隆十三年欽定祭器太廟正殿豋用黄色甆上口為囘紋腹及校足皆為蟠龍紋波紋頂上為垂雲紋中為蟠龍紋口為囘紋大小同天壇正位太廟正殿鉶謹按聶崇義三禮圖鈃天子以黄金飾乾隆十三年欽定祭器太廟正殿鉶範銅為之兩耳及縁飾以金髙四寸一分深四寸口徑五寸一分底徑三寸三分三足髙一寸三分三峯髙一寸形制花紋同天壇從位太廟正殿簠謹按陳祥道禮書祭外神用瓦器宗廟則當用木乾隆十三年欽定祭器太廟正殿簠木質髤以漆塗金四面飾以玉通髙四寸六分深二寸六分口縱六寸四分横八寸底縱五寸一分横六寸四分盖髙一寸四分口縱横與器同上有棱四周縱六寸四分横八寸花紋同天壇正位太廟正殿簋謹按儀禮疏凡簋皆用木而方鄭康成禮記注天子飾以玉乾隆十三年欽定祭器太廟正殿簋木質髤以漆塗金四面飾以玉通髙四寸二分深二寸一分口徑七寸二分底徑六寸盖髙一寸八分徑與口徑同上有棱四出髙一寸一分花紋同天壇正位太廟正殿籩謹按乾隆十三年欽定祭器太廟正殿籩編竹為之以絹飾裏頂及縁皆髤以漆黄色口繪雲紋大小同天壇正位太廟正殿豆謹按周禮春官外宗掌宗廟之祭祀佐王后薦玉豆眂豆籩疏凡王之豆籩皆玉飾之禮記明堂位殷玉豆方慤云加飾以玉于楬之上也乾隆十三年欽定祭器太廟正殿豆木質髤以漆塗金三方飾以玉通髙五寸五分深二寸口徑四寸九分校圍二寸足徑四寸七分盖髙二寸二分徑與口徑同頂髙五分花紋同天壇正位太廟正殿篚謹按乾隆十三年欽定祭器太廟正殿篚編竹為之四周髤以漆黄色髙五寸縱四寸九分横二尺二寸五分足髙七分葢髙一寸一分太廟正殿犧尊謹按周禮春官司尊彛春祠夏禴其朝踐用兩獻尊禮記禮器犧尊在西注犧周禮作獻明堂位犧象周尊也王肅注禮犧尊全刻牛形鑿背為尊乾隆十三年欽定祭器太廟正殿犧尊範銅為之作犧形尊加其上髙四寸八分口徑三寸三分腹圍一尺三寸五分四面有棱為回紋夔龍紋底徑二寸六分盖髙二寸一分徑與口徑同上為垂花紋下為䕫龍紋犧髙五寸一分長八寸三分孟春時享用之太廟正殿象尊謹按周禮春官司尊彛春祠夏禴其再獻用兩象尊王肅注禮象尊全刻象形鑿背為尊乾隆十三年欽定祭器太廟正殿象尊範銅為之作象形尊加其上髙四寸二分口徑三寸三分為垂雲紋腹圍一尺四寸四分全素底徑三寸盖髙一寸九分徑四寸象髙五寸二分長七寸一分孟夏時享用之太廟正殿著尊謹按周禮春官司尊彛秋嘗冬烝其朝獻用兩著尊注著地無足禮記明堂位著殷尊也乾隆十三年欽定祭器太廟正殿著尊範銅為之全素髙八寸五分深八寸二分口徑八寸三分底徑六寸八分孟秋時享用之太廟正殿壺尊謹按周禮春官司尊彛秋嘗冬烝其饋獻用兩壺尊注以壺為尊左𫝊尊以魯壺乾隆十三年欽定祭器太廟正殿壺尊範銅為之全素髙八寸四分深七寸九分口徑五寸二分項圍一尺二寸六分腹圍二尺一寸九分底徑五寸二分足徑四寸三分孟冬時享用之太廟正殿山尊謹按周禮春官司尊彛追享朝享其再獻用兩山尊注山尊山罍也禮記明堂位山罍夏后氏之尊也賈公彦云罍之於雷字别而同聲雷起於雲雲出於山故刻而畫之為山雲之形乾隆十三年欽定祭器太廟正殿山尊範銅為之髙九寸七分口徑五寸二分項圍九寸九分腹圍一尺六寸五分底徑三寸七分足徑五寸三分四面有棱中為山形旁為雷紋腹及跗皆為雲紋盖髙二寸四分徑五寸六分亦有棱如器之飾頂髙五分嵗暮祫祭用之太廟東廡陶爵謹按乾隆十三年欽定祭器太廟東廡陶爵用白色甆通髙四寸二分深二寸二分兩柱髙六分三足相距各一寸六分髙一寸八分花紋同天壇從位太廟東廡鉶謹按乾隆十三年欽定祭器太廟東廡鉶範銅為之髙四寸一分深四寸口徑五寸一分底徑三寸三分三足髙一寸三分葢髙二寸二分三峯髙一寸形制花紋同天壇從位太廟東廡簠謹按乾隆十三年欽定祭器太廟東廡簠木質髤以漆塗金通髙四寸六分深二寸六分口縱六寸四分横八寸底縱五寸一分横六寸四分蓋髙一寸四分口縱横與器同上有棱四周縱六寸四分横八寸形制花紋同天壇正位太廟東廡簋謹按乾隆十三年欽定祭器太廟東廡簋木質髤以漆塗金通髙四寸二分深二寸一分口徑七寸二分底徑六寸葢髙一寸八分徑與口徑同上有棱四出髙一寸一分形制花紋同天壇正位太廟東廡籩謹按乾隆十三年欽定祭器太廟東廡籩編竹為之以絹飾裏頂及縁皆髤以漆紅色通髙五寸五分深八分口徑四寸八分足徑四寸二分盖髙二寸徑與口徑同頂正圓髙四分太廟東廡豆謹按乾隆十三年欽定祭器太廟東廡豆木質髤以漆塗金通髙五寸五分深二寸口徑四寸九分校圍二寸足徑四寸七分蓋髙二寸二分徑與口徑同頂髙五分形制花紋同天壇正位太廟東廡篚謹按乾隆十三年欽定祭器太廟東廡篚編竹為之四周髤以漆紅色髙五寸縱五寸六分横二尺二寸五分足髙一寸葢髙一寸七分太廟東廡尊謹按乾隆十三年欽定祭器太廟東廡尊用白色甆通髙八寸二分口徑四寸七分腹圍二尺三寸三分底徑四寸足髙二分形制同天壇正位太廟西廡俎謹按乾隆十三年欽定祭器太廟西廡爼以木為之髤以漆紅色中區為二錫裏加葢外左右各銅環二六足有跗縱三尺九寸横二尺八寸通髙二尺七寸有竒實以少牢奉先殿金爵謹按開寳禮親祠太廟酌以玉斝亞獻以金斝詔飲福惟用金斝乾隆十三年欽定祭器奉先殿用金爵通髙三寸五分深一寸四分柱髙一寸一分為芝形腹為星紋三足相距各一寸髙一寸六分文廟正位銅爵謹按乾隆十三年欽定祭器文廟正位銅爵範銅為之通髙四寸六分深二寸三分兩柱髙七分三足相距各一寸五分髙二寸形制花紋同天壇從位文廟正位豋謹按乾隆十三年欽定祭器文廟正位豋範銅為之通髙六寸深二寸口徑四寸九分校圍六寸九分足徑四寸七分葢髙一寸六分徑四寸六分頂髙三分形制花紋同天壇正位文廟正位鉶謹按乾隆十三年欽定祭器文廟正位鉶範銅為之髙四寸一分深四寸口徑五寸一分底徑三寸三分三足髙一寸三分葢髙二寸二分三峯髙一寸形制花紋同天壇從位文廟正位簠謹按乾隆十三年欽定祭器文廟正位簠範銅為之通髙四寸六分深二寸一分口縱六寸四分横八寸底縱五寸一分横六寸四分葢髙一寸四分口縱横與器同上有棱四周縱四寸一分横六寸四分形制花紋同天壇正位文廟正位簋謹按乾隆十三年欽定祭器文廟正位簋範銅為之通髙四寸二分深二寸一分口徑七寸二分底徑六寸葢髙一寸八分徑與口徑同上有棱四出髙一寸一分形制花紋同天壇正位文廟正位籩謹按乾隆十三年欽定祭器文廟正位籩編竹為之以絹飾裏頂及縁皆髤以漆紅色通髙五寸四分深八分口徑四寸六分足徑四寸盖髙一寸九分徑與口徑同頂正圓髙四分文廟正位豆謹按乾隆十三年欽定祭器文廟正位豆範銅為之通髙五寸五分深二寸口徑四寸九分校圍二寸足徑四寸七分葢髙二寸二分徑與口徑同頂髙三分形制花紋同天壇正位文廟正位篚謹按乾隆十三年欽定祭器文廟正位篚編竹為之四周髤以漆紅色髙五寸縱五寸横二尺二寸五分足髙一寸葢髙一寸七分文廟正位尊謹按乾隆十三年欽定祭器文廟正位尊範銅為之通髙八寸六分口徑五寸一分腹圍二尺四寸底徑四寸六分形制同天壇正位天下第一泉龍王廟籩謹按乾隆十三年欽定祭器天下第一泉龍王廟籩範銅為之通髙五寸八分深九分口徑五寸為波紋腹為囘紋雲紋底徑四寸五分葢髙二寸一分為囘紋口徑與器同為波紋頂正圓髙五分皇朝禮器圖式卷二
