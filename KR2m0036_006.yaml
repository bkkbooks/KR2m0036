body:
  text: 欽定四庫全書皇朝禮器圖式卷六冠服三皇太后皇后皇貴妃以下至鄉君冠服皇太后皇后冬朝冠謹按本朝定制皇太后皇后冬朝冠薰貂為之上綴朱緯頂三層貫東珠各一皆承以金鳯飾東珠各三珍珠各十七上銜大東珠一朱緯上周綴金鳯七飾東珠各七貓睛石各一珍珠各二十一後金翟一飾貓睛石一小珍珠十六翟尾垂珠五行二就共珍珠三百有二每行大珍珠一中間金銜青金石結一飾東珠珍珠各六末綴珊瑚冠後護領垂明黃縧二末綴寶石青縀為帶皇太后皇后夏朝冠謹按本朝定制皇太后皇后夏朝冠青絨為之餘俱如冬朝冠皇太后皇后金約謹按本朝定制皇太后皇后金約鏤金雲十三飾東珠各一間以青金石紅片金裏後繫金銜緑松石結貫珠下垂五行三就共珍珠三百二十四每行大珍珠一中間金銜青金石結二每具飾東珠珍珠各八末綴珊瑚皇太后皇后耳飾謹按本朝定制皇太后皇后耳飾左右各三每具金龍銜一等東珠各二皇貴妃貴妃妃嬪皆同其東珠皇貴妃貴妃以二等妃以三等嬪以四等皇太子妃亦同珠以二等皇太后皇后朝褂一謹按本朝定制皇太后皇后朝褂色用石青片金緣繡文前後立龍各二下通襞積四層相間上為正龍各四下為萬福萬夀領後垂明黃縧其飾珠寶惟宜皇貴妃皇太子妃皆同皇太后皇后朝褂二謹按本朝定制皇太后皇后朝褂色用石青片金緣繡文前後正龍各一要帷行龍四中有襞積下幅行龍八領後垂明黃縧其飾珠寶惟宜縀紗單夾各以其時皇貴妃皇太子妃皆同皇太后皇后朝褂三謹按本朝定制皇太后皇后朝褂色用石青片金緣繡文前後立龍各二中無襞積下幅八寶平水領後垂明黃縧其飾珠寶惟宜縀紗單夾各以其時皇貴妃皇太子妃皆同皇太后皇后冬朝袍一謹按本朝定制皇太后皇后冬朝袍色用明黃披領及袖俱石青片金加貂緣肩上下襲朝褂處亦加緣繡文金龍九間以五色雲中無襞積下幅八寶平水披領行龍二袖端正龍各一袖相接處行龍各二領後垂明黃縧其飾珠寶惟皇貴妃同皇太后皇后冬朝袍二謹按本朝定制皇太后皇后冬朝袍色用明黃披領及袖俱石青片金加海龍緣肩上下襲朝褂處亦如緣繡文前後正龍各一兩肩行龍各一要帷行龍四中有襞積下幅行龍八領後垂明黃縧其飾珠寶惟宜餘俱如前皇貴妃同皇太后皇后冬朝袍三謹按本朝定制皇太后皇后冬朝袍色用明黃片金加海龍緣中無襞積裾後開餘俱如前皇貴妃同皇太后皇后夏朝袍一謹按本朝定制皇太后皇后夏朝袍色用明黃片金緣中有襞積縀紗單夾各惟其時餘俱如冬朝袍一皇貴妃同皇太后皇后夏朝袍二謹按本朝定制皇太后皇后夏朝袍色用明黃片金緣中無襞積裾後開縀紗單夾各惟其時餘俱如冬朝袍一皇貴妃同皇太后皇后領約謹按本朝定制皇太后皇后領約鏤金為之飾東珠十一間以珊瑚兩端垂明黃縧二中各貫珊瑚末綴緑松石各二皇太后皇后朝珠謹按本朝定制皇太后皇后朝服御朝珠三盤東珠一珊瑚二吉服朝珠一盤珍寶隨所御佛頭記念背雲大小墜珠寶雜飾惟其宜縧皆明黃色皇太后皇后綵帨謹按本朝定制皇太后皇后綵帨緑色繡文為五榖豐登佩針管鞶帙之屬縧皆明黃色皇貴妃皇太子妃皆同皇太后皇后冬朝裙謹按本朝定制皇太后皇后冬朝裙片金加海龍緣上用紅織金夀字縀下石青行龍粧縀皆正幅有襞積皇貴妃貴妃妃嬪皆同皇太子妃亦同皇太后皇后夏朝裙謹按本朝定制皇太后皇后夏朝裙片金緣縀紗各惟其時餘俱如冬朝裙皇貴妃貴妃妃嬪皆同皇太子妃亦同皇太后皇后吉服冠謹按本朝定制皇太后皇后吉服冠薰貂為之上綴朱緯頂用東珠皇貴妃貴妃皆同皇太后皇后龍褂一謹按本朝定制皇太后皇后龍褂色用石青繡文五爪金龍八團兩肩前後正龍各一襟行龍四下幅八寶立水袖端行龍各二春秋棉夾夏以紗冬以裘各惟其時皇貴妃貴妃妃皆同皇太子妃亦同皇太后皇后龍褂二謹按本朝定制皇太后皇后龍褂色用石青繡文五爪金龍八團兩肩前後正龍各一襟行龍四棉夾紗裘各惟其時皇太后皇后龍袍一謹按本朝定制皇太后皇后龍袍色用明黃領袖俱石青繡文金龍九間以五色雲福夀文采惟宜下幅八寶立水領前後正龍各一左右及交襟處行龍各一袖如朝袍裾左右開棉夾紗裘各惟其時皇貴妃同皇太后皇后龍袍二謹按本朝定制皇太后皇后龍袍色用明黃繡文五爪金龍八團兩肩前後正龍各一襟行龍四下幅八寶立水領袖及裙制俱如前棉夾紗裘各惟其時皇太后皇后龍袍三謹按本朝定制皇太后皇后龍袍色用明黃繡文五爪金龍八團兩肩前後正龍各一襟行龍四袖領及裾制俱如前棉夾紗裘各惟其時皇貴妃冬朝冠謹按本朝定制皇貴妃冬朝冠薰貂為之上綴朱緯頂三層貫東珠各一皆承以金鳯飾東珠各三珍珠各十七上銜大珍珠一朱緯上周綴金鳯七飾東珠各九珍珠各二十一後金翟一飾貓睛石一珍珠十六翟尾垂珠三行二就共珍珠一百九十二中間金銜青金石結一飾東珠珍珠各四末綴珊瑚冠後護領垂明黃縧二末綴寶石青縀為帶皇太子妃同皇貴妃夏朝冠謹按本朝定制皇貴妃夏朝冠青絨為之餘俱如冬朝冠皇太子妃同皇貴妃金約謹按本朝定制皇貴妃金約鏤金雲十二飾東珠各一間以珊瑚紅片金裏後繫金銜緑松石結貫珠下垂三行三就共珍珠二百有四中間金銜青金石結二每具飾東珠珍珠各六末綴珊瑚貴妃皇太子妃皆同皇貴妃領約謹按本朝定制皇貴妃領約鏤金為之飾東珠七間以珊瑚兩端垂明黃縧二中各貫珊瑚末綴珊瑚各二皇太子妃同皇貴妃朝珠謹按本朝定制皇貴妃朝服用朝珠三盤蜜珀一珊瑚二