body:
  text: 欽定四庫全書皇朝禮器圗式卷一祭器一天壇祈榖壇地壇暨各壇祭器天壇正位蒼璧謹按周禮春官大宗伯以蒼璧禮天注禮神者必象其類璧圜象天疏蒼𤣥皆是天色故用蒼也本朝定制天壇正位用蒼璧圜徑六寸一分好徑四分通厚七分有竒天壇正位匏爵謹按禮記郊特牲器用陶匏以象天地之性也宋開寳禮郊祀初獻以玉斚玉瓚亞獻以金斝終獻以匏斝慶厯中太常請皇帝獻天地配帝以匏爵本朝舊制圜丘用蒼玉爵乾隆十三年欽定祭器皇天上帝列聖配位俱用匏爵刳椰實之半不雕刻取尚質之義髙一寸八分深一寸三分口徑三寸七分金裏承以旃檀香為之其下岐出為三足象爵形髙二寸九分天壇正位豋謹按爾雅釋器瓦豆謂之豋鄭康成詩箋祀天用瓦豆陶器質也聶崇義三禮圖以其盛湆故有葢乾隆十三年欽定祭器天壇正位豋用青色甆通髙六寸一分深二寸一分口徑五寸校圍六寸六分足徑四寸五分口爲囘紋中爲雷紋柱爲饕餮足爲垂雲紋蓋高一寸八分徑四寸五分頂高四分上爲星紋中爲垂雲紋口亦爲囘紋天壇正位簠謹按周禮地官舍人注方曰簠盛稲粱器聶崇義云旊人為簋及豆皆以瓦為之雖不言簠以簋是相将之器亦應制在旊人亦有葢乾隆十三年欽定祭器天壇正位簠用青色甆通髙四寸四分深二寸三分口縱六寸五分横八寸厎縱四寸四分横六寸面為䕫龍紋束為回紋足為雲紋两耳附以䕫龍葢髙一寸六分口縦横與器同上有棱四周縱四寸八分横六寸四分亦附以壇龍耳天壇正位簋謹按周禮地官舍人注圎曰簋盛黍稷器考工記旊人疏云用瓦簋者祭天地外神尚質也乾隆十三年欽定祭器天壇正位簋用青色甆制圎而橢通髙四寸六分深二寸三分口徑七寸二分底徑六寸一分口為回紋腹為雲紋束為黻紋足為星雲紋两耳附以䕫鳳葢髙一寸八分徑與口徑同面為雲紋口為回紋上有棱四出髙一寸三分天壇正位籩謹按爾雅釋器竹豆謂之籩䟽引周禮籩人注籩以竹為之口有縢縁盛棗栗桃梅蔆芡脯修膴鮑糗餌之屬乾隆十三年欽定祭器天壇正位籩編竹為之以絹飾裏頂及縁皆髤以漆青色通髙五寸八分深九分口徑五寸足徑四寸五分葢髙二寸一分徑與口徑同頂正圓髙五分天壇正位豆謹按爾雅釋器木豆謂之豆鄉射記注豆宜濡物盛韲醢菹臡之屬宋史禮志元豐六年詳定禮文所言簠簋尊豆請改用陶乾隆十三年欽定祭器天壇正位豆用青色甆通髙五寸五分深一寸七分口徑五寸校圍六寸六分足徑四寸五分腹為垂雲紋回紋校圍波紋金鈑紋足為黻紋葢髙二寸三分徑與口徑同為波紋回紋頂為綯紐髙六分天壇正位篚謹按儀禮注篚竹器次尊孟子䟽篚以盛絲帛有葢乾隆十三年欽定祭器天壇正位篚編竹為之四周髤以漆青色髙五寸縱五寸六分横二尺三寸三分足髙一寸一分葢髙一寸八分天壇正位俎謹按禮記祭統三牲之俎眀堂位俎有虞氏以梡夏后氏以嶡殷以椇周以房俎鄭康成注梡形足四如案嶡為之距椇謂曲撓之也房謂足下跗上下两間有似於房乾隆十三年欽定祭器天壇正位俎以木為之髤以漆青色中虚錫裏外四周各銅環二四足有跗縱二尺三寸横三尺二寸通髙二尺三寸實以特牲天壇正位尊謹按鄭鍔曰尊以盛五齊三酒用以獻且上及于天故名曰尊祭天用瓦泰禮記眀堂位曰泰有虞氏之尊也孔穎達曰以考工記有虞氏上陶故知泰尊用瓦也周禮春官司尊彛注云太尊太古之瓦尊葢溯皇初之制莫質于此矣乾隆十三年欽定祭器天壇正位尊用青色甆純素通髙八寸四分口徑五寸一分腹圍二尺三寸七分厎徑四寸三分足髙二分两耳為犧首形天壇從位陶爵東西一壇謹按周禮太宰贊玉幣爵之事説文云爵禮器象雀之形陸佃禮象古銅爵有首有尾有柱有足有柄博古圖謂前若噣後若尾足修而鋭形若戈然两柱為耳乾隆十三年欽定祭器天壇從位爵用青色甆通髙四寸六分深二寸四分两柱髙七分三足相距各一寸八分髙二寸腹為雷紋饕餮形天壇從位琖東西一壇謹按眀堂位夏后氏以琖疏云以玉飾之前云玉琖仍雕是也乾隆十三年欽定祭器天壇從位琖用青色甆通髙一寸九分深一寸五分口徑三寸四分足徑一寸二分純素天壇從位鉶東西二謹按周禮亨人祭祀共鉶羮注謂羮加五味盛以鉶器也儀禮䟽據羮在鉶言之謂之鉶羮據器言之謂之鉶鼎漢書注曰鉶瓦器也乾隆十三年欽定祭器天壇從位鉶用青色甆髙三寸九分深三寸六分口徑五寸底徑三寸三分足髙一寸三分两耳為犧形口繪藻紋次回紋腹繪貝紋葢髙二寸五分繪藻紋回紋雷紋上有三峯髙九分飾以雲紋足紋同天壇從位俎東西二謹按乾隆十三年欽定祭器天壇從位俎以木為之髤以漆青色中區為三錫裏外銅環四八足有跗縱六寸有竒横三尺二寸通髙二尺六寸有竒實以太牢祈榖壇配位豋謹按乾隆十三年欽定祭器祈榖壇配位豋用青色甆通髙五寸三分深一寸九分口徑四寸五分校圍六寸足徑四寸二分葢髙一寸七分徑四寸形制花紋同天壇正位祈榖壇配位簠謹按乾隆十三年欽定祭器祈榖壇配位簠用青色甆通髙三寸八分深一寸七分口縦四寸八分横六寸二分厎縱三寸三分横四寸三分葢髙一寸五分上有棱四周縱三寸五分横四寸二分形制花紋同天壇正位祈榖壇配位簋謹按乾隆十三年欽定祭器祈榖壇配位簋用青色甆通髙四寸深一寸九分口徑六寸一分厎徑四寸五分葢髙一寸三分徑五寸五分上有棱四出髙八分形制花紋同天壇正位祈榖壇配位籩謹按乾隆十三年欽定祭器祈榖壇配位籩編竹為之通髙五寸二分深九分口徑四寸四分足徑四寸一分葢髙一寸八分徑與口徑同頂