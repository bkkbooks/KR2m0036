為蟠龍座髙一尺八寸五分縱一尺八寸横二尺二寸冬施紫貂坐具夏以明黄粧縀四足為螭首虎爪承以圓珠周繪雲龍踏几髙三寸一分縱九寸五分横二尺二寸籠以黄縀厎縱三尺四靣為横距直轅二各長一丈五尺五寸大横杆二各長七尺六寸中為雙龍首相對小横杆四各長二尺八寸肩杆八各長五尺六寸飾如禮輿之制亦舁以十六人駕出入常御之皇帝騎駕鹵簿輕步輿謹按宋史輿服志平輦亦曰太平輦飾如逍遥輦而無屋常行幸所御東封别造升山太平輦施機闗賜名曰登封輦中興之制赤質正方形如一朱龍倚而加長竿二制尤簡素乾隆十三年欽定騎駕鹵簿輕步輿木質髤朱不施幰葢通髙三尺四寸倚髙一尺五寸八分象牙為之座髙一尺八寸二分縱一尺八寸三分横二尺一寸踏几髙三寸縱九寸横二尺一寸五分髤以金直轅二各長一丈五尺四寸五分加銅龍首尾大横杆二各長九尺一寸小横杆四各長二尺八寸四分肩杆八各長五尺八寸五分皆鉆以銅餘各如步輿之制亦舁以十六人行幸常御之皇朝禮器圖式卷十一
