body:
  text: 鹵簿二皇帝鹵簿二皇帝大駕鹵簿八旗驍騎纛謹按乾隆十三年欽定大駕鹵簿八旗驍騎纛俱以縀為之各從其色鑲黄旗鑲白旗鑲藍旗皆紅縁鑲紅旗白縁俱左平右剡繡金雲龍縿徑四尺二寸斿中徑四尺上下各徑三尺斜徑各二尺二寸五分縁繡火燄周濶八寸正黄旗正白旗正紅旗正藍旗俱正幅亦繡金雲龍不加縁縿徑六尺斿徑四尺杆攢竹髤朱長一丈五尺五分圍四寸三分首冠鏤金火燄頂注朱旄鐓以鐡鋄銀髙五分通髙一丈六尺一寸五分法駕鹵簿八旗驍騎纛同皇帝大駕鹵簿八旗䕶軍纛謹按乾隆十三年欽定大駕鹵簿八旗䕶軍纛俱以縀為之各從其色鑲黄旗鑲白旗鑲藍旗皆紅縁鑲紅旗白縁正黄旗正白旗正紅旗正藍旗縁如旗色俱斜幅繡金雲龍縿徑四尺八寸斿徑六尺五寸斜徑八尺五寸縁為火燄形旁垂彯帶九尺五寸色與縁同亦火燄形杆如驍騎纛之制法駕鹵簿八旗䕶軍纛同皇帝大駕鹵簿八旗前鋒纛謹按乾隆十二年欽定大駕鹵簿八旗前鋒纛竿頂金盤植豹尾餘俱如驍騎纛之制法駕鹵簿八旗前鋒纛同皇帝大駕鹵簿五色金龍纛謹按宋史儀衛志五龍旗五元史輿服志五色龍旗五色質五色直脚無火燄大四色龍旗青赤黄白四色質乾隆十三年欽定大駕鹵簿五色金龍纛五色縀為之各八俱斜幅銷金雲龍不加縁縿徑五尺二寸斿徑六尺四寸五分斜徑九尺一寸杆如八旗驍騎纛之制法駕鑾駕騎駕鹵簿五色金龍纛皆同皇帝大駕鹵簿儀鳯旗謹按書益稷鳯皇來儀孔安國傳儀有容儀唐書儀衛志大駕鹵簿諸衛馬隊第十鳯旗元史輿服志金鳯旗赤質青火燄脚繪鳯而金色鳯旗制同前而繪以五采乾隆十三年欽定大駕鹵簿儀鳯旗月白緞為之斜幅繡鳯間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿儀鳯旗同皇帝大駕鹵簿翔鸞旗謹按山海經女牀之山有鳥焉其狀如翟而五彩文名曰鸞鳥見則天下安寧漢書賈捐之傳鸞旗在前唐書儀衛志大駕鹵簿諸衛馬隊第九鸞旗宋史儀衛志大駕鹵簿步甲前隊第八鸞旗二元史輿服志金鸞旗赤質火燄脚繪鸞而金色鸞旗制同前而繪以五采乾隆十三年欽定大駕鹵簿翔鸞旗月白縀為之斜幅繡鸞間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿翔鸞旗同皇帝大駕鹵簿瑞鶴旗謹按宋史儀衛志政和二年詔製瑞鶴旗乾隆十三年欽定大駕鹵簿瑞鶴旗月白縀為之斜幅繡鶴間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿瑞鶴旗同皇帝大駕鹵簿孔雀旗謹按山海經巴國有孔鳥郭璞注孔雀也宋史儀衛志大駕鹵簿步甲後隊第六孔雀旗二乾隆十三年欽定大駕鹵簿孔雀旗月白縀為之斜幅繡孔雀間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿孔雀旗同皇帝大駕鹵簿黄鵠旗謹按漢書昭帝紀黄鵠下建章宫太液池中公卿上夀顔師古注黄鵠大鳥也一舉千里乾隆十三年欽定大駕鹵簿黄鵠旗月白縀為之斜幅繡黄鵠間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿黄鵠旗同皇帝大駕鹵簿白雉旗謹按孝經援神契周成王時越裳獻白雉乾隆十三年欽定大駕鹵簿白雉旗月白縀為之斜幅繡白雉間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿白雉旗同皇帝大駕鹵簿赤烏旗謹按史記周本紀武王渡河有火自上復扵下至扵王屋流為烏其色赤唐書儀衛志大駕鹵簿諸衛馬隊第二十一蒼烏旗宋史儀衛志大駕鹵簿後部馬隊第九蒼烏旗二元史輿服志蒼烏旗赤質青火燄脚繪鳥如烏而色蒼乾隆十三年欽定大駕鹵簿赤烏旗月白縀為之斜幅繡赤烏間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿赤烏旗同皇帝大駕鹵簿華蟲旗謹按書益稷華蟲孔安國傳雉也爾雅釋禽鷩雉郭璞注似山雞而小背毛黄腹下赤項緑色鮮明邢昺䟽尚書謂之華蟲乾隆十三年欽定大駕鹵簿華蟲旗月白縀為之斜幅繡華蟲間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿華蟲旗同皇帝大駕鹵簿振鷺旗謹按詩周頌振鷺于飛宋史儀衛志政和鹵簿白鷺旗一乾隆十三年欽定大駕鹵簿振鷺旗月白縀為之斜幅繡振鷺間以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿振鷺旗同皇帝大駕鹵簿鳴鳶旗謹按禮記曲禮前有塵埃則載鳴鳶孔頴達正義鳶今時鴟也鴟鳴則風生風生則塵埃起前有塵埃起則畫鴟於旌首而載之宋史輿服志鳴鳶車載鳴鳶旌以絳帛為之畫鳴鳶於其上乾隆十三年欽定大駕鹵簿鳴鳶旗月白縀為之斜幅繡鳴鳶間以以彩雲縁及彯帶俱藍色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿鳴鳶旗同皇帝大駕鹵簿遊麟旗謹按淮南子昔者黄帝治天下鳯凰翔於庭麒麟逰於郊唐書儀衛志大駕鹵簿諸衛馬隊第七飛麟旗第十二麟旗宋史儀衛志大駕鹵簿步甲前隊第六飛麟旗二第九麟旗二元史輿服志麟旗赤質青火燄脚繪麒麟乾隆十三年欽定大駕鹵簿遊麟旗黄縀為之斜幅繡麒麟髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿遊麟旗同皇帝大駕鹵簿馴獅旗謹按爾雅釋獸狻麑如虦貓食虎豹郭璞注即師子也宋史儀衛志太祖詔造獅子旗乾隆十三年欽定大駕鹵簿馴獅旗黄縀為之斜幅繡馴獅髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿馴獅旗同皇帝大駕鹵簿白澤旗謹按宋書符瑞志黄帝時廵狩至扵東濱澤獸出能言達於萬物之情唐書儀衛志大駕鹵簿清游隊建白澤旗二乾隆十三年欽定大駕鹵簿白澤旗黄縀為之斜幅繡白澤髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿白澤旗同皇帝大駕鹵簿角端旗謹按宋書符瑞志角端者日行萬八千里又曉四裔之語聖主在位明達外方幽逺之事則捧書而至唐書儀衛志大駕鹵簿諸衛馬隊第十三角端旗宋史儀衛志後部馬隊第一角端旗二元史輿服志角端旗青質赤火燄脚繪獸如羊而小尾頂有獨角乾隆十三年欽定大駕鹵簿角端旗黄縀為之斜幅繡角端髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿角端旗同皇帝大駕鹵簿赤熊旗謹按孝經援神契赤熊神靈滋液百珍唐書儀衛志大駕鹵簿諸衛馬隊第十四赤熊旗宋史儀衛志大駕鹵簿後部馬隊第二赤熊旗二元史輿服志赤熊旗赤質赤火燄脚繪獸如熊乾隆十三年欽定大駕鹵簿赤熊旗黄縀為之斜幅繡赤熊𫝊兩翼髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿赤熊旗同皇帝大駕鹵簿黄羆旗謹按詩大雅赤豹黄羆爾雅釋獸羆如熊黄白文宋史儀衛志政和鹵簿羽林有赤豹黄熊旗宣和黄熊旗改黄羆乾隆十三年欽定大駕鹵簿黄羆旗黄縀為之斜幅繡黄羆𫝊兩翼髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿黄羆旗同皇帝大駕鹵簿辟邪旗謹按漢書西域𫝊烏弋有桃㧞師子犀牛孟康注桃拔一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪唐書儀衛志大駕鹵簿諸衛馬隊第一辟邪旗宋史儀衛志大駕鹵簿步甲前隊第十二辟邪旗二元史輿服志辟邪旗赤質赤火燄脚繪獸形似鹿長尾二角乾隆十三年欽定大駕鹵簿辟邪旗黄縀為之斜幅繡辟邪髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿辟邪旗同皇帝大駕鹵簿犀牛旗謹按爾雅釋獸犀似豕郭璞注形似水牛唐書儀衛志大駕鹵簿諸衛馬隊第十七犀牛旗宋史儀衛志紹興鹵簿步甲前隊第六犀旗二元史輿服志犀牛旗赤質青火燄脚繪犀牛乾隆十三年欽定大駕鹵簿犀牛旗黄縀為之斜幅繡犀牛髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿犀牛旗同皇帝大駕鹵簿天馬旗謹按山海經馬成之山有獸焉其狀如白犬而黒頭見人則飛其名曰天馬史記大宛列𫝊多善馬馬汗血其先天馬子也漢書禮樂志天馬徠從西極唐書儀衛志大駕鹵簿諸衛馬隊第三玉馬旗第十一飛黄旗宋史儀衛志大駕鹵簿掩尾天馬旗二元史輿服志玉馬旗赤質青火燄脚繪白馬兩膊有火燄飛黄旗赤質赤火燄脚形如馬色黄有兩翼乾隆十三年欽定大駕鹵簿天馬旗黄縀為之斜幅繡天馬𫝊兩翼髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿天馬旗同皇帝大駕鹵簿天鹿旗謹按宋書符瑞志天鹿者純靈之獸也五色光耀洞明王者道備則至唐書儀衛志大駕鹵簿諸衛馬隊第六黄鹿旗王應麟玉海開寳時瓊州獻白鹿加仙鹿旗宋史儀衛志大駕鹵簿步甲前隊第五黄鹿旗二步甲後隊第三仙鹿旗二元史輿服志黄鹿旗赤質青火燄脚繪獸如鹿而色深黄乾隆十三年欽定大駕鹵簿天鹿旗黄縀為之斜幅繡天鹿髃起火燄間以彩雲縁及彯帶俱紅色為火燄形尺寸如八旗䕶軍纛杆如八旗驍騎纛之制法駕鹵簿天鹿旗同皇帝大駕鹵簿青龍旗謹按禮記曲禮行前朱鳥而後元武左青龍而右白虎陳澔集説四方宿名也以為旗章馬端臨文獻通考唐制左青龍旗一宋史儀衛志大駕鹵簿次青龍白虎旗各一左右道元史輿服志青龍旗青質繪蹲龍乾隆十三年欽定大駕鹵簿青龍旗青縀為之斜幅不加縁繡金蹲龍銜火珠間以流雲縿徑五尺二寸五分斿徑六尺四寸五分斜徑九尺杆如八旗驍騎纛之制法駕鹵簿青龍旗同皇帝大駕鹵簿白虎旗謹按馬端臨文獻通考唐制右白虎旗一元史輿服志白虎旗白質繪蹲虎乾隆十三年欽定大駕鹵簿白虎旗白縀為之斜幅不加縁繡金蹲虎髃起火燄間以流雲尺寸如青龍旗杆如八旗驍騎纛之制法駕鹵簿白虎旗同皇帝大駕鹵簿朱雀旗謹按馬端臨文獻通考唐制朱雀旗一宋史儀衛志次朱雀旗一中道元史輿服志朱雀旗赤質繪朱雀其形如鸞乾隆十三年欽定大駕鹵簿朱雀旗紅縀為之斜幅不加縁繡金朱雀間以流雲尺寸如青龍旗杆如八旗驍騎纛之制法駕鹵簿朱雀旗同皇帝大駕鹵簿神武旗謹按馬端臨文獻通考唐制元武旗一宋史儀衛志次真武隊中道仙童螣蛇真武神龜旗各一宣和改真武為元武又去仙童龜蛇旗元史輿服志元武旗黒質繪龜蛇乾隆十三年欽定大駕鹵簿神武旗黒縀為之斜幅不加縁繡金龜蛇相糾間以流雲尺寸如青龍旗杆如八旗驍騎纛之制法駕鹵簿神武旗同皇帝大駕鹵簿江瀆旗謹按爾雅釋水江淮河濟為四瀆宋史儀衛志陶榖作四瀆旗大駕鹵簿四瀆神旗各一紹興鹵簿四瀆旗江淮在左河濟在右元史輿服志江瀆旗赤質乾隆十三年欽定大駕鹵簿江瀆旗紅縀為之斜幅不加縁中正方繡江瀆尺寸如青龍旗杆如八旗驍騎纛之制法駕鹵簿江瀆旗同皇帝大駕鹵簿河瀆旗謹按元史輿服志河瀆旗黒質明㑹典白質乾隆十三年欽定大駕鹵簿河瀆旗白縀為之斜幅不加縁中正方繡河瀆尺寸如青龍旗杆如八旗驍騎纛之制法駕鹵簿河瀆旗