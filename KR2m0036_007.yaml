front:
  text: 欽定四庫全書皇朝禮器圖式卷七
  hash: sha256:ad7a777ac6e1064200525c3f4522e05243e9b6bd5aadfd9438ab3df933c16862
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0036_WYG_007-1a, image: WYG0656/WYG0656-0417a.png}
body:
  text: 冠服四民公夫人以下冠服民公夫人冬朝冠謹按本朝定制民公夫人冬朝冠薰貂為之上綴朱緯頂鏤花金座中飾東珠四上銜紅寶石前綴金簮三飾以珠寶護領縧用石青色其冠簮及縧色下達命婦俱如之民公夫人夏朝冠謹按本朝定制民公夫人夏朝冠青絨為之餘俱如冬朝冠其冠制下達命婦俱如之民公夫人金約謹按本朝定制民公夫人金約青縀為之紅片金裏中綴鏤金火焰飾珍珠一左右金龍鳳各一後垂青縀帶二亦紅片金裏下至七品命婦皆同民公夫人耳飾謹按本朝定制民公夫人耳飾左右各三每具金雲銜珠各二下至七品命婦皆同民公夫人朝褂謹按本朝定制民公夫人朝褂色用石青片金緣繡文前行蟒二後行蟒一領後垂石青縧雜飾惟宜下至七品命婦皆同民公夫人冬朝袍謹按本朝定制民公夫人冬朝袍藍及石青諸色隨所用披領及袖俱石青片金加海龍緣繡文前後正蟒各一兩肩行蟒各一襟行蟒四中無襞積披領行蟒二袖端正蟒各一袖相接處行蟒各二後垂石青縧雜飾惟宜下至三品命婦奉國將軍夫人皆同民公夫人夏朝袍謹按本朝定制民公夫人夏朝袍片金緣制如冬朝袍下至三品命婦奉國將軍夫人皆同民公夫人領約謹按本朝定制民公夫人領約鏤金為之飾紅藍小寶石五兩端垂石青縧二中各貫珊瑚末綴珊瑚各二下至七品命婦皆同民公夫人朝珠謹按本朝定制民公夫人朝珠三盤珊瑚青金緑松蜜珀隨所用雜飾各惟其宜縧用石青色下至五品命婦皆同民公夫人綵帨謹按本朝定制民公夫人綵帨月白色不繡花文雜佩惟宜縧皆石青色下至七品命婦皆同民公夫人冬朝裙謹按本朝定制民公夫人冬朝裙片金加海龍緣上用紅縀下石青行蟒粧縀皆正幅有襞積下至三品命婦奉國將軍夫人皆同民公夫人夏朝裙謹按本朝定制民公夫人夏朝裙片金緣縀紗各惟其時餘俱如冬朝裙下至三品命婦奉國將軍夫人皆同民公夫人吉服冠謹按本朝定制民公夫人吉服冠薰貂為之頂用珊瑚侯伯夫人一品命婦鎮國將軍夫人子夫人皆同其冠制下達命婦俱如之民公夫人吉服褂謹按本朝定制民公夫人吉服褂色用石青繡花八團下至七品命婦皆同民公夫人蟒袍謹按本朝定制民公夫人蟒袍藍及石青諸色隨所用通九蟒皆四爪下至三品命婦奉國將軍夫人皆同侯夫人冬朝冠謹按本朝定制侯夫人冬朝冠頂鏤花金座中飾東珠三上銜紅寶石侯夫人夏朝冠謹按本朝定制侯夫人夏朝冠頂飾俱如冬朝冠伯夫人冬朝冠謹按本朝定制伯夫人冬朝冠頂鏤花金座中飾東珠二上銜紅寶石伯夫人夏朝冠謹按本朝定制伯夫人夏朝冠頂飾俱如冬朝冠一品命婦冬朝冠謹按本朝定制一品命婦冬朝冠頂鏤花金座中飾東珠一上銜紅寶石鎮國將軍夫人子夫人皆同一品命婦夏朝冠謹按本朝定制一品命婦夏朝冠頂飾俱如冬朝冠鎮國將軍夫人子夫人皆同二品命婦冬朝冠謹按本朝定制二品命婦冬朝冠頂鏤花金座中飾紅寶石一上銜鏤花珊瑚輔國將軍夫人男夫人皆同二品命婦夏朝冠謹按本朝定制二品命婦夏朝冠頂飾俱如冬朝冠輔國將軍夫人男夫人皆同二品命婦吉服冠謹按本朝定制二品命婦吉服冠頂鏤花珊瑚輔國將軍夫人男夫人皆同三品命婦冬朝冠謹按本朝定制三品命婦冬朝冠頂鏤花金座中飾紅寶石一上銜藍寶石奉國將軍夫人同三品命婦夏朝冠謹按本朝定制三品命婦夏朝冠頂飾俱如冬朝冠奉國將軍夫人同三品命婦吉服冠謹按本朝定制三品命婦吉服冠頂用藍寶石奉國將軍夫人同四品命婦冬朝冠謹按本朝定制四品命婦冬朝冠頂鏤花金座中飾小藍寶石一上銜青金石奉恩將軍夫人同四品命婦夏朝冠謹按本朝定制四品命婦夏朝冠頂飾俱如冬朝冠奉恩將軍夫人同四品命婦朝袍謹按本朝定制四品命婦朝袍藍及石青諸色隨所用披領及袖俱石青片金緣繡文前後行蟒各二中無襞積後垂石青縧雜飾惟宜下至七品命婦皆同四品命婦朝裙謹按本朝定制四品命婦朝裙片金緣上用緑縀下石青行蟒粧縀皆正幅有襞積下至七品命婦皆同四品命婦吉服冠謹按本朝定制四品命婦吉服冠頂用青金石奉恩將軍夫人同四品命婦蟒袍謹按本朝定制四品命婦蟒袍藍及石青諸色隨所用通八蟒皆四爪奉恩將軍夫人五六品命婦皆同五品命婦冬朝冠謹按本朝定制五品命婦冬朝冠頂鏤花金座中飾小藍寶石一上銜水晶五品命婦夏朝冠謹按本朝定制五品命婦夏朝冠頂飾俱如冬朝冠五品命婦吉服冠謹按本朝定制五品命婦吉服冠頂用水晶六品命婦冬朝冠謹按本朝定制六品命婦冬朝冠頂鏤花金座中飾小藍寶石一上銜硨磲六品命婦夏朝冠謹按本朝定制六品命婦夏朝冠頂飾俱如冬朝冠六品命婦吉服冠謹按本朝定制六品命婦吉服冠頂用硨磲七品命婦冬朝冠謹按本朝定制七品命婦冬朝冠頂鏤花金座中飾小水晶一上銜素金七品命婦夏朝冠謹按本朝定制七品命婦夏朝冠頂飾俱如冬朝冠七品命婦吉服冠謹按本朝定制七品命婦吉服冠頂用素金七品命婦蟒袍謹按本朝定制七品命婦蟒袍藍及石青諸色隨所用通五蟒皆四爪皇朝禮器圖式卷七
