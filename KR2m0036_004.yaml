body:
  text: 冠服一皇帝冠服皇太子皇子宗室王公額駙冠服皇帝冬朝冠謹按本朝定制九月十五日或二十五日皇帝御冬朝冠薰貂為之十一月朔至上元用黑狐上綴朱緯頂三層貫東珠各一皆承以金龍各四飾東珠如其數上銜大珍珠一皇帝夏朝冠謹按本朝定制三月十五日或二十五日皇帝御夏朝冠織玉草或藤絲竹絲為之縁石青片金二層裏用紅片金或紅紗上綴朱緯前綴金佛飾東珠十五後綴舍林飾東珠七頂如冬朝冠皇帝端罩一謹按本朝定制十一月朔至上元皇帝御端罩黒狐為之明黄縀裏左右垂帶各二下廣而鋭色與裏同皇帝端罩二謹按本朝定制皇帝端罩紫貂為之裏及垂帶俱如黑狐端罩皇帝衮服謹按本朝定制皇帝衮服色用石青繡五爪正面金龍四圍兩肩前後各一其章左日右月前後萬夀篆文間以五色雲春秋棉祫夏以紗冬以裘各惟其時皇帝冬朝服一謹按本朝定制十一月朔至上元皇帝御冬朝服色用明黄惟南郊祈榖用藍披領及裳俱表以紫貂袖端薰貂繡文兩肩前後正龍各一襞積行龍六列十二章俱在衣間以五色雲皇帝冬朝服二謹按本朝定制九月十五日或二十五日皇帝御冬朝服色用明黄惟朝日用紅披領及袖俱石青片金加海龍縁繡文兩肩前後正龍各一要帷行龍五衽正龍一襞積前後團龍各九裳正龍二行龍四披領行龍二袖端正龍各一列十二章日月星辰山龍華蟲黼黻在衣宗彛藻火粉米在裳間以五色雲下幅八寳平水皇帝夏朝服謹按本朝定制三月十五日或二十五日皇帝御夏朝服色用明黄惟雩祭用藍夕月用月白披領及袖俱石青片金縁縀紗單袷各惟其時餘俱如冬朝服皇帝朝珠謹按本朝定制皇帝朝珠用東珠一百有八佛頭記念背雲大小墜珍寳雜飾各惟其宜大典禮御之惟祀天以青金石為飾祀地珠用蜜珀朝日用珊瑚夕月用綠松石吉服朝珠珍寳隨所御縧皆明黄色皇帝朝帶一謹按本朝定制皇帝朝帶色用明黄龍文金圓版四飾紅寳石或藍寳石及緑松石毎具銜東珠五圍珍珠二十左右佩帉淺藍及白各一下廣而鋭中約鏤金圓結飾寳如版圍珠各三十佩囊文繡燧觿刀削結佩惟宜縧皆明黄色大典禮御之皇帝朝帶二謹按本朝定制皇帝朝帶色用眀黄龍文金方版四其飾祀天用青金石祀地用黄玉朝日用珊瑚夕月用白玉每具銜東珠五佩帉及縧惟圜丘用純青餘如圎版朝帶之制中約圎結如版飾銜東珠各四佩囊純石青左觽右削並從版色皇帝冬吉服冠謹按本朝定制皇帝冬吉服冠御用之期與朝冠同海龍為之立冬後易薫貂或紫貂各惟其時上綴朱緯頂滿花金座上銜大珍珠一皇帝夏吉服冠謹按本朝定制皇帝夏吉服冠御用之期與朝冠同織玉草或藤絲竹絲為之紅紗綢為裏石青片金縁上綴朱緯頂如冬吉服冠皇帝龍袍謹按本朝定制皇帝龍袍色用明黄領袖俱石青片金縁繡文金龍九列十二章間以五色雲領前後正龍各一左右及交襟處行龍各一袖端正龍各一下幅八寳立水裾左右開棉袷紗裘各惟其時皇帝吉服帶謹按本朝定制皇帝吉服帶色用明黄鏤金版四方圓惟便銜以珠玉雜寳各從其宜左右佩帉純白下直而齊中約金結如版飾餘俱如朝帶常服帶同皇帝冬常服冠謹按本朝定制皇帝冬常服冠御用之期與朝冠同紅絨結頂餘俱如冬吉服冠皇帝夏常服冠謹按本朝定制皇帝夏常服冠御用之期與朝冠同紅絨結頂餘俱如夏吉服冠皇帝常服褂謹按本朝定制皇帝常服褂色用石青花文隨所御棉袷紗裘各惟其時皇帝常服袍謹按本朝定制皇帝常服袍色及花文隨所御裾左右開棉袷紗裘各惟其時皇太子冬朝冠謹按本朝定制皇太子冬朝冠薰貂為之十一月朔至上元用黑狐上綴朱緯頂金龍三層飾東珠十三上銜大東珠一皇太子夏朝冠謹按本朝定制皇太子夏朝冠織玉草或藤絲竹絲為之緑石青片金二層裏用紅片金或紅紗上綴朱緯前綴金佛飾東珠十三後綴舍林飾東珠六頂如冬朝冠皇太子端罩謹按本朝定制皇太子端罩黑狐為之杏黄縀裏左右垂帶各二下廣而鋭色與裏同皇太子龍褂謹按本朝定制皇太子龍褂色用石青繡五爪正面金龍四團兩肩前後各一間以五色雲棉袷紗裘各惟其時皇子同皇太子冬朝服一謹按本朝定制皇太子冬朝服色用杏黄披領及裳俱表以紫貂袖端薰貂繡文兩肩前後正龍各一襞積行龍六間以五色雲皇太子冬朝服二謹按本朝定制皇太子冬朝服色用杏黄披領及袖俱石青片金加海龍縁繡文兩肩前後正龍各一要帷行龍五衽正龍一襞積前後團龍各七裳正龍二行龍四披領行龍二袖端正龍各一間以五色雲下幅八寳平水皇太子夏朝服謹按本朝定制皇太子夏朝服色用杏黄披領及袖俱石青片金縁縀紗單袷各惟其時餘俱如今朝服皇太子朝珠謹按本朝定制皇太子朝珠珊瑚緑松石青金石隨所用珍寳雜飾各惟其宜縧皆明黄色皇太子朝帶謹按本朝定制皇太子朝帶色用明黄金圓版四飾青金石每具銜東珠五左右佩帉淺藍及白各一下廣而鋭結佩惟宜縧如帶色皇太子冬吉服冠謹按本朝定制皇太子冬吉服冠海龍紫貂薰貂惟其時上綴朱緯紅絨結頂皇子同皇太子夏吉服冠謹按本朝定制皇太子夏吉服冠織玉草或藤絲竹絲為之紅紗綢為裏石青片金縁上綴朱緯頂如冬吉服冠皇子同皇太子龍袍謹按本朝定制皇太子龍袍色用杏黄領袖俱石青片金縁繡文金龍九間以五色雲領前後正龍各一左右及交襟處行龍各一袖端正龍各一下幅八寳立水裾左右開棉袷紗裘各惟其時皇太子吉服帶謹按本朝定制皇太子吉服帶色用明黄金版四方圓惟便銜以珠玉雜寳各從其宜左右佩帉純白下直而齊餘俱如朝帶皇子冬朝冠謹按本朝定制皇子冬朝冠薰貂為之十一月朔至上元用青狐頂金龍二層飾東珠十上銜紅寳石親王同其冠制下達文武一品皆如之皇子夏朝冠謹按本朝定制皇子夏朝冠織玉草或藤絲竹絲為之緑石青片金二層裏用紅片金或紅紗上綴朱緯前綴舍林飾東珠五後綴金花飾東珠四頂如冬朝冠親王同其冠制下達庶官皆如之皇子端罩謹按本朝定制皇子端罩紫貂為之金黄縀裏左右垂帶各二下廣而鋭色與裏同皇子冬朝服一謹按本朝定制皇子冬朝服色用金黄披領及裳俱表以紫貂袖端薰貂繡文兩肩前後正龍各一襞積行龍六間以五色雲皇子冬朝服二謹按本朝定制皇子冬朝服色用金黄披領及袖俱石青片金加海龍縁繡文兩肩前後正龍各一要帷行龍四裳行龍八披領行龍二袖端正龍各一下幅八寳平水皇子夏朝服謹按本朝定制皇子夏朝服色用金黄披領及袖俱石青片金縁餘俱如冬朝服皇子朝珠謹按本朝定制皇子朝珠不得用東珠餘隨所用縧皆金黄色親王世子郡王皆同皇子朝帶謹按本朝定制皇子朝帶色用金黄金銜玉方版四每具飾東珠四中飾貓睛石一左右佩縧如帶色親王同其帶色宗室皆如之覺羅用紅帶皇子蟒袍謹按本朝定制皇子蟒袍色用金黄片金縁繡文通九蟒裾左右開制達宗室皇子吉服帶謹按本朝定制皇子吉服帶色用金黄版飾惟宜佩縧如帶色親王世子郡王皆同親王端罩謹按本朝定制親王端罩青狐為之月白縀裏曾賜金黄色者亦得用左右垂帶各二下廣而鋭色與裏同下至貝子固倫額駙皆同親王補服謹按本朝定制親王補服色用石青繡五爪金龍四團前後正龍兩肩行龍世子同親王冬朝服一謹按本朝定制親王冬朝服藍及石青諸色隨所用曾賜金黄者亦得用之披領及裳俱表以紫貂袖端薰貂制同皇子冬朝服世子郡王皆同親王冬朝服二謹按本朝定制親王冬朝服藍及石青諸色隨所用曾賜金黄者亦得用之片金加海龍縁制同皇子冬朝服世子郡王皆同親王夏朝服謹按本朝定制親王夏朝服藍及石青諸色隨所用曾賜金黄者亦得用之片金縁制同皇子夏朝服世子郡王皆同親王夏吉服冠謹按本朝定制親王夏吉服冠織玊草或藤絲竹絲為之紅紗綢為裏石青片金縁頂如冬吉服冠世子以下至貝勒皆同其冠制下達庶官俱如之親王蟒袍謹按本朝定制親王蟒袍藍及石青諸色隨所用曾賜金黄者亦得用之制同皇子蟒袍世子郡王皆同世子冬朝冠謹按本朝定制世子冬朝冠頂金龍二層飾東珠九上銜紅寳石世子夏朝冠謹按本朝定制世子夏朝冠前綴舍林飾東珠五後綴金花飾東珠四頂如冬朝冠世子朝帶謹按本朝定制世子朝帶色用金黄金銜玉方版四每具飾東珠三左右佩縧皆如帶色郡王冬朝冠謹按本朝定制郡王冬朝冠頂金龍二層飾東珠八上銜紅寳石郡王夏朝冠謹按本朝定制郡王夏朝冠前綴舍林飾東珠四後綴金花飾東珠三頂如冬朝冠郡王補服謹按本朝定制郡王補服色用石青繡五爪行龍四團兩肩前後各一郡王朝帶謹按本朝定制郡王朝帶色用金黄金銜玊方版四每具飾東珠二貓睛石一左右佩縧皆如帶色貝勒冬朝冠謹按本朝定制貝勒冬朝冠頂金龍二層飾東珠七上銜紅寳石貝勒夏朝冠謹按本朝定制貝勒夏朝冠前綴舍林飾東珠三後綴金花飾東珠二頂如冬朝冠貝勒補服謹按本朝定制貝勒補服色用石青前後繡四爪正蟒各一團貝勒冬朝服一謹按本朝定制貝勒冬朝服色不得用金黄餘隨所用披領及裳俱表以紫貂袖端薰貂通繡蟒文制如親王下至輔國公和碩額駙皆同貝勒冬朝服二謹按本朝定制貝勒冬朝服色不得用金黄餘隨所用片金加海龍縁通繡蟒文制如親王下至輔國公和碩額駙皆同貝勒夏朝服謹按本朝定制貝勒夏朝服色不得用金黄餘隨所用片金縁通繡蟒文制如親王下至輔國公和碩額駙皆同貝勒朝珠謹按本朝定制貝勒朝珠縧用石青色下至輔國公和碩額駙皆同貝勒朝帶謹按本朝定制貝勒朝帶色用金黄金銜玉方版四每具飾東珠二佩縧皆石青色貝勒蟒袍謹按本朝定制貝勒蟒袍色不得用金黄餘隨所用片金縁繡文通九蟒皆四爪下至輔國公和碩額駙皆同貝勒吉服帶謹按本朝定制貝勒吉服帶色用金黄銜飾惟宜佩縧皆石青色下至宗室將軍皆同貝子冬朝冠謹按本朝定制貝子冬朝冠頂金龍二層飾東珠六上銜紅寳石戴三眼孔雀翎固倫額駙同貝子夏朝冠謹按本朝定制貝子夏朝冠前綴舍林飾東珠二後綴金花飾東珠一頂及孔雀翎俱如冬朝冠固倫額駙同貝子補服謹按本朝定制貝子補服色用石青前後繡四爪行蟒各一團固倫額駙同貝子朝帶謹按本朝定制貝子朝帶色用金黄金銜玊方版四每具飾東珠一貝子冬吉服冠謹按本朝定制貝子冬吉服冠頂用紅寳石戴三眼孔雀翎貝子夏吉服冠謹按本朝定制貝子夏吉服冠頂及孔雀翎俱如冬吉服冠固倫額駙朝帶謹按本朝定制固倫額駙朝帶色用石青或藍金銜玊圓版四每具飾東珠一左右佩縧皆石青色固倫額駙冬吉服冠謹按本朝定制固倫額駙冬吉服冠頂用珊瑚戴三眼孔雀翎固倫額駙夏吉服冠謹按本朝定制固倫額駙夏吉服冠頂及孔雀翎皆如冬吉服冠固倫額駙吉服帶謹按本朝定制固倫額駙吉服帶佩帉下直而齊版飾及佩各惟其宜鎮國公冬朝冠謹按本朝定制鎮國公冬朝冠頂金龍二層飾東珠五上銜紅寳石戴雙眼孔雀翎和碩額駙同鎮國公夏朝冠謹按本朝定制鎮國公夏朝冠前綴舍林飾東珠一後綴金花飾緑松石一頂及孔雀翎俱如冬朝冠和碩額駙同鎮國公端罩謹按本朝定制鎮國公端罩紫貂為之月白縀裏左右垂帶各二下廣而鋭色與裏同輔國公和碩額駙皆同鎮國公