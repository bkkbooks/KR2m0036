body:
  text: 樂器一朝㑹朝㑹中和韶樂麾謹按隋書音樂志帝出黃門侍郎舉麾於殿上掌故應之舉於階下奏康韶之樂舊唐書音樂志協律郎舉麾樂作仆麾樂止元史禮樂志麾長七尺畫升龍於上以塗金龍首朱杠懸之本朝定制朝㑹中和韶樂麾黃縀為之長五尺四寸六分濶一尺八分繡雲龍其端飾藍縀長八寸一分繡星雲文中為日華金篆中和字上下皆綴橫木上縱五寸七分鏤雙龍下縱三寸六分鏤山水形皆塗金結黃絨紃銜於龍口懸以朱杠長八尺一寸圍三寸三分杠端飾塗金銅龍長一尺九分曲首向前四寸六分座髙二尺五寸六分濶一尺五寸三分亦以金䯱之祭祀燕饗中和韶樂麾皆同朝㑹中和韶樂鎛鐘第一黃鍾謹按周禮春官鎛師鄭康成注鎛如鐘而大賈公彥疏以其形如鐘而大獨在一虡隋書音樂志設十二鎛鐘各依辰位而應其律乾隆二十四年江西臨江府得古鎛鐘撫臣以獻于朝適當西師奏凱之時功成樂作式彰瑞應上既考古制釐定其名復詔樂部仿鑄鎛鐘十二以備宫懸第一鐘應黃鍾之律十一月用之兩欒髙一尺八寸三分二釐中髙一尺六寸一分于徑一尺五寸一分八釐橫一尺一寸三分九釐兩舞相距一尺一寸九分六釐橫一尺三分六釐甬長一尺八分徑四寸三分二釐衡徑三寸八分旋徑四寸八分濶一寸四分四釐蟲長三寸三釐濶一寸八分二釐厚一寸二分一釐蟲孔長一寸五分一釐濶一寸一釐乳凡三十六髙一寸四分四釐鐫識處髙九寸一分一釐上濶三寸三釐下濶四寸五釐前鐫御製銘後鐫鎛鐘第一黃鍾大清乾隆二十有六年嵗在辛巳冬十一月乙未朔越六日庚子鑄成俱篆文簨虡皆塗金通髙九尺二寸五分厚三寸八分上簨左右刻龍首濶五尺四寸髙一尺一寸中簨濶二尺七寸髙四寸簨上有業髙七寸鏤雲龍附簨結黃絨紃以懸鐘虡髙五尺六寸五分濶四寸承以五采伏獅髙一尺二寸五分下為趺髙亦如之縱二尺四寸橫一尺二寸趺上垣髙三寸鏤山水形上簨脊樹金鸞咮銜五采流蘇龍口亦如之下垂至趺第二大吕第三太蔟亦用此簨虡擊具為卧鼓形有柄䯱朱凡鐘磬皆如之圜丘祈榖壇天神壇鎛鐘皆同燕饗中和韶樂鎛鐘第一亦同朝㑹中和韶樂鎛鐘第二大吕謹按御製鎛鐘第二應大吕之吕十二月用之兩欒髙一尺七寸六釐中髙一尺五寸一分七釐于徑一尺四寸二分二釐橫一尺六分六釐兩舞相距一尺二寸一分三釐橫九寸七分甬長一尺一分一釐徑四寸四釐衡徑二寸六分六釐旋徑四寸四分九釐濶一寸三分四釐蟲長二寸八分四釐濶一寸七分厚一寸一分四釐蟲孔長一寸四分二釐濶九分四釐乳凡三十六髙一寸三分四釐鐫識處髙八寸五分三釐上濶二寸八分四釐下濶三寸七分九釐前鐫御製銘後鐫鎛鐘第二大吕年月俱如前燕饗中和韶樂鎛鐘第二同朝㑹中和韶樂鎛鐘第三太蔟謹按御製鎛鐘第三應太蔟之律正月用之兩欒髙一尺六寸二分中髙一尺四寸四分于徑一尺三寸五分橫一尺一分二釐兩舞相距一尺一寸五分二釐橫九寸一分二釐甬長九寸六分徑三寸八分四釐衡徑二寸五分三釐旋徑四寸二分六釐濶一寸二分八釐蟲長二寸七分濶一寸六分二釐厚一寸八釐蟲孔長一寸三分五釐濶九分乳凡三十六髙一寸二分八釐鐫識處髙八寸一分上濶二寸七分下濶三寸六分前鐫御製銘後鐫鎛鐘第三太蔟年月俱如前太廟奉先殿朝日壇太嵗壇鎛鐘皆同燕饗中和韶樂鎛鐘第三亦同朝㑹中和韶樂鎛鐘第四夾鍾謹按御製鎛鐘第四應夾鍾之吕二月用之兩欒髙一尺五寸一分七釐中髙一尺三寸四分八釐于徑一尺二寸六分四釐橫九寸四分八釐兩舞相距一尺七分八釐橫八寸六分三釐甬長八寸九分八釐徑三寸五分九釐衡徑二寸三分七釐旋徑三寸九分九釐濶一寸一分九釐蟲長二寸五分二釐濶一寸五分一釐厚一寸一釐蟲孔長一寸二分六釐濶八分四釐乳凡三十六髙一寸一分九釐鐫識處髙七寸五分八釐上濶二寸五分二釐下濶三寸三分七釐前鐫御製銘後鐫鎛鐘第四夾鍾年月俱如前簨虡通髙九尺二寸五分厚二寸八分上簨濶四尺七寸髙一尺一寸中簨濶二尺一寸髙三寸六分左右兩虡髙六尺三寸五分濶三寸六分趺髙九寸縱二尺一寸橫一尺垣髙二寸五分獅身出垣六寸五分下施几二縱二尺三寸橫一尺二寸髙一尺三寸以符第一虡髙下之制餘俱同第一簨虡第五姑洗第六仲吕亦用此簨虡社稷壇帝王廟文廟春祭鎛鐘皆同燕饗中和韶樂鎛鐘第四亦同朝㑹中和韶樂鎛鐘第五姑洗謹按御製鎛鐘第五應姑洗之律三月用之兩欒髙一尺四寸四分中髙一尺二寸八分于徑一尺一寸橫九寸兩舞相距一尺二分四釐橫八寸一分九釐甬長八寸五分三釐徑一寸四分一釐衡徑二寸二分五釐旋徑三寸七分九釐濶一寸一分二釐蟲長二寸四分濶一寸四分四釐厚九分六釐蟲孔長一寸二分濶八分乳凡三十六髙一寸一分三釐鐫識處髙七寸二分上濶二寸四分下濶三寸二分前鐫御製銘後鐫鎛鐘第五姑洗年月俱如前先農壇鎛鐘同燕饗中和韶樂鎛鐘第五亦同朝㑹中和韶樂鎛鐘第六仲吕謹按御製鎛鐘第六應仲吕之吕四月用之兩欒髙一尺三寸四分八釐中髙一尺一寸九分八釐于徑一尺一寸二分三釐橫八寸四分一釐兩舞相距九寸五分八釐橫七寸六分七釐甬長七寸九分九釐徑三寸一分九釐衡徑二寸一分旋徑三寸五分五釐濶一寸六釐蟲長二寸二分四釐濶一寸三分四釐厚八分九釐蟲孔長一寸一分二釐濶七分四釐乳凡三十六髙一寸六釐鐫識處髙六寸七分四釐上濶二寸二分四釐下濶二寸九分九釐前鐫御製銘後鐫鏄鐘第六仲吕年月俱如前燕饗中和韶樂鎛鐘第