body:
  text: 欽定四庫全書皇朝禮器圗式卷十二鹵簿三皇太后皇后儀駕皇貴妃貴妃儀仗妃嬪采仗皇太后儀駕萬夀輦謹按乾隆十六年崇慶慈宜康惠敦和裕夀純禧恭懿皇太后六十萬夀上尊養祝釐鴻儀備舉預涓吉日自暢春園躬奉慈駕入宫皇太后御金輦明黃縀幃繡夀字文奉輦以二十八人乾隆二十六年皇太后七十萬夀禮亦如之慶典攸隆光昭奕祀敬登簡冊以冠儀駕之首皇太后儀駕龍鳳輿謹按宋史輿服志龍輿皇太后所乘也元祐三年詔有司尋繹典故於是檐子飾以龍鳳九年羣臣議改檐子為輿乾隆十四年欽定皇太后儀駕龍鳳輿木質髤以明黃通高七尺穹蓋二重高一尺五寸五分上為八角各飾金鳳下正方四隅飾亦如之冠金圓頂七寸二分鏤雲文銜以雜寶簷縱五尺橫三尺七寸六分明黃緞垂幨上深三寸下深一尺一寸皆銷金龍鳳四柱各高四尺七寸縱四尺上橫二尺九寸下二尺三寸五分皆繪金龍鳳櫺四啓青紃網之前為雙扉高二尺六寸濶二尺一寸啓扉則舉櫺懸之內髤淺紅中置朱座高一尺七寸倚髙一尺八寸坐具明黃緞彩繡龍鳳前加撫式亦髤明黃繪金龍鳳直轅二各長一丈七尺二寸五分大橫杆二各長八尺中為鐵鋄金雙鳳相向小橫杆四各長三尺肩杆八各長五尺一寸皆髤明黃橫鉆以銅縱加銅鋄金鳳首尾舁以十六人皇太后儀駕龍鳳車謹按後漢書輿服志皇太后法駕御金根加交路帳裳非法駕則乘紫罽軿車雲􅏹文畫輈黃金塗五末明㑹典太后鹵簿安車一抹金銅鳳頭鳳尾鳳翎葉片裝釘乾隆十四年欽定皇太后儀駕龍鳳車木質髤以明黃通高九尺五寸穹蓋二重高一尺七寸上繪八寶八角各飾金鳳下繪雲文四隅飾亦如之冠金圓頂八寸五分鏤雲文銜以雜寶簷縱四尺九寸橫四尺明黃緞垂幨上深三寸下深一尺一寸蓋明黃絡四隅繫明黃絨紃屬於軫四柱各高三尺三寸縱四尺八寸橫三尺一寸左右及後皆繪金龍鳳中各啓櫺青紃網之門高三尺闊一尺八寸五分上鏤金龍鳳相向明黃緞幃黃裏坐具明黃緞彩繡龍鳳輪徑各四尺九寸各十有八輻轅二各長一丈七尺五寸鉆以鐵鋄金軫長六尺二寸闊三尺三寸駕馬一皇太后儀駕儀輿謹按馬端臨文獻通考唐制皇太后鹵簿腰輿一輿士八人乾隆十四年欽定皇太后儀駕儀輿木質髤以明黃通髙六尺一寸上為穹蓋髙七寸冠銀圓頂塗金髙六寸五分簷縱四尺九寸橫三尺八寸四隅繫黃絨紃屬於直轅明黃緞垂幨深一尺二寸四柱各髙四尺八寸縱四尺二寸橫三尺一寸門髙三尺九寸闊二尺七寸明黃緞幃黃裏中置朱座髙一尺七寸倚髤明黃高一尺八寸繪金龍鳳坐具明黃緞亦繡龍鳳直轅二各長一丈五尺六寸橫杆二各長七尺八寸中為鐵鋄金雙鳳相向肩杆四各長五尺三寸俱髤明黃兩端鉆以銅鋄金舁以八人皇太后儀駕儀車謹按乾隆十四年欽定皇太后儀駕儀車木質髤以明黃通髙九尺九寸穹蓋上圓下方髙一尺冠銀圓頂塗金髙七寸七分簷縱五尺六寸橫四尺二寸五分四隅繫明黃絨紃屬於軫明黃緞垂幨深一尺二寸四柱各高二尺九寸縱四尺八寸橫三尺三寸不加繪飾裏髤淺紅明黃緞幃黃裏坐具明黃緞彩繡龍鳳輪徑各四尺各十有八輻轅二各長一丈五尺九寸鉆以鐵鋄銀軫長五尺九寸闊三尺五寸駕馬一皇太后儀駕九鳳曲蓋謹按馬端臨文獻通考唐制皇太后鹵簿次錦曲蓋二十乾隆十四年欽定皇太后儀駕九鳳曲蓋明黃緞為之黃裏通高一丈二尺二寸蓋徑五尺三寸繡流雲上冠金頂七寸五分垂幨三層各深一尺三寸繡彩鳳九間以花文旁垂彯帶二長三尺五寸闊二寸九分如蓋色繡彩雲曲柄為木質塗金龍首二徑二尺三寸上下攢竹髤朱上長三尺七寸下長五尺三寸圍七寸四分皇太后儀駕拂塵謹按乾隆十四年欽定皇太后儀駕拂塵朱氂為之長二尺三寸結於木柄其長二尺圍一寸三分通髤以金上飾鏤金鳳首三寸五分銜小金鐶以綴拂下飾鏤金鳳尾三寸三分末鏤金錢形垂朱緌皇太后儀駕提爐謹按唐書儀衛志皇太后出香蹬一內給使四人輿之乾隆十四年欽定皇太后儀駕提爐笵金為之通高八寸六分深四寸五分口徑三寸二分腹圍一尺七寸六分蓋高二寸一分環鏤芙蕖下垂雲葉頂為立鳳頂鏤花文雙鳳為耳三尺各高一寸五分提以金索三上冠雲葉旁繫索以屬蓋提杆攢竹髤朱長三尺九寸圍三寸三分兩端飾金鳳首尾上綴金鉤於雲葉提之陳設時承以八角盤口徑一尺一寸二分底徑九寸七分通髤朱繪金龍鳳置方几上几高一尺五寸七分上徑一尺四寸六分下徑一尺四寸八分四尺鏤螭首虎爪承以圓珠下周橫距通髤以朱面繪龍鳳周繪行龍皇太后儀駕香合謹按乾隆十四年欽定皇太后儀駕香合笵金為之橢圓有蓋通高五寸二分口縱七寸二分橫四寸二分蓋高一寸三分面為立鳳周為翔鳳四口為回文下深一寸二分亦鏤雲鳳回文間以火珠足高四分陳設時盤及几俱如提爐之制皇太后儀駕盥盆謹按乾隆十四年欽定皇太后儀駕盥盆笵金為之形圓十二棱高三寸九分口徑一尺二寸九分邊鈒花文八寶底徑一尺一寸鈒花文中立雙鳳陳設時盤及几俱如提爐之制皇太后儀駕唾壺謹按乾隆十四年欽定皇太后儀駕唾壺笵金為之通高六寸七分口徑四寸六分鈒雲文回文蓋高二寸頂為立鳳高二寸五分旁為流雲下深一寸八分底徑二寸二分座高四寸五分徑三寸三分四足鏤螭首虎爪承以圓珠下周圓距陳設時盤及几俱如提爐之制皇太后儀駕水瓶謹按乾隆十四年欽定皇太后儀駕水瓶笵金為之大小各一大者通高一尺五寸五分深一尺三寸口徑四寸鈒花文腹圍二尺七寸七分鈒雲鳳火珠下為如意雲文耳為螭首銜鐶底徑六寸蓋高一寸徑六寸頂為立鳳高二寸七分小者通高一尺四寸五分深一尺一寸口徑三寸四分腹圍二尺五寸七分底徑五寸四分蓋髙一寸徑五寸七分形制花文皆同陳設時盤及几俱如提爐之制皇太后儀駕馬杌謹按乾隆十四年欽定皇太后儀駕馬杌木質塗金高一尺六寸方一尺九寸面繪金龍鳳間以流雲中為火珠四角飾鏤金花文四足為螭首虎爪承以圓珠下周橫距雜繪八寶皇太后儀駕交椅謹按乾隆十四年欽定皇太后儀駕交椅木質塗金曲扶箕張倚上仰交足橫距貫以鐵樞雙疊舉之通高二尺九寸五分縱一尺一寸五分橫二尺二寸四角飾鏤金花文座面織明黃絲縧倚刻龍鳳踏几高三寸三分縱九寸五分橫一尺八寸六分亦塗金皇太后儀駕九鳳蓋謹按乾隆十四年欽定皇太后儀駕九鳳蓋五色緞為之各二鳳及雲文花文皆銷金直柄長一丈一尺餘俱如九鳳曲蓋之制皇太后儀駕花蓋謹按馬端臨文獻通考唐制皇太后鹵簿次錦花蓋二乾隆十四年欽定皇太后儀駕花蓋明黃緞為之彩繡八寶雜花直柄長一丈一尺餘俱如九鳳曲蓋之制皇太后儀駕方繖謹按馬端臨文獻通考唐制皇太后鹵簿次大繖四宋元祐三年詔有司尋繹典故繖用紅乾隆十四年欽定皇太后儀駕方繖紅緞為之方五尺垂幨三層不施繡文旁垂彯帶直柄長一丈一尺皇太后儀駕龍鳳扇謹按馬端臨文獻通考唐制皇太后鹵簿次偏扇團扇各二十四分左右乾隆十四年欽定皇太后儀駕龍鳳扇明黃紅二色緞為之各四通髙一丈九寸扇圓徑三尺三寸繡龍鳳各一間以流雲周為襞積中貫柄處飾以藍上下約以金花翠葉中鏤鳳背亦如之柄攢竹髤朱長七尺五寸圍四寸六分皇太后儀駕鸞鳳扇謹按馬端臨文獻通考唐制皇太后鹵簿次方扇二十四分左右乾隆十四年欽定皇太后儀駕鸞鳳扇明黃紅二色緞為之各四通髙一丈一尺九寸扇上橢下方徑二尺四寸五分上闊二尺九寸五分下闊二尺五寸五分繡五彩鸞鳳各一間以花文緑緣闊四寸七分周繡孔雀翎上下約以金花翠葉下綴橫木髙四寸一分髤黑繪金鸞鳳柄攢竹髤黑長七尺八寸五分圍四寸四分皇太后儀駕金節謹按乾隆十四年欽定皇太后儀駕金節朱紃貫朱旄八下繫朱緌屬於杆韜以黃紗長八尺圍二尺九寸通繡五色龍鳳蓋髙九寸徑一尺二寸緑緞羃之紅緣垂幨黃紅二重杆攢竹髤朱長一丈圍四寸三分上為曲項加塗金鳳首銜鐶屬銅蓋繫節通髙一丈一尺二寸皇太后儀駕龍鳳旗謹按乾隆十四年欽定皇太后儀駕龍鳳旗五色緞為之各二斜幅銷金龍鳳各一間以流雲縿徑四尺七寸斿徑六尺斜徑八尺二寸杆攢竹髤朱長一丈三尺三寸圍四寸七分首冠鏤金火焰頂注朱旄鐏以鐵塗金通髙一丈四尺九寸皇太后儀駕卧瓜謹按乾隆十四年欽定皇太后儀駕卧瓜雕木為之長六寸九分圍一尺五寸六棱有蒂刻雲文卧置柄首銎上銜以龍首皆塗金柄攢竹髤朱長五尺九寸圍三寸八分鐓以銅鋄銀高一寸六分通髙七尺五寸皇太后儀駕立瓜謹按乾隆十四年欽定皇太后儀駕立瓜雕木為之長七寸圍一尺四寸形如卧瓜立置柄首柄長五尺七寸八分如卧瓜之制通髙七尺八寸皇太后儀駕吾仗謹按乾隆十四年欽定皇太后儀駕吾仗攢竹為之圍四寸二分髤朱兩端繪金雲通髙六尺九寸皇后儀駕鳳輿謹按宋史輿服志檐子南渡後所製也東都皇后備厭翟車常乘則白藤輿明㑹典鳳轎抹金銅珠頂四角抹金銅飛鳳三面繪翟文抹金銅鳳頭鳳尾裝飾乾隆十四年欽定皇后儀駕鳳輿木質髤以明黃通髙七尺穹蓋二重髙一尺五寸五分上為八角各飾金鳳下方四隅飾亦如之冠金圓頂七寸二分鏤雲銜以雜寶簷縱五尺橫三尺七寸六分明黃緞垂幨上深三寸下深一尺一寸皆銷金鳳四柱各髙四尺七寸縱四尺上橫二尺九寸下二尺三寸五分皆繪金鳳櫺四啓青紃網之前為雙扉髙二尺六寸闊二尺一寸啓扉則舉櫺懸之內髤淺紅中置朱座髙一尺七寸倚髤明黃髙一尺八寸繪金鳳坐具明黃緞繡彩鳳前加撫式亦髤明黃繪金鳳直轅二各長一丈七尺二寸五分大橫杆二各長八尺中為鐵鋄金雙鳳相向小橫杆四各長三尺肩杆八各長五尺皆髤明黃橫鉆以銅縱加銅鋄金鳳首尾舁以十六人親蠶御之皇后儀駕鳳車謹按唐書輿服志皇后車則有重翟厭翟翟車安車四望車金根車六等明會典中宫鹵簿安車一抹金銅鳳頭鳳尾鳳翎葉片裝釘乾隆十四年欽定皇后儀駕鳳車木質髤以明黃通高九尺五寸穹蓋二重髙一尺七寸上繪八寶八角各飾金鳳下繪雲文四隅飾亦如之冠金圓頂八寸五分鏤雲銜以雜寶簷縱四尺九寸橫四尺明黃緞垂幨上深三寸下深一尺一寸蓋明黃絡四隅繫明黃絨紃屬於軫四柱各髙三尺三寸縱四尺八寸橫二尺一寸左右及後皆繪金鳳中各啓櫺青紃網之門髙三尺闊一尺八寸五分上鏤金鳳相向明黃緞幃黃裏坐具黃緞繡彩鳳輪徑各四尺九寸各十有八幅轅二各長一丈七尺五寸兩端鉆以鐵鋄金軫長六尺二寸闊三尺三寸駕馬一皇后儀駕儀輿謹按宋史輿服志皇后常日止用副金塗銀裝白藤輿乾隆十四年欽定皇后儀駕儀輿木質髤以明黃通髙五尺九寸上為穹蓋髙六寸七分冠銀圓頂塗金髙六寸三分簷縱四尺八寸橫三尺六寸四隅繫黃絨紃屬於直轅明黃緞垂幨深一尺一寸四柱各髙四尺七寸縱四尺橫三尺門髙三尺七寸濶二尺五寸明黃緞幃紅裏中置朱座髙一尺五寸倚髤明黃髙一尺六寸繪金鳯坐具明黃緞繡彩鳯直轅二各長一丈五尺五寸橫杆二各長七皇后儀駕儀車謹按隋書禮儀志皇后副車三十六乘乾隆十四年欽定皇后儀駕儀車木質髤以明黃通髙九尺五寸穹蓋上圓下方髙九寸冠銀圓頂塗金髙七寸