body:
  text: 武備五皇帝行營內旌門纛謹按乾隆二十年欽定行營內旌門纛三東鑲黃西正黃南正白俱以縀為之各從旗色鑲黃以紅緣正黃正白不加緣皆正幅銷金雲龍縿徑四尺八寸斿徑五尺緣銷金火𦦨周濶八寸杆以竹髤朱束藤長一丈四尺五寸圍六寸三分首冠金盤上植豹尾下注朱旄加明黃彯帶剡角亦銷金火𦦨長五尺三寸濶九寸杆末鐡鐏長四寸旁施鐡鐶穿革植纛皇帝行營內城旗謹按乾隆二十年欽定行營內城旗四十有一俱明黃縀為之紅緣斜幅銷金雲龍縿徑二尺二寸斿徑三尺三寸斜徑四尺緣銷金火𦦨周濶三寸三分杆以竹髤朱束藤長六尺七寸圍二寸一分首冠金盤上植豹尾下注朱旄加明黃彯帶剡角亦銷金火𦦨長四尺濶四寸杆末包革繫繩植旗皇帝行營外旌門纛謹按乾隆二十年欽定行營外旌門纛五東鑲白西鑲紅南正藍鑲藍遞用北正紅俱以縀為之各從旗色正紅正藍不加緣鑲白鑲藍以紅緣鑲紅以白緣皆正幅銷金飛虎環以火𦦨餘俱如內旌門纛之制皇帝行營外城旗謹按乾隆二十年欽定行營外城旗六十東南正白西南正紅西北正黃東北鑲黃俱以縀為之各從旗色鑲黃以紅緣正黃正白正紅不加緣皆方幅銷金飛虎環以火焰縿徑二尺斿徑三尺鑲黃緣亦銷金火𦦨周濶四寸杆如內城旗之制皇帝行圍吉爾丹纛謹按本朝定制皇帝行圍吉爾丹纛明黃縀為之不加緣斜幅銷金雲龍周為火焰形亦銷金火𦦨縿徑七尺三寸斿徑八尺斜徑一丈九尺杆以竹髤朱束藤長一丈六尺五寸圍四寸九分首冠鋄金三稜火珠頂注朱旄末鐡鐏長四寸旁施鋄金鐶穿革植纛皇帝行圍後護旗謹按本朝定制皇帝行圍後護旗以縀為之八旗各一鑲黃鑲白鑲藍以紅緣鑲紅白緣正黃正白正紅正藍不加緣皆正幅銷金飛虎間以火焰縿徑一尺八寸斿徑二尺九寸杆以竹髤朱束藤長六尺圍二寸一分首冠金盤上植豹尾下注朱旄加明黃彯帶剡角銷金火雲長二尺七寸濶三寸杆末包革繫繩植旗如健鋭營扈行則以鑲黃正黃旗各四制如之皇帝行圍纛謹按本朝定制皇帝行圍纛五鑲黃一正黃正白各二俱以縀為之鑲黃以紅緣正黃正白不加緣皆正幅不施繪繡方五尺五寸杆以竹長一丈四尺五寸圍六寸三分首冠鋄銀鐡輪頂注朱旄末鐡鐏長四寸旁施鐡鐶穿革植纛中鑲黃兩協正黃兩末正白環行相遇則圍合南苑行圍用之皇帝行圍蒙古纛謹按本朝定制皇帝行圍蒙古纛五正黃正白正紅各一正藍二俱以綢為之各如旗色不加緣正幅不施繪繡皆縿徑六尺四寸斿徑六尺杆以竹髤朱束藤長一丈四尺五寸圍六寸三分首冠鋄銀鐡輪頂注黑旄末鐡鐏長四寸旁施鐡鐶穿革植纛中正黃兩協正白正紅兩末正藍環行相遇則圍合木蘭行圍用之得勝靈纛一謹按乾隆二十四年平定西域越歲振旅凱旋上命尊藏得勝靈纛於紫光閣用紀武成櫝以香楠高二尺四寸縱二尺五寸橫二尺一寸上鐫得勝靈纛周鐫御製詩並序皆清漢蒙古西番文承以白石趺凡藏纛七一為定邊將軍武毅謀勇公兆惠纛黃雲緞為之不加緣正幅銷金雲龍環以火焰縿徑四尺七寸斿徑五尺六寸首冠鋄銀鐡頂注朱旄加黃緞彯帶長五尺九寸濶八寸銷金如纛幅得勝靈纛二謹按得勝靈纛二為定邊右副將軍靖逺誠勇侯富德纛黃雲緞為之不加緣正幅銷金雲蟒環以火焰縿徑五尺斿徑四尺八寸首冠鋄金鐡頂承以鐡盤注朱旄得勝靈纛三謹按得勝靈纛三為參贊大臣毅勇承恩公明瑞纛黃雲緞為之紅緣斜幅銷金雲蟒縿徑七尺九寸斿徑六尺八寸斜徑一丈緣為火焰形亦銷金火焰周濶八寸首冠鋄銀鐡頂承以鐡盤亦鋄銀注朱旄加紅緞彯帶亦銷金如纛幅長一丈一尺五寸得勝靈纛四謹按得勝靈纛四為參贊大臣誠勇公巴祿纛黃雲緞為之紅緣斜幅銷金雲蟒縿徑六尺二寸斿徑六尺七寸斜徑九尺緣銷金火焰周濶六寸首冠鋄銀鐡頂承以鐡盤亦鋄銀注朱旄得勝靈纛五謹按得勝靈纛五為領隊大臣副都統鄂傅什纛黃雲緞為之不加緣正幅不施繪繡縿徑四尺一寸斿徑四尺五寸首冠鋄銀鐡頂承以鐡盤亦鋄銀注朱旄得勝靈纛六謹按得勝靈纛六為領隊大臣副都統圖布巴圖魯溫布纛白雲緞為之斜幅繪五彩雲蟒縿徑六尺七寸斿徑六尺四寸斜徑九尺三寸緣為火焰形亦繪火焰周濶六寸首冠塗金革頂承以圓革亦塗金注朱旄得勝靈纛七謹按得勝靈纛七為領隊大臣副都統克特爾克巴圖魯由屯纛黃雲緞為之不加緣正幅不施繪繡縿徑五尺二寸斿徑四尺九寸首冠鋄銀鐡頂承以鐡盤亦鋄銀注朱旄八旗都統纛謹按本朝定制八旗都統纛俱以緞為之各從旗色鑲黃旗鑲白旗鑲藍旗皆紅緣鑲紅旗白緣皆左平右剡銷金流雲行龍縿徑五尺中徑六尺四寸上下各徑四尺六寸斜徑各三尺緣銷金火焰周濶八寸正黃旗正白旗正紅旗正藍旗不加緣俱正幅亦銷金流雲行龍縿徑五尺斿徑五尺八寸杆以竹髤朱束藤長一丈三尺圍五寸五分首冠鋄銀鈒花頂注朱旄惟正紅旗黑旄末鐡鐏長四寸旁施鐡鐶穿革植纛滿洲蒙古漢軍都統皆用之八旗佐領纛一謹按本朝定制八旗佐領纛俱以緞為之不施繪繡注黑旄餘俱如都統纛之制滿洲蒙古佐領皆用之八旗佐領纛二謹按本朝定制八旗佐領纛俱以緞為之銷金飛虎杆首冠鋄銀鐡輪頂餘俱如都統纛之制漢軍佐領用之八旗領催旗一謹按本朝定制八旗領催旗俱以緞為之色及緣俱如都統纛之制鑲黃旗斜幅縿徑二尺二寸斿徑三尺三寸斜徑四尺鑲白旗鑲紅旗鑲藍旗俱左平右剡皆不施繪繡縿徑二尺二寸斿徑二尺九寸上下各徑二尺斜徑各一尺四寸正黃旗正白旗正紅旗正藍旗俱正幅亦不施繪繡縿徑一尺九寸六分斿徑二尺九寸緣俱濶三寸三分杆以竹髤朱束蕂長六尺七寸圍二寸一分首冠鋄銀鐡壺盧頂注黑旄末包革繫繩植旗滿洲蒙古領催皆用之八旗領催旗二謹按本朝定制八旗領催旗俱以緞為之色及緣俱如都統纛之制鑲黃旗鑲白旗鑲紅旗鑲藍旗俱左平右剡銷金飛虎縿徑二尺二寸中徑二尺九寸上下各徑二尺斜徑各一尺五寸正黃旗正白旗正紅旗正藍旗俱正幅亦銷金飛虎縿徑一尺九寸六分斿徑二尺九寸杆首冠鋄銀鈒花頂注朱旄餘俱如領催旗一之制漢軍領催用之八旗前鋒校旗謹按本朝定制八旗前鋒校旗俱以緞為之色及緣皆如都統纛之制俱方幅銷金飛虎縿徑二尺三寸斿徑一尺八寸杆以竹髤朱束藤長六尺圍二寸一分首冠金盤上植豹尾下注朱旄杆末包革繫繩植旗八旗護軍統領纛謹按本朝定制八旗護軍統領纛俱以緞為之色及緣皆如都統纛之制俱斜幅銷金雲龍縿徑四尺八寸斿徑五尺五寸斜徑七尺三寸緣為火𦦨形杆亦如都統纛之制八旗護軍校旗謹按本朝定制八旗護軍校旗俱以緞為之色及緣皆如都統纛之制俱斜幅不施繪繡縿徑一尺六寸斿徑一尺七寸斜徑二尺三寸杆以竹髤朱束藤長五尺五寸圍二寸一分首冠鈒花鐡頂注朱旄惟正紅旗黑旗末包革繫繩植旗健鋭營前鋒參領纛謹按乾隆十四年欽定健鋭營前鋒參領纛左翼鑲黃右翼正黃俱以緞為之鑲黃旗紅緣俱正幅銷金雲龍環以火焰縿徑五尺斿徑五尺一寸杆以竹髤朱束藤長一丈一尺圍六寸三分首冠鋄銀鈒花頂注朱旄加黃彯帶剡角亦銷金火焰長五尺八寸濶八寸五分杆末鐡鐏長四寸旁施鐡鐶穿革植纛健鋭營前鋒校旗謹按乾隆十四年欽定健鋭營前鋒校旗縿徑一尺九寸斿徑二尺二寸杆長五尺二寸圍二寸一分首冠鋄金鐡盤上植豹尾彯帶長二尺寬三分餘俱如纛之制火器營護軍參領纛謹按本朝定制火器營護軍參領纛以緞為之色及緣俱如八旗都統纛之制俱斜幅銷金雲龍環以火焰縿徑六尺五寸斿徑九尺一寸五分斜徑一丈一寸二分緣濶八寸杆以竹髤朱束藤長一丈五寸圍五寸六分首冠鋄銀鐡輪頂注朱旄惟正紅旗黑旄加白緞彯帶為火𦦨形亦銷金雲龍長九尺六寸濶九寸六分杆末鐡鐏長四寸旁施鐡環穿革植纛火器營護軍校旗謹按本朝定制火器營護軍校旗以緞為之色及緣俱如八旗都統纛之制皆斜幅銷金雲龍環以火焰縿徑二尺二寸四分斿徑三尺五寸斜徑四尺二寸緣濶三寸五分白緞彯帶亦銷金火焰長三尺五寸四分寬四寸杆如八旗前鋒旗之制火器營驍騎參領纛謹按本朝定制火器營驍騎參領纛以緞為之色及緣俱如八旗都統纛之制俱正幅三面為火焰形縿徑四尺九寸斿徑六尺一寸五分餘俱如火器營護軍纛之制火器營驍騎校旗謹按本朝定制火器營驍騎校旗以緞為之色及緣俱如八旗都統纛之制皆正幅銷金雲龍縿徑一尺八寸四分斿徑二尺六寸五分緣為火焰形濶三寸五分白緞彯帶亦銷金火焰長三尺五寸四分寬四寸杆如八旗前鋒旗之制藤牌營參領纛謹按本朝定制藤牌營參領纛以緞為之色及緣俱如八旗都統纛之制皆正幅銷金飛熊環以火焰縿徑五尺二寸斿徑五尺六寸緣濶八寸杆長一丈二尺六寸首冠鋄銀鈒花頂加白緞彯帶長六尺六寸濶六寸六分餘俱如火器營護軍纛杆之制藤牌營領催旗謹按本朝定制藤牌營領催旗縿徑一尺八寸四分斿徑二尺六寸五分緣濶三寸五分杆長六尺七寸圍二寸一分彯帶長三尺三寸濶四寸餘俱如纛之制王命旗牌謹按本朝定制王命旗牌旗以藍緞為之方二尺六寸中銷金令字清漢文鈐以兵部印杆木質髤朱注朱旄長八尺牌椴木為之髤朱圓徑七寸五分上刻蓮葉形髤緑中鐫令字清漢文懸於槍上槍以榆木為之長八尺鐡頂冒木髤黃繪龍亦注朱旄牌及槍旁俱鐫令字第若干號清漢文塗金凡頒給經略十二總督挂印總兵官十巡撫提督八總兵官五駐防將軍都統副都統纛謹按本朝定制駐防將軍都統副都統纛盛京西安江寧綏逺城伊犁將軍天津察哈爾都統熱河京口副都統皆用鑲黃吉林寧夏青州杭州福州將軍歸化城右翼都統山海關察哈爾右翼副都統皆用正黃黑龍江涼州廣州荆州將軍歸化城左翼都統成都察哈爾左翼副都統皆用正白俱如八旗都統纛之制駐防將軍都統副都統令旗謹按本朝定制駐防將軍都統副都統令旗以緞為之各從纛色皆正幅銷金令字及注銜皆清漢文縿徑一尺五寸五分斿徑九寸五分貫以令箭笴長三尺髤朱皂羽上括下鏃鏃面鋄銀令字分十二辰皆清漢文緑營督撫提鎮纛謹按本朝定制緑營督撫提鎮纛緑緞為之斜幅銷金雲蟒或飛熊縿徑八尺斿徑五尺八寸斜徑一丈斿及斜徑皆為火焰形杆以竹髤朱長一丈四尺圍四寸六分首冠鈒花鐡頂承以圓革注朱旄加緑緞彯帶亦為火焰形銷金雲蟒長一丈五寸濶六寸五分杆末鐡鐏長四寸旁施鐡環穿革植纛緑營督撫提鎮令旗謹按本朝定制緑營督撫提鎮令旗黃緞為之斜幅縿徑一尺八寸斿徑二尺四寸斜徑三尺餘俱如駐防令旗之制直省總督提督巡撫總兵皆得用緑營大帥旗謹按本朝定制緑營大帥旗黃布為之正幅書帥字漢文縿徑一丈八寸斿徑一丈四尺杆以竹髤朱束藤長一丈六尺圍四寸六分首冠木壺盧頂加藍布彯帶剡角長一丈五尺濶一尺演武廳將臺懸之緑營什長旗謹按本朝定制緑營什長旗緑緞為之縿徑二尺三寸六分斿徑二尺九寸六分斜徑三尺八寸杆長六尺九寸圍二寸一分彯帶長四尺濶四寸餘俱如纛之制皇朝禮器圖式卷十七
